<script>
    // 工具函數
    const utils = {
        padZero: num => String(num).padStart(2, '0'),
        getDaysInMonth: (year, month) => new Date(year, month, 0).getDate(),
        formatNumber: num => num.toLocaleString(),
        setCursorEnd: input => setTimeout(() => {
            const len = input.value.length;
            input.setSelectionRange(len, len);
        }, 0)
    };

    // 輸入框配置數據
    const inputConfig = [
        { category: 'UberEats', items: [
            { label: 'UberEats提袋', name: 'ubereats_bag' },
            { label: 'UberEats六格箱', name: 'ubereats_6grid' },
            { label: 'UberEats八格箱', name: 'ubereats_8grid' }
        ]},
        { category: 'FoodPanda', items: [
            { label: 'FoodPanda提袋', name: 'foodpanda_bag' },
            { label: 'FoodPanda六格箱', name: 'foodpanda_6grid' },
            { label: 'FoodPanda八格箱', name: 'foodpanda_8grid' },
            { label: 'FoodPanda 2022六格箱', name: 'foodpanda_2022_6grid' },
            { label: 'FoodPanda 2022八格箱', name: 'foodpanda_2022_8grid' },
            { label: 'FoodPanda魔鬼氈保溫箱', name: 'foodpanda_velcro_insulated' },
            { label: 'FoodPanda磁吸式保溫箱', name: 'foodpanda_magnetic_insulated' },
            { label: 'FoodPanda上掀款保溫箱', name: 'foodpanda_flip_insulated' }
        ]}
    ];

    // 限制和單價配置
    const productConfig = {
        limits: {
            ubereats_bag: 50, ubereats_6grid: 15, ubereats_8grid: 13,
            foodpanda_bag: 80, foodpanda_6grid: 15, foodpanda_8grid: 13,
            foodpanda_2022_6grid: 15, foodpanda_2022_8grid: 13,
            foodpanda_velcro_insulated: 10, foodpanda_magnetic_insulated: 10,
            foodpanda_flip_insulated: 6
        },
        unitPrices: {
            ubereats_bag: 10, foodpanda_bag: 13,
            ubereats_6grid: 65, ubereats_8grid: 70,
            foodpanda_6grid: 65, foodpanda_8grid: 70,
            foodpanda_2022_6grid: 65, foodpanda_2022_8grid: 70,
            foodpanda_velcro_insulated: 135, foodpanda_magnetic_insulated: 135,
            foodpanda_flip_insulated: 170
        }
    };

    // 日期管理器
    const dateManager = {
        state: { year: 2025, month: new Date().getMonth() + 1, day: new Date().getDate() },
        elements: {
            display: document.getElementById('date-display'),
            modal: document.getElementById('date-modal'),
            yearSelect: document.getElementById('year-select'),
            monthSelect: document.getElementById('month-select'),
            calendarDays: document.getElementById('calendar-days'),
            prevMonthBtn: document.getElementById('prev-month'),
            nextMonthBtn: document.getElementById('next-month')
        },
        init() {
            this.render();
            this.bindEvents();
        },
        render() {
            this.elements.display.textContent = 
                `${this.state.year}/${utils.padZero(this.state.month)}/${utils.padZero(this.state.day)}`;
            this.populateSelect(this.elements.yearSelect, 2025, 2054, this.state.year, false);
            this.populateSelect(this.elements.monthSelect, 1, 12, this.state.month, true);
            this.renderCalendar();
            calculateResult();
        },
        populateSelect(select, start, end, selected, pad) {
            select.innerHTML = '';
            for (let i = start; i <= end; i++) {
                select.add(new Option(pad ? utils.padZero(i) : i, i, i === selected));
            }
        },
        renderCalendar() {
            const today = new Date();
            const { year, month, day } = this.state;
            const firstDay = new Date(year, month - 1, 1);
            const daysInMonth = utils.getDaysInMonth(year, month);
            const startDay = firstDay.getDay();
            
            this.elements.calendarDays.innerHTML = '';
            
            const getAdjacentMonth = (offset) => {
                let m = month + offset;
                let y = year;
                if (m < 1) { m = 12; y--; }
                else if (m > 12) { m = 1; y++; }
                return { year: y, month: m };
            };
            
            const prev = getAdjacentMonth(-1);
            const prevMonthLastDay = utils.getDaysInMonth(prev.year, prev.month);
            
            // 上個月的日期
            for (let i = startDay - 1; i >= 0; i--) {
                this.elements.calendarDays.appendChild(
                    this.createDayElement(prevMonthLastDay - i, true, prev.year, prev.month)
                );
            }
            
            // 當月的日期
            const todayYear = today.getFullYear();
            const todayMonth = today.getMonth() + 1;
            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = todayYear === year && todayMonth === month && today.getDate() === d;
                this.elements.calendarDays.appendChild(
                    this.createDayElement(d, false, year, month, isToday, day === d)
                );
            }
            
            // 下個月的日期（填滿剩餘格子）
            const next = getAdjacentMonth(1);
            const remainingCells = 42 - this.elements.calendarDays.children.length;
            for (let d = 1; d <= remainingCells; d++) {
                this.elements.calendarDays.appendChild(
                    this.createDayElement(d, true, next.year, next.month)
                );
            }
        },
        createDayElement(day, isOtherMonth, year, month, isToday = false, isSelected = false) {
            const dayEl = document.createElement('div');
            dayEl.className = 'calendar-day' + 
                (isOtherMonth ? ' other-month' : '') +
                (isToday ? ' today' : '') +
                (isSelected ? ' selected' : '');
            dayEl.textContent = day;
            dayEl.addEventListener('click', () => {
                Object.assign(this.state, { year, month, day });
                this.elements.modal.style.display = 'none';
                this.render();
            });
            return dayEl;
        },
        resetToToday() {
            const today = new Date();
            this.state.year = Math.max(2025, today.getFullYear());
            this.state.month = today.getMonth() + 1;
            this.state.day = today.getDate();
            this.render();
        },
        adjustDayIfNeeded() {
            const maxDays = utils.getDaysInMonth(this.state.year, this.state.month);
            if (this.state.day > maxDays) this.state.day = maxDays;
        },
        changeMonth(delta) {
            let { year, month } = this.state;
            month += delta;
            if (month > 12) { month = 1; year++; }
            else if (month < 1) { month = 12; year--; }
            Object.assign(this.state, { year, month });
            this.adjustDayIfNeeded();
            this.render();
        },
        bindEvents() {
            this.elements.display.addEventListener('click', () => {
                this.elements.modal.style.display = this.elements.modal.style.display === 'block' ? 'none' : 'block';
            });
            document.getElementById('reset-date-button').addEventListener('click', () => this.resetToToday());
            this.elements.prevMonthBtn.addEventListener('click', () => this.changeMonth(-1));
            this.elements.nextMonthBtn.addEventListener('click', () => this.changeMonth(1));
            [this.elements.yearSelect, this.elements.monthSelect].forEach(select => {
                select.addEventListener('change', e => {
                    const value = +e.target.value;
                    if (select === this.elements.yearSelect) {
                        this.state.year = value;
                    } else {
                        this.state.month = value;
                    }
                    this.adjustDayIfNeeded();
                    this.render();
                });
            });
            document.addEventListener('click', (e) => {
                const resetBtn = document.getElementById('reset-date-button');
                if (!this.elements.modal.contains(e.target) && 
                    !this.elements.display.contains(e.target) &&
                    !resetBtn.contains(e.target)) {
                    this.elements.modal.style.display = 'none';
                }
            }, true);
        }
    };

    // 表達式解析器
    const expressionParser = {
        evaluate(expr) {
            if (!expr || (expr = String(expr).trim()) === '' || expr === '0') return expr === '0' ? '0' : '';
            try {
                const tokens = (expr.match(/(\d+|\+|\-|\*|\/)/g) || []).map(t => /\d+/.test(t) ? +t : t);
                if (!tokens.length) return '';
                const ops = { '+': (a, b) => a + b, '-': (a, b) => a - b, '*': (a, b) => a * b, '/': (a, b) => Math.floor(a / b) };
                const stack = [];
                let num = 0, op = '+';
                for (const token of tokens) {
                    if (typeof token === 'number') {
                        num = token;
                        if (op === '+') stack.push(num);
                        else if (op === '-') stack.push(-num);
                        else stack.push(ops[op](stack.pop(), num));
                    } else {
                        op = token;
                    }
                }
                const result = Math.max(0, Math.round(stack.reduce((a, b) => a + b, 0)));
                return result === 0 && expr !== '0' ? '' : String(result);
            } catch {
                return '';
            }
        }
    };

    // 輸入管理器
    const inputManager = {
        inputs: [],
        previousValues: {},
        hasLostFocus: {},
        currentInput: null,
        windowBlurred: false,
        
        commitInput(input) {
            if (!input) return;
            const originalValue = String(input.value);
            let newValue = expressionParser.evaluate(originalValue);
            if (originalValue !== newValue) input.value = newValue;
            
            const previousValue = this.previousValues[input.name] || 0;
            if (previousValue > 0 && (newValue === '0' || newValue !== '')) {
                const parsedNewValue = +newValue || 0;
                const sum = parsedNewValue + previousValue;
                input.value = sum === 0 && originalValue !== '0' ? '' : String(sum);
                this.previousValues[input.name] = 0;
            }
            calculateResult();
        },
        
        setupInput(input, index) {
            if (input.id === 'cost-note-input') return;
            
            this.previousValues[input.name] = 0;
            this.hasLostFocus[input.name] = false;
            
            input.addEventListener('focus', () => {
                this.currentInput = input;
                if (this.windowBlurred) {
                    this.windowBlurred = false;
                    return;
                }
                const currentValue = input.value;
                if (this.hasLostFocus[input.name] && currentValue !== '') {
                    this.previousValues[input.name] = +currentValue || 0;
                    input.value = '';
                    this.hasLostFocus[input.name] = false;
                }
            });
            
            input.addEventListener('blur', () => {
                this.commitInput(input);
                this.hasLostFocus[input.name] = true;
                this.currentInput = null;
            });
            
            input.addEventListener('click', () => {
                if (input.value) {
                    const originalValue = input.value;
                    const newValue = expressionParser.evaluate(originalValue);
                    if (originalValue !== newValue) {
                        input.value = newValue;
                        calculateResult();
                    }
                }
                utils.setCursorEnd(input);
            });
            
            input.addEventListener('keydown', e => {
                if (e.key === 'Delete') {
                    input.value = '';
                    this.previousValues[input.name] = 0;
                    this.hasLostFocus[input.name] = false;
                    calculateResult();
                } else if (e.key === 'Enter') {
                    this.commitInput(input);
                    const nextInput = this.inputs[(index + 1) % this.inputs.length];
                    nextInput.focus();
                    utils.setCursorEnd(nextInput);
                }
            });
        },
        
        setupExchangeRateInput() {
            const exchangeRateInput = document.getElementById('cost-note-input');
            if (!exchangeRateInput) return;
            
            const updateRate = () => resultManager.updateExchangeRate();
            ['input', 'blur'].forEach(evt => exchangeRateInput.addEventListener(evt, updateRate));
            exchangeRateInput.addEventListener('keydown', e => {
                if (e.key === 'Delete') {
                    exchangeRateInput.value = '';
                    updateRate();
                } else if (e.key === 'Enter') {
                    updateRate();
                }
            });
            exchangeRateInput.addEventListener('click', e => {
                e.stopPropagation();
                utils.setCursorEnd(exchangeRateInput);
            });
        },
        
        init() {
            this.inputs = Array.from(document.querySelectorAll('input[type="text"]'));
            this.inputs.forEach((input, index) => this.setupInput(input, index));
            
            window.addEventListener('blur', () => {
                this.windowBlurred = true;
                if (this.currentInput && !this.currentInput.id.includes('cost-note')) {
                    this.commitInput(this.currentInput);
                }
            });
            
            window.addEventListener('focus', () => {
                this.windowBlurred = false;
            });
            
            this.setupExchangeRateInput();
        }
    };

    // 結果管理器
    const resultManager = {
        hudDisplay: document.getElementById('hud-display'),
        costDisplay: document.getElementById('cost-display'),
        costSummary: document.getElementById('cost-summary'),
        currentTotalCost: 0,
        
        update() {
            const { year, month, day } = dateManager.state;
            const formattedDate = `${year}/${utils.padZero(month)}/${utils.padZero(day)}訂單`;
            const allItems = inputManager.inputs
                .filter(input => input.id !== 'cost-note-input' && input.value)
                .map(input => {
                    const value = +input.value || 0;
                    if (value <= 0) return null;
                    const name = input.name;
                    const limit = productConfig.limits[name];
                    const boxes = Math.ceil(value / limit);
                    const excess = boxes * limit - value;
                    return {
                        label: input.parentElement.querySelector('.label').textContent.trim(),
                        count: value,
                        boxes,
                        limit,
                        excess,
                        cost: value * (productConfig.unitPrices[name] || 0)
                    };
                })
                .filter(item => item !== null);
            
            this.currentTotalCost = allItems.reduce((sum, item) => sum + item.cost, 0);
            this.hudDisplay.innerHTML = `<p>${formattedDate}</p>` + 
                allItems.map(item => 
                    `<p>${item.label} ×${item.boxes}${item.excess > 0 ? ` 【餘${item.excess}件】` : ''}</p>`
                ).join('');
            this.updateCostDisplay(allItems, this.currentTotalCost, formattedDate);
        },
        
        updateCostDisplay(items, totalCost, date) {
            const costItems = items.filter(item => item.cost > 0);
            const costHTML = `<p>${date}</p>` + (costItems.length > 0
                ? costItems.map(item => `<p>${item.label} * ${item.count} = ${utils.formatNumber(item.cost)} 元</p>`).join('')
                : '<p>尚無成本資料</p>');
            this.costDisplay.innerHTML = costHTML;
            this.costSummary.style.display = costItems.length > 0 ? 'block' : 'none';
            if (costItems.length > 0) this.updateExchangeRate();
        },
        
        updateExchangeRate() {
            const exchangeRateInput = document.getElementById('cost-note-input');
            const totalCostElement = document.getElementById('total-cost-amount');
            if (!exchangeRateInput || !totalCostElement) return;
            
            const exchangeRate = +exchangeRateInput.value;
            const displayCost = (exchangeRate && !isNaN(exchangeRate) && this.currentTotalCost > 0) 
                ? this.currentTotalCost * exchangeRate 
                : this.currentTotalCost;
            totalCostElement.textContent = utils.formatNumber(displayCost);
        },
        
        async copyBoxes() {
            const text = Array.from(this.hudDisplay.querySelectorAll('p'))
                .map(p => p.textContent)
                .join('\n');
            try {
                await navigator.clipboard.writeText(text);
                alert('複製成功');
            } catch {
                alert('複製失敗');
            }
        },
        
        init() {
            this.hudDisplay.addEventListener('click', () => this.copyBoxes());
            this.update();
        }
    };

    // 初始化HTML結構
    function initHTML() {
        document.getElementById('categories-container').innerHTML = inputConfig.map(config => `
            <div class="category-section">
                <div class="category-title">${config.category}</div>
                <div class="grid-container" data-category="${config.category.toLowerCase()}">
                    ${config.items.map(item => `
                        <div class="cyber-input">
                            <span class="label">${item.label}</span>
                            <input type="text" name="${item.name}" value="">
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    const calculateResult = () => resultManager.update();

    // 初始化
    initHTML();
    dateManager.init();
    inputManager.init();
    resultManager.init();
</script>
