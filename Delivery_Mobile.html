<div class="cyber-panel">
    <h1 style="text-align:center;margin-bottom:0.8rem;">📦 外送資產訂購單</h1>
    <div id="date-picker">
        <label style="color:var(--neon-cyan);margin-right:5px;">選擇日期：</label>
        <span id="date-display"></span>
        <button id="reset-date-button">今天</button>
        <div id="date-modal">
            <select id="year-select"></select>
            <select id="month-select"></select>
            <select id="day-select"></select>
        </div>
    </div>
    <div id="categories-container"></div>
    <div class="category-section">
        <div class="category-title">採購計算</div>
        <div id="hud-display"></div>
    </div>
    <div class="category-section">
        <div class="category-title">採購成本</div>
        <div id="cost-display" class="no-copy"></div>
        <div id="cost-summary" class="cost-summary no-copy">
            <div class="cost-total-row">
                <span class="cost-total">總成本: <span id="total-cost-amount">0</span> 元</span>
                <input type="text" id="cost-note-input" class="cost-note-input">
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --space-blue: #1a1a2e;
        --neon-cyan: #00f3ff;
        --cyber-purple: #712f79;
        --transition-time: 0.3s;
    }
    body {
        background: var(--space-blue);
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
    }
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
            linear-gradient(45deg, rgba(0,243,255,0.1) 1px, transparent 1px),
            linear-gradient(-45deg, rgba(0,243,255,0.1) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: -1;
        animation: gridMove 20s linear infinite;
    }
    body::after {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, transparent 0%, var(--space-blue) 100%);
        z-index: -1;
    }
    @keyframes gridMove {
        0% { background-position: 0 0; }
        100% { background-position: 40px 40px; }
    }
    .cyber-panel {
        background: var(--space-blue);
        color: var(--neon-cyan);
        border: 1px solid var(--neon-cyan);
        border-radius: 8px;
        padding: 0.5rem;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 0 15px rgba(0,243,255,0.2);
        box-sizing: border-box;
        margin: 0 auto;
    }
    .category-section {
        margin-bottom: 0.8rem;
    }
    .category-title {
        color: var(--neon-cyan);
        font-size: 1.2rem;
        margin-bottom: 0.4rem;
        border-bottom: 1px solid var(--cyber-purple);
        padding-bottom: 0.2rem;
    }
    .grid-container {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.5rem;
        padding: 0.5rem 0;
    }
    .cyber-input {
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--cyber-purple);
        border-radius: 6px;
        padding: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: all var(--transition-time) cubic-bezier(0.4, 0, 0.2, 1);
    }
    .cyber-input:hover {
        transform: translateY(-2px);
        box-shadow: 0 3px 10px rgba(113,47,121,0.4);
    }
    .cyber-input .label {
        text-align: left;
    }
    input[type="text"] {
        width: 80px;
        padding: 0.5rem;
        background: transparent;
        border: 1px solid var(--neon-cyan);
        border-radius: 4px;
        color: var(--neon-cyan);
        font-size: 1rem;
        text-align: center;
        transition: border-color var(--transition-time);
    }
    input[type="text"]:focus {
        border-color: var(--cyber-purple);
        outline: none;
    }
    #hud-display, #cost-display {
        background: rgba(0,0,0,0.5);
        border: 1px solid var(--neon-cyan);
        border-radius: 6px;
        padding: 0.8rem;
        margin-top: 0.8rem;
        text-align: left;
        backdrop-filter: blur(8px);
        transition: border-color var(--transition-time);
    }
    #hud-display {
        cursor: pointer;
    }
    #hud-display:hover {
        border-color: var(--cyber-purple);
    }
    #hud-display p, #cost-display p {
        margin: 3px 0;
        font-size: 1rem;
        color: var(--neon-cyan);
    }
    .cost-summary {
        background: rgba(0,0,0,0.5);
        border: 1px solid var(--neon-cyan);
        border-radius: 6px;
        padding: 0.8rem;
        margin-top: 0.8rem;
        backdrop-filter: blur(8px);
        transition: border-color var(--transition-time);
        display: none;
    }
    .cost-total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .cost-total {
        font-weight: bold;
        color: var(--neon-cyan);
        font-size: 1.1rem;
    }
    .cost-note-input {
        width: 80px;
        padding: 0.4rem;
        background: rgba(0,0,0,0.3);
        border: 1px solid var(--neon-cyan);
        border-radius: 4px;
        color: var(--neon-cyan);
        font-size: 0.9rem;
        text-align: center;
        transition: all var(--transition-time);
    }
    .cost-note-input:focus {
        border-color: var(--cyber-purple);
        outline: none;
    }
    #date-picker {
        text-align: center;
        margin-bottom: 0.4rem;
        position: relative;
    }
    #date-display {
        background: transparent;
        border: 1px solid var(--neon-cyan);
        color: var(--neon-cyan);
        padding: 0.3rem 0.8rem;
        border-radius: 4px;
        cursor: pointer;
        display: inline-block;
        margin-left: 5px;
        transition: box-shadow var(--transition-time);
    }
    #date-display:hover {
        box-shadow: 0 0 8px rgba(0,243,255,0.5);
    }
    #date-modal {
        display: none;
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.8);
        border: 1px solid var(--neon-cyan);
        border-radius: 6px;
        padding: 0.5rem;
        z-index: 10;
        box-shadow: 0 0 15px rgba(0,243,255,0.3);
    }
    #date-modal select {
        background: var(--space-blue);
        border: 1px solid var(--cyber-purple);
        color: var(--neon-cyan);
        padding: 0.3rem;
        margin: 0.3rem;
        border-radius: 4px;
        font-size: 0.9rem;
    }
    #reset-date-button {
        margin-left: 5px;
        padding: 3px 8px;
        background: var(--cyber-purple);
        border: 1px solid var(--neon-cyan);
        border-radius: 4px;
        color: var(--neon-cyan);
        cursor: pointer;
        transition: all var(--transition-time);
    }
    #reset-date-button:hover {
        background: var(--neon-cyan);
        color: var(--space-blue);
    }
    @media (max-width: 480px) {
        .cyber-panel {
            padding: 0.4rem;
            max-width: 100%;
        }
        .category-title {
            font-size: 1.1rem;
        }
        .cyber-input {
            padding: 0.4rem;
        }
        input[type="text"] {
            width: 70px;
            font-size: 0.9rem;
        }
        #hud-display, #cost-display {
            padding: 0.6rem;
        }
    }
</style>

<script>
    // 工具函數
    const utils = {
        padZero: num => String(num).padStart(2, '0'),
        getDaysInMonth: (year, month) => new Date(year, month, 0).getDate(),
        formatNumber: num => num.toLocaleString(),
        setCursorEnd: input => setTimeout(() => {
            input.selectionStart = input.selectionEnd = input.value.length;
        }, 0)
    };

    // 輸入框配置數據
    const inputConfig = [
        { category: 'UberEats', items: [
            { label: 'UberEats提袋', name: 'ubereats_bag' },
            { label: 'UberEats六格箱', name: 'ubereats_6grid' },
            { label: 'UberEats八格箱', name: 'ubereats_8grid' }
        ]},
        { category: 'FoodPanda', items: [
            { label: 'FoodPanda提袋', name: 'foodpanda_bag' },
            { label: 'FoodPanda六格箱', name: 'foodpanda_6grid' },
            { label: 'FoodPanda八格箱', name: 'foodpanda_8grid' },
            { label: 'FoodPanda 2022六格箱', name: 'foodpanda_2022_6grid' },
            { label: 'FoodPanda 2022八格箱', name: 'foodpanda_2022_8grid' },
            { label: 'FoodPanda魔鬼氈保溫箱', name: 'foodpanda_velcro_insulated' },
            { label: 'FoodPanda磁吸式保溫箱', name: 'foodpanda_magnetic_insulated' },
            { label: 'FoodPanda上掀款保溫箱', name: 'foodpanda_flip_insulated' }
        ]}
    ];

    // 限制和單價配置
    const productConfig = {
        limits: {
            ubereats_bag: 50, ubereats_6grid: 15, ubereats_8grid: 13,
            foodpanda_bag: 80, foodpanda_6grid: 15, foodpanda_8grid: 13,
            foodpanda_2022_6grid: 15, foodpanda_2022_8grid: 13,
            foodpanda_velcro_insulated: 10, foodpanda_magnetic_insulated: 10,
            foodpanda_flip_insulated: 6
        },
        unitPrices: {
            ubereats_bag: 10, foodpanda_bag: 13,
            ubereats_6grid: 65, ubereats_8grid: 70,
            foodpanda_6grid: 65, foodpanda_8grid: 70,
            foodpanda_2022_6grid: 65, foodpanda_2022_8grid: 70,
            foodpanda_velcro_insulated: 135, foodpanda_magnetic_insulated: 135,
            foodpanda_flip_insulated: 170
        }
    };

    // 日期管理器
    const dateManager = {
        state: { year: 2025, month: new Date().getMonth() + 1, day: new Date().getDate() },
        elements: {
            display: document.getElementById('date-display'),
            modal: document.getElementById('date-modal'),
            yearSelect: document.getElementById('year-select'),
            monthSelect: document.getElementById('month-select'),
            daySelect: document.getElementById('day-select')
        },
        init() {
            this.render();
            this.bindEvents();
        },
        render() {
            this.elements.display.textContent = 
                `${this.state.year}/${utils.padZero(this.state.month)}/${utils.padZero(this.state.day)}`;
            this.populateSelect(this.elements.yearSelect, 2025, 2054, this.state.year, false);
            this.populateSelect(this.elements.monthSelect, 1, 12, this.state.month, true);
            this.populateDays();
            calculateResult();
        },
        populateSelect(select, start, end, selected, pad) {
            select.innerHTML = '';
            for (let i = start; i <= end; i++) {
                const value = pad ? utils.padZero(i) : i;
                select.add(new Option(value, i, i === selected));
            }
        },
        populateDays() {
            const days = utils.getDaysInMonth(this.state.year, this.state.month);
            this.populateSelect(this.elements.daySelect, 1, days, this.state.day, true);
        },
        resetToToday() {
            const today = new Date();
            this.state.year = Math.max(2025, today.getFullYear());
            this.state.month = today.getMonth() + 1;
            this.state.day = today.getDate();
            this.render();
        },
        bindEvents() {
            this.elements.display.addEventListener('click', () => {
                this.elements.modal.style.display = 'block';
                calculateResult();
            });
            document.getElementById('reset-date-button').addEventListener('click', () => this.resetToToday());
            this.elements.yearSelect.addEventListener('change', e => {
                this.state.year = parseInt(e.target.value);
                this.render();
            });
            this.elements.monthSelect.addEventListener('change', e => {
                this.state.month = parseInt(e.target.value);
                this.render();
            });
            this.elements.daySelect.addEventListener('change', e => {
                this.state.day = parseInt(e.target.value);
                this.elements.modal.style.display = 'none';
                this.render();
            });
        }
    };

    // 表達式解析器
    const expressionParser = {
        evaluate(expr) {
            if (!expr || (expr = String(expr).trim()) === '') return '';
            if (expr === '0') return '0';
            try {
                const tokens = (expr.match(/(\d+|\+|\-|\*|\/)/g) || []).map(t => 
                    /\d+/.test(t) ? parseInt(t) : t
                );
                if (tokens.length === 0) return '';
                const stack = [];
                let num = 0, op = '+';
                for (let token of tokens) {
                    if (typeof token === 'number') {
                        num = token;
                        if (op === '+') stack.push(num);
                        else if (op === '-') stack.push(-num);
                        else if (op === '*') stack.push(stack.pop() * num);
                        else if (op === '/') stack.push(Math.floor(stack.pop() / num));
                    } else {
                        op = token;
                    }
                }
                const result = Math.max(0, Math.round(stack.reduce((a, b) => a + b, 0)));
                return result === 0 && expr !== '0' ? '' : String(result);
            } catch (e) {
                return '';
            }
        }
    };

    // 輸入管理器
    const inputManager = {
        inputs: [],
        previousValues: {},
        hasLostFocus: {},
        currentInput: null,
        windowBlurred: false,
        
        commitInput(input) {
            if (!input) return;
            const originalValue = String(input.value);
            const newValue = expressionParser.evaluate(originalValue);
            if (originalValue !== newValue) input.value = newValue;
            
            const previousValue = this.previousValues[input.name] || 0;
            if (previousValue > 0 && (newValue === '0' || newValue !== '')) {
                const parsedNewValue = parseFloat(newValue) || 0;
                const sum = parsedNewValue + previousValue;
                input.value = sum === 0 && originalValue !== '0' ? '' : String(sum);
                this.previousValues[input.name] = 0;
            }
            calculateResult();
        },
        
        setupInput(input, index) {
            if (input.id === 'cost-note-input') return;
            
            this.previousValues[input.name] = 0;
            this.hasLostFocus[input.name] = false;
            
            input.addEventListener('focus', () => {
                this.currentInput = input;
                if (this.windowBlurred) {
                    this.windowBlurred = false;
                    return;
                }
                const currentValue = input.value;
                if (this.hasLostFocus[input.name] && currentValue !== '') {
                    this.previousValues[input.name] = parseFloat(currentValue) || 0;
                    input.value = '';
                    this.hasLostFocus[input.name] = false;
                }
            });
            
            input.addEventListener('blur', () => {
                this.commitInput(input);
                this.hasLostFocus[input.name] = true;
                this.currentInput = null;
            });
            
            input.addEventListener('click', () => {
                if (input.value) {
                    const originalValue = input.value;
                    const newValue = expressionParser.evaluate(originalValue);
                    if (originalValue !== newValue) {
                        input.value = newValue;
                        calculateResult();
                    }
                }
                utils.setCursorEnd(input);
            });
            
            input.addEventListener('keydown', e => {
                if (e.key === 'Delete') {
                    input.value = '';
                    this.previousValues[input.name] = 0;
                    this.hasLostFocus[input.name] = false;
                    calculateResult();
                    return;
                }
                if (e.key === 'Enter') {
                    this.commitInput(input);
                    const nextInput = this.inputs[(index + 1) % this.inputs.length];
                    nextInput.focus();
                    utils.setCursorEnd(nextInput);
                }
            });
        },
        
        setupExchangeRateInput() {
            const exchangeRateInput = document.getElementById('cost-note-input');
            if (!exchangeRateInput) return;
            
            const updateRate = () => resultManager.updateExchangeRate();
            exchangeRateInput.addEventListener('input', updateRate);
            exchangeRateInput.addEventListener('blur', updateRate);
            exchangeRateInput.addEventListener('keydown', e => {
                if (e.key === 'Delete') {
                    exchangeRateInput.value = '';
                    updateRate();
                } else if (e.key === 'Enter') {
                    updateRate();
                }
            });
            exchangeRateInput.addEventListener('click', e => {
                e.stopPropagation();
                utils.setCursorEnd(exchangeRateInput);
            });
        },
        
        init() {
            this.inputs = Array.from(document.querySelectorAll('input[type="text"]'));
            this.inputs.forEach((input, index) => this.setupInput(input, index));
            
            window.addEventListener('blur', () => {
                this.windowBlurred = true;
                if (this.currentInput && !this.currentInput.id.includes('cost-note')) {
                    this.commitInput(this.currentInput);
                }
            });
            
            window.addEventListener('focus', () => {
                this.windowBlurred = false;
            });
            
            this.setupExchangeRateInput();
        }
    };

    // 結果管理器
    const resultManager = {
        hudDisplay: document.getElementById('hud-display'),
        costDisplay: document.getElementById('cost-display'),
        costSummary: document.getElementById('cost-summary'),
        currentTotalCost: 0,
        
        update() {
            const formattedDate = `${dateManager.state.year}/${utils.padZero(dateManager.state.month)}/${utils.padZero(dateManager.state.day)}訂單`;
            const allItems = [];
            let totalCost = 0;
            
            inputManager.inputs.forEach(input => {
                if (input.id === 'cost-note-input' || input.value === '') return;
                const value = parseFloat(input.value) || 0;
                if (value <= 0) return;
                
                const boxes = Math.ceil(value / productConfig.limits[input.name]);
                const label = input.parentElement.querySelector('.label').textContent.trim();
                const unitPrice = productConfig.unitPrices[input.name] || 0;
                const cost = value * unitPrice;
                
                allItems.push({ label, count: value, boxes, cost, unitPrice });
                totalCost += cost;
            });
            
            this.currentTotalCost = totalCost;
            this.hudDisplay.innerHTML = `<p>${formattedDate}</p>` + 
                allItems.map(item => `<p>${item.label} ×${item.boxes}</p>`).join('');
            
            this.updateCostDisplay(allItems, totalCost, formattedDate);
            this.updateExchangeRate();
        },
        
        updateCostDisplay(items, totalCost, date) {
            const costItems = items.filter(item => item.cost > 0);
            let costHTML = `<p>${date}</p>`;
            
            if (costItems.length > 0) {
                costHTML += costItems.map(item => 
                    `<p>${item.label} * ${item.count} = ${utils.formatNumber(item.cost)} 元</p>`
                ).join('');
                this.costDisplay.innerHTML = costHTML;
                this.updateExchangeRate();
                this.costSummary.style.display = 'block';
            } else {
                costHTML += '<p>尚無成本資料</p>';
                this.costDisplay.innerHTML = costHTML;
                this.costSummary.style.display = 'none';
            }
        },
        
        updateExchangeRate() {
            const exchangeRateInput = document.getElementById('cost-note-input');
            const totalCostElement = document.getElementById('total-cost-amount');
            if (!exchangeRateInput || !totalCostElement) return;
            
            const exchangeRate = parseFloat(exchangeRateInput.value);
            const displayCost = (exchangeRate && !isNaN(exchangeRate) && this.currentTotalCost > 0) 
                ? this.currentTotalCost * exchangeRate 
                : this.currentTotalCost;
            totalCostElement.textContent = utils.formatNumber(displayCost);
        },
        
        copyBoxes() {
            const text = Array.from(this.hudDisplay.querySelectorAll('p'))
                .map(p => p.textContent)
                .join('\n');
            navigator.clipboard.writeText(text)
                .then(() => alert('複製成功'))
                .catch(() => alert('複製失敗'));
        },
        
        init() {
            this.hudDisplay.addEventListener('click', () => this.copyBoxes());
            this.update();
        }
    };

    // 初始化HTML結構
    function initHTML() {
        const container = document.getElementById('categories-container');
        container.innerHTML = inputConfig.map(config => `
            <div class="category-section">
                <div class="category-title">${config.category}</div>
                <div class="grid-container" data-category="${config.category.toLowerCase()}">
                    ${config.items.map(item => `
                        <div class="cyber-input">
                            <span class="label">${item.label}</span>
                            <input type="text" name="${item.name}" value="">
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function calculateResult() {
        resultManager.update();
    }

    // 初始化
    initHTML();
    dateManager.init();
    inputManager.init();
    resultManager.init();
</script>
