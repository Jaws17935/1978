<div class="cyber-panel">
    <h1 style="text-align:center;margin-bottom:2rem;">📦 外送資產訂購單</h1>
    <div id="date-picker">
        <label style="color:var(--neon-cyan);margin-right:10px;">選擇日期：</label>
        <span id="date-display"></span>
        <button id="reset-date-button">今天</button>
        <div id="date-modal">
            <select id="year-select"></select>
            <select id="month-select"></select>
            <select id="day-select"></select>
        </div>
    </div>

    <div class="category-section">
        <div class="category-title">UberEats</div>
        <div class="grid-container" data-category="ubereats">
            <div class="cyber-input">UberEats提袋 <input type="number" name="ubereats_bag" value="" min="0" step="1"></div>
            <div class="cyber-input">UberEats六格箱 <input type="number" name="ubereats_6grid" value="" min="0" step="1"></div>
            <div class="cyber-input">UberEats八格箱 <input type="number" name="ubereats_8grid" value="" min="0" step="1"></div>
        </div>
    </div>

    <div class="category-section">
        <div class="category-title">FoodPanda</div>
        <div class="grid-container" data-category="foodpanda">
            <div class="cyber-input">FoodPanda提袋 <input type="number" name="foodpanda_bag" value="" min="0" step="1"></div>
            <div class="cyber-input">FoodPanda六格箱 <input type="number" name="foodpanda_6grid" value="" min="0" step="1"></div>
            <div class="cyber-input">FoodPanda八格箱 <input type="number" name="foodpanda_8grid" value="" min="0" step="1"></div>
            <div class="cyber-input">FoodPanda 2022六格箱 <input type="number" name="foodpanda_2022_6grid" value="" min="0" step="1"></div>
            <div class="cyber-input">FoodPanda 2022八格箱 <input type="number" name="foodpanda_2022_8grid" value="" min="0" step="1"></div>
            <div class="cyber-input">FoodPanda魔鬼氈保溫箱 <input type="number" name="foodpanda_velcro_insulated" value="" min="0" step="1"></div>
            <div class="cyber-input">FoodPanda磁吸保溫箱 <input type="number" name="foodpanda_magnetic_insulated" value="" min="0" step="1"></div>
            <div class="cyber-input">FoodPanda上掀款保溫箱 <input type="number" name="foodpanda_flip_insulated" value="" min="0" step="1"></div>
        </div>
    </div>

    <!-- 採購計算 -->
    <div class="category-section">
        <div class="category-title">採購計算</div>
        <div id="hud-display"></div>
    </div>

    <!-- 採購成本框架 -->
    <div class="category-section">
        <div class="category-title">採購成本</div>
        <div id="cost-display" class="no-copy"></div>
        <div id="cost-summary" class="cost-summary no-copy">
            <div class="cost-total-row">
                <span class="cost-total">總成本: <span id="total-cost-amount">0</span> 元</span>
                <input type="text" id="cost-note-input" class="cost-note-input">
            </div>
        </div>
    </div>
</div>

<style>
    :root {
        --space-blue: #1a1a2e;
        --neon-cyan: #00f3ff;
        --cyber-purple: #712f79;
        --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --bg-dark: rgba(0,0,0,0.3);
        --bg-modal: rgba(0,0,0,0.8);
        --bg-display: rgba(0,0,0,0.5);
    }
    
    body {
        background-color: #0a0a1a;
        margin: 0;
        padding: 20px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
    }
    
    .cyber-panel {
        background: var(--space-blue);
        color: var(--neon-cyan);
        border: 2px solid var(--neon-cyan);
        border-radius: 16px;
        padding: 2rem;
        width: 100%;
        max-width: none;
        box-shadow: 0 0 30px rgba(0,243,255,0.2);
        box-sizing: border-box;
    }
    
    .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
        padding: 1rem 0;
    }
    
    .category-section {
        margin-bottom: 2rem;
    }
    
    .category-title {
        color: var(--neon-cyan);
        font-size: 1.5rem;
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--cyber-purple);
        padding-bottom: 0.5rem;
    }
    
    .cyber-input {
        background: var(--bg-dark);
        border: 1px solid var(--cyber-purple);
        border-radius: 8px;
        padding: 1rem;
        transition: all var(--transition);
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    
    .cyber-input:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(113,47,121,0.4);
    }
    
    input[type="number"] {
        width: 120px;
        padding: 0.8rem;
        background: transparent;
        border: 1px solid var(--neon-cyan);
        border-radius: 6px;
        color: var(--neon-cyan);
        font-size: 1.1rem;
        text-align: center;
        transition: border-color var(--transition);
        -moz-appearance: textfield;
        appearance: textfield;
    }
    
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
        -webkit-appearance: none;
        appearance: none;
        margin: 0;
    }
    
    input[type="number"]:focus {
        border-color: var(--cyber-purple);
        outline: none;
    }
    
    .no-copy {
        cursor: default;
    }
    
    #hud-display p, #cost-display p {
        margin: 5px 0;
        font-size: 1.2rem;
        color: var(--neon-cyan);
    }
    
    .cost-summary {
        background: var(--bg-display);
        border: 3px solid var(--neon-cyan);
        border-radius: 12px;
        padding: 1.5rem 2rem;
        margin-top: 1rem;
        backdrop-filter: blur(10px);
        transition: border-color var(--transition);
        display: none;
    }
    
    .cost-total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .cost-total {
        font-weight: bold;
        color: var(--neon-cyan);
        font-size: 1.4rem;
    }
    
    .cost-note-input {
        width: 180px;
        padding: 0.6rem;
        background: var(--bg-dark);
        border: 1px solid var(--neon-cyan);
        border-radius: 6px;
        color: var(--neon-cyan);
        font-size: 1rem;
        text-align: center;
        transition: all var(--transition);
    }
    
    .cost-note-input:focus {
        border-color: var(--cyber-purple);
        outline: none;
        box-shadow: 0 0 10px rgba(0,243,255,0.3);
    }
    
    .cost-note-input::placeholder {
        color: rgba(0,243,255,0.5);
    }
    
    #date-picker {
        text-align: center;
        margin-bottom: 1rem;
        position: relative;
    }
    
    #date-display {
        background: transparent;
        border: 1px solid var(--neon-cyan);
        color: var(--neon-cyan);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        cursor: pointer;
        display: inline-block;
        margin-left: 10px;
        transition: box-shadow var(--transition);
    }
    
    #date-display:hover {
        box-shadow: 0 0 10px rgba(0,243,255,0.5);
    }
    
    #date-modal {
        display: none;
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-modal);
        border: 1px solid var(--neon-cyan);
        border-radius: 8px;
        padding: 1rem;
        z-index: 10;
        box-shadow: 0 0 20px rgba(0,243,255,0.3);
    }
    
    #date-modal select {
        background: var(--space-blue);
        border: 1px solid var(--cyber-purple);
        color: var(--neon-cyan);
        padding: 0.5rem;
        margin: 0.5rem;
        border-radius: 4px;
        font-size: 1rem;
    }
    
    #reset-date-button {
        margin-left: 10px;
        padding: 5px 10px;
        background: var(--cyber-purple);
        border: 1px solid var(--neon-cyan);
        border-radius: 6px;
        color: var(--neon-cyan);
        cursor: pointer;
        transition: all var(--transition);
    }
    
    #reset-date-button:hover {
        background: var(--neon-cyan);
        color: var(--space-blue);
    }
    
    #hud-display, #cost-display {
        background: var(--bg-display);
        border: 3px solid var(--neon-cyan);
        border-radius: 12px;
        padding: 2rem;
        margin-top: 1rem;
        text-align: left;
        backdrop-filter: blur(10px);
        transition: border-color var(--transition);
    }
    
    #hud-display {
        cursor: pointer;
    }
    
    #hud-display:hover {
        border-color: var(--cyber-purple);
    }
</style>

<script>
    const utils = {
        padZero: num => String(num).padStart(2, '0'),
        getDaysInMonth: (year, month) => new Date(year, month, 0).getDate(),
        formatNumber: num => num.toLocaleString()
    };

    const dateManager = {
        state: { year: 2025, month: new Date().getMonth() + 1, day: new Date().getDate() },
        elements: {
            display: document.getElementById('date-display'),
            modal: document.getElementById('date-modal'),
            yearSelect: document.getElementById('year-select'),
            monthSelect: document.getElementById('month-select'),
            daySelect: document.getElementById('day-select'),
            resetBtn: document.getElementById('reset-date-button')
        },

        init() {
            this.render();
            this.bindEvents();
        },

        render() {
            this.elements.display.textContent = 
                `${this.state.year}/${utils.padZero(this.state.month)}/${utils.padZero(this.state.day)}`;
            this.populateSelect(this.elements.yearSelect, 2025, 2054, this.state.year, false);
            this.populateSelect(this.elements.monthSelect, 1, 12, this.state.month, true);
            this.populateDays();
            calculateResult();
        },

        populateSelect(select, start, end, selected, pad) {
            select.innerHTML = '';
            for (let i = start; i <= end; i++) {
                const value = pad ? utils.padZero(i) : i;
                select.add(new Option(value, i, i === selected));
            }
        },

        populateDays() {
            const days = utils.getDaysInMonth(this.state.year, this.state.month);
            this.populateSelect(this.elements.daySelect, 1, days, this.state.day, true);
        },

        resetToToday() {
            const today = new Date();
            this.state.year = Math.max(2025, today.getFullYear());
            this.state.month = today.getMonth() + 1;
            this.state.day = today.getDate();
            this.render();
        },

        bindEvents() {
            this.elements.display.addEventListener('click', () => {
                this.elements.modal.style.display = 'block';
                calculateResult();
            });
            this.elements.resetBtn.addEventListener('click', () => this.resetToToday());
            [this.elements.yearSelect, this.elements.monthSelect].forEach(select => {
                select.addEventListener('change', e => {
                    this.state[select === this.elements.yearSelect ? 'year' : 'month'] = parseInt(e.target.value);
                    this.render();
                });
            });
            this.elements.daySelect.addEventListener('change', e => {
                this.state.day = parseInt(e.target.value);
                this.elements.modal.style.display = 'none';
                this.render();
            });
        }
    };

    const inputManager = {
        inputs: Array.from(document.querySelectorAll('input[type="number"]')).filter(i => i.id !== 'cost-note-input'),
        previousValues: {},
        currentInput: null,
        isFirstLoad: true,
        deleteCount: {},
        deleteTimers: {},
        
        expressionParser: {
            evaluate(expr) {
                if (!expr) return '';
                const trimmed = String(expr).trim();
                if (!trimmed || trimmed === '0') return trimmed === '0' ? '0' : '';
                
                try {
                    const tokens = (trimmed.match(/(\d+|\+|\-|\*|\/)/g) || []).map(t => 
                        /\d+/.test(t) ? parseInt(t) : t
                    );
                    if (!tokens.length) return '';
                    
                    const stack = [];
                    let num = 0, op = '+';
                    for (const token of tokens) {
                        if (typeof token === 'number') {
                            num = token;
                            if (op === '+') stack.push(num);
                            else if (op === '-') stack.push(-num);
                            else if (op === '*') stack.push(stack.pop() * num);
                            else if (op === '/') stack.push(Math.floor(stack.pop() / num));
                        } else {
                            op = token;
                        }
                    }
                    const result = Math.max(0, Math.round(stack.reduce((a, b) => a + b, 0)));
                    return result === 0 && trimmed !== '0' ? '' : String(result);
                } catch (e) {
                    return '';
                }
            }
        },

        commitInput(input) {
            if (!input) return;
            const newValue = this.expressionParser.evaluate(input.value);
            if (!this.isFirstLoad && this.previousValues[input.name]) {
                input.value = String((parseFloat(this.previousValues[input.name]) || 0) + (parseFloat(newValue) || 0));
            } else {
                input.value = newValue;
            }
            this.previousValues[input.name] = input.value;
            calculateResult();
        },

        resetCurrentInput(input) {
            input.value = '';
            this.previousValues[input.name] = 0;
            calculateResult();
        },

        handleDelete(input) {
            if (this.deleteTimers[input.name]) clearTimeout(this.deleteTimers[input.name]);
            this.deleteCount[input.name] = (this.deleteCount[input.name] || 0) + 1;
            this.deleteTimers[input.name] = setTimeout(() => {
                this.deleteCount[input.name] = 0;
            }, 500);
            
            if (this.deleteCount[input.name] === 2) {
                this.resetCurrentInput(input);
            } else {
                input.value = '';
                calculateResult();
            }
        },

        init() {
            this.inputs.forEach(input => {
                this.previousValues[input.name] = 0;
                this.deleteCount[input.name] = 0;
                
                input.addEventListener('focus', () => {
                    this.currentInput = input;
                    if (!this.isFirstLoad) input.value = '';
                });
                
                input.addEventListener('blur', () => {
                    this.commitInput(input);
                    this.currentInput = null;
                    this.isFirstLoad = false;
                });
                
                input.addEventListener('click', () => {
                    const newValue = this.expressionParser.evaluate(input.value);
                    if (input.value !== newValue) {
                        input.value = newValue;
                        calculateResult();
                    }
                    setTimeout(() => {
                        input.setSelectionRange(input.value.length, input.value.length);
                    }, 0);
                });
                
                input.addEventListener('keydown', e => {
                    if (e.key === 'Delete' || e.key === 'Backspace') {
                        e.preventDefault();
                        this.handleDelete(input);
                        return;
                    }
                    if (e.key === 'Enter') {
                        this.commitInput(input);
                        const nextIndex = (this.inputs.indexOf(input) + 1) % this.inputs.length;
                        const nextInput = this.inputs[nextIndex];
                        nextInput.focus();
                        setTimeout(() => {
                            nextInput.setSelectionRange(nextInput.value.length, nextInput.value.length);
                        }, 0);
                    }
                });
            });
            
            window.addEventListener('blur', () => {
                if (this.currentInput) this.commitInput(this.currentInput);
            });
        }
    };

    const resultManager = {
        limits: {
            ubereats_bag: 50, ubereats_6grid: 15, ubereats_8grid: 13,
            foodpanda_bag: 80, foodpanda_6grid: 15, foodpanda_8grid: 13,
            foodpanda_2022_6grid: 15, foodpanda_2022_8grid: 13,
            foodpanda_velcro_insulated: 10, foodpanda_magnetic_insulated: 10,
            foodpanda_flip_insulated: 6
        },
        unitPrices: {
            ubereats_bag: 10, foodpanda_bag: 13,
            ubereats_6grid: 65, ubereats_8grid: 70,
            foodpanda_6grid: 65, foodpanda_8grid: 70,
            foodpanda_2022_6grid: 65, foodpanda_2022_8grid: 70,
            foodpanda_velcro_insulated: 135, foodpanda_magnetic_insulated: 135,
            foodpanda_flip_insulated: 170
        },
        elements: {
            hudDisplay: document.getElementById('hud-display'),
            costDisplay: document.getElementById('cost-display'),
            costSummary: document.getElementById('cost-summary'),
            exchangeRateInput: document.getElementById('cost-note-input'),
            totalCostElement: document.getElementById('total-cost-amount')
        },
        currentTotalCost: 0,

        update() {
            const formattedDate = `${dateManager.state.year}/${utils.padZero(dateManager.state.month)}/${utils.padZero(dateManager.state.day)}訂單`;
            const allItems = [];
            let totalCost = 0;
            
            inputManager.inputs.forEach(input => {
                const value = parseFloat(input.value) || 0;
                if (value <= 0) return;
                
                const label = input.parentElement.textContent.trim().replace(/\s*<input[^>]*>$/i, '');
                const boxes = Math.ceil(value / (this.limits[input.name] || 1));
                const cost = value * (this.unitPrices[input.name] || 0);
                
                allItems.push({ label, count: value, boxes, cost });
                totalCost += cost;
            });
            
            this.currentTotalCost = totalCost;
            this.elements.hudDisplay.innerHTML = `<p>${formattedDate}</p>` + 
                allItems.map(item => `<p>${item.label} ×${item.boxes}</p>`).join('');
            
            this.updateCostDisplay(allItems, formattedDate);
            this.updateExchangeRate();
        },

        updateCostDisplay(items, date) {
            const costItems = items.filter(item => item.cost > 0);
            if (costItems.length > 0) {
                this.elements.costDisplay.innerHTML = `<p>${date}</p>` + 
                    costItems.map(item => `<p>${item.label} * ${item.count} = ${utils.formatNumber(item.cost)} 元</p>`).join('');
                this.elements.costSummary.style.display = 'block';
            } else {
                this.elements.costDisplay.innerHTML = `<p>${date}</p><p>尚無成本資料</p>`;
                this.elements.costSummary.style.display = 'none';
            }
        },
        
        updateExchangeRate() {
            const rate = parseFloat(this.elements.exchangeRateInput.value);
            const cost = rate && !isNaN(rate) && this.currentTotalCost > 0 
                ? this.currentTotalCost * rate 
                : this.currentTotalCost;
            this.elements.totalCostElement.textContent = utils.formatNumber(cost);
        },

        init() {
            this.elements.hudDisplay.addEventListener('click', () => {
                const text = Array.from(this.elements.hudDisplay.querySelectorAll('p'))
                    .map(p => p.textContent).join('\n');
                navigator.clipboard.writeText(text)
                    .then(() => alert('複製成功'))
                    .catch(() => alert('複製失敗'));
            });
            this.elements.exchangeRateInput.addEventListener('input', () => this.updateExchangeRate());
            this.update();
        }
    };

    function calculateResult() {
        resultManager.update();
    }

    dateManager.init();
    inputManager.init();
    resultManager.init();
</script>
