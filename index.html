<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78Lion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <style>
        :root {
            --primary: #00a8ff;
            --secondary: #9c88ff;
            --bg-card: rgba(15, 15, 15, 0.8);
            --bg-gradient: linear-gradient(90deg, rgba(10, 10, 10, 0.95) 0%, rgba(15, 15, 15, 0.85) 50%, rgba(10, 10, 10, 0.95) 100%);
            --text: #ffffff;
            --shadow: 0 0 20px rgba(0, 168, 255, 0.3);
            --shadow-hover: 0 0 30px rgba(156, 136, 255, 0.5);
            --shadow-text: 0 0 10px var(--primary);
            --transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            --backdrop: blur(5px);
            --bg-image: url('https://images.unsplash.com/photo-1605893417405-c4eac36ac32b?q=75&w=1280&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes neonGlow {
            0%, 100% { text-shadow: 0 0 5px var(--primary); }
            50% { text-shadow: 0 0 10px var(--secondary); }
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--bg-gradient);
            background-size: 200% 100%;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 0;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--bg-image) center/cover fixed;
            opacity: 0.3;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 2rem;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 300px);
            gap: 2rem;
            justify-content: center;
            width: 100%;
        }

        .service-card, .info-box {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 2px solid var(--primary);
            backdrop-filter: var(--backdrop);
            -webkit-backdrop-filter: var(--backdrop);
            width: 300px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            position: relative;
        }

        .service-card {
            cursor: pointer;
        }

        .service-card.locked {
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(15, 15, 15, 0.6) 100%);
        }

        .service-card.locked:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--secondary);
        }

        .service-card.locked::before {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            opacity: 0.3;
            filter: grayscale(100%);
            z-index: 10;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .service-card.locked:hover::before {
            content: '🔓';
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .service-card.locked .service-icon,
        .service-card.locked .service-title {
            position: relative;
            z-index: 1;
            filter: blur(2px) brightness(0.7);
            transition: filter 0.5s ease, transform 0.5s ease;
        }

        .service-card.locked:hover .service-icon,
        .service-card.locked:hover .service-title {
            filter: none;
            transform: scale(1.05);
        }

        .service-icon {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            text-shadow: var(--shadow-text);
            animation: neonGlow 2s infinite;
        }

        .service-title {
            color: var(--text);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: var(--shadow-text);
            text-align: center;
            width: 100%;
        }

        .info-box {
            gap: 1rem;
            cursor: default;
        }

        .info-item {
            text-align: center;
            padding: 0.5rem;
            min-height: 40px;
            width: 100%;
        }

        .temperature-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .info-value {
            font-size: 1.2rem;
            color: var(--text);
            font-weight: 500;
            text-shadow: var(--shadow-text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .password-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: var(--backdrop);
            -webkit-backdrop-filter: var(--backdrop);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .password-modal.active {
            display: flex;
        }

        .password-box {
            background: var(--bg-card);
            padding: 1rem 1.2rem;
            border-radius: 8px;
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 168, 255, 0.5);
            max-width: 250px;
            width: 80%;
        }

        .password-input {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--primary);
            border-radius: 4px;
            padding: 0.6rem 0.8rem;
            color: var(--text);
            font-size: 1.1rem;
            width: 100%;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
        }

        .password-input::placeholder {
            color: transparent;
        }

        .password-input:focus {
            outline: none;
            box-shadow: var(--shadow-text);
        }

        @media (max-width: 1024px) {
            .card-grid { grid-template-columns: repeat(2, minmax(250px, 300px)); gap: 1.5rem; }
        }

        @media (max-width: 680px) {
            .container { padding: 1rem; }
            .card-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; padding: 0 0.5rem; }
            .service-card, .info-box { width: 100%; height: 140px; padding: 0.8rem; }
            .service-title { font-size: 1.1rem; margin-top: 0.5rem; }
            .service-icon { font-size: 1.8rem; margin-bottom: 0.5rem; }
            .info-value { font-size: 0.9rem; }
            .info-item { padding: 0.3rem; min-height: 30px; }
            .temperature-row { gap: 0.5rem; }
            .service-card.locked::before { font-size: 2rem; }
            .password-box { max-width: 350px; padding: 1.5rem; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <script>
        const App = {
            PASSWORD: '0878',
            dateEl: null,
            timeEl: null,

            checkPassword(url) {
                const handleEscape = e => e.key === 'Escape' && this.closeModal(modal, handleEscape);
                const modal = document.createElement('div');
                modal.className = 'password-modal active';
                modal.onclick = e => e.target === modal && this.closeModal(modal, handleEscape);

                const input = document.createElement('input');
                input.type = 'password';
                input.className = 'password-input';
                input.maxLength = this.PASSWORD.length;
                input.oninput = () => {
                    if (input.value.length === this.PASSWORD.length) {
                        if (input.value === this.PASSWORD) {
                            document.removeEventListener('keydown', handleEscape);
                            window.location.href = url;
                        } else {
                            this.closeModal(modal, handleEscape);
                        }
                    }
                };

                const box = document.createElement('div');
                box.className = 'password-box';
                box.appendChild(input);
                modal.appendChild(box);
                document.body.appendChild(modal);
                document.addEventListener('keydown', handleEscape);
                input.focus();
            },

            closeModal(modal, escapeHandler) {
                if (!modal) return;
                if (escapeHandler) document.removeEventListener('keydown', escapeHandler);
                modal.classList.remove('active');
                setTimeout(() => modal.remove(), 300);
            },

            updateDateTime() {
                if (!this.dateEl) this.dateEl = document.getElementById('date');
                if (!this.timeEl) this.timeEl = document.getElementById('time');
                if (!this.dateEl || !this.timeEl) return;

                const now = new Date();
                this.dateEl.textContent = now.toLocaleDateString('zh-TW', { 
                    year: 'numeric', month: 'long', day: 'numeric' 
                });
                this.timeEl.textContent = now.toLocaleTimeString('zh-TW', { 
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
                });
            },

            init() {
                this.updateDateTime();
                setInterval(() => this.updateDateTime(), 1000);

                document.querySelectorAll('.service-card.locked').forEach(card => {
                    card.addEventListener('click', () => {
                        const url = card.dataset.url;
                        if (url) this.checkPassword(url);
                    });
                });
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => App.init());
        } else {
            App.init();
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="card-grid">
            <div class="info-box">
                <div class="info-item"><div class="info-value" id="date"></div></div>
                <div class="info-item"><div class="info-value" id="time"></div></div>
                <div class="info-item">
                    <div class="temperature-row">
                        <div class="info-value">☀️ 25°C</div>
                        <div class="info-value">🌡️ 27°C</div>
                    </div>
                </div>
            </div>
            <div class="service-card locked" data-url="Products.html">
                <div class="service-icon">💰</div>
                <h3 class="service-title">損益計算機</h3>
            </div>
            <div class="service-card locked" data-url="Delivery_PC.html">
                <div class="service-icon">🖥️</div>
                <h3 class="service-title">外送資產【電腦版】</h3>
            </div>
            <div class="service-card locked" data-url="Delivery_Mobile.html">
                <div class="service-icon">📝</div>
                <h3 class="service-title">外送資產【手機版】</h3>
            </div>
            <div class="service-card locked" data-url="9Starx_Quotation.html">
                <div class="service-icon">📑</div>
                <h3 class="service-title">9Starx報價單</h3>
            </div>
            <div class="service-card locked" data-url="Blank_Quotation.html">
                <div class="service-icon">📋</div>
                <h3 class="service-title">商品銷售報價單</h3>
            </div>
            <div class="service-card locked" data-url="Transport.html">
                <div class="service-icon">🚛</div>
                <h3 class="service-title">運輸計算機</h3>
            </div>
            <div class="service-card locked" data-url="CNY.html">
                <div class="service-icon">📈</div>
                <h3 class="service-title">大草原計算機</h3>
            </div>
            <div class="service-card locked" data-url="Price_tools.html">
                <div class="service-icon">🔍</div>
                <h3 class="service-title">商品競價工具</h3>
            </div>
        </div>
    </div>
</body>
</html>
