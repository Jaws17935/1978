<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9STARX</title>
    <style>
        :root {
            --primary-color: #00a8ff;
            --secondary-color: #9c88ff;
            --accent-color: #00d2d3;
            --bg-color: #0a0a0a;
            --card-bg: rgba(15, 15, 15, 0.8);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes neonGlow {
            0%, 100% {
                text-shadow: 0 0 5px var(--primary-color);
            }
            50% {
                text-shadow: 0 0 10px var(--secondary-color);
            }
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: 
                linear-gradient(90deg, 
                    rgba(10, 10, 10, 0.9) 0%,
                    rgba(15, 15, 15, 0.7) 50%,
                    rgba(10, 10, 10, 0.9) 100%
                ),
                url('https://images.unsplash.com/photo-1732538809550-688fa0cdcac2?q=80&w=2662&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: 200% 100%, cover;
            background-position: 0% 0%, center;
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow: auto;
            padding: 2rem 0;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 2rem;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 300px);
            gap: 2rem;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            width: 100%;
        }

        .service-card, .info-box {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 168, 255, 0.3);
            border: 2px solid var(--primary-color);
            backdrop-filter: blur(5px);
            width: 300px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(156, 136, 255, 0.5);
            border-color: var(--secondary-color);
        }

        .service-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--primary-color);
            animation: neonGlow 2s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .service-title {
            color: var(--text-color);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-color);
            text-align: center;
            width: 100%;
        }

        .info-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 0;
            justify-content: center;
            align-items: center;
            cursor: default;
        }

        .info-item {
            text-align: center;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 40px;
            width: 100%;
        }

        .temperature-row {
            display: flex;
            justify-content: center;
            width: 100%;
            gap: 2rem;
        }

        .info-value {
            font-size: 1.2rem;
            color: var(--text-color);
            font-weight: 500;
            text-shadow: 0 0 10px var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            justify-content: center;
        }

        @media (max-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(2, minmax(250px, 300px));
                gap: 1.5rem;
            }
        }

        @media (max-width: 680px) {
            .container {
                padding: 1rem;
            }

            .card-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
                padding: 0 0.5rem;
                max-width: 100%;
            }
            
            .service-card, .info-box {
                width: 100%;
                height: 140px;
                min-height: 140px;
                padding: 0.8rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            
            .service-title {
                font-size: 1.1rem;
                margin-top: 0.5rem;
            }
            
            .service-icon {
                font-size: 1.8rem;
                margin-bottom: 0.5rem;
            }

            .info-value {
                font-size: 0.9rem;
            }

            .info-item {
                padding: 0.3rem;
                min-height: 30px;
                width: 100%;
            }

            .temperature-row {
                gap: 0.5rem;
                width: 100%;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        function openInNewWindow(url) {
            window.open(url, '_blank');
        }

        function updateDateTime() {
            const now = new Date();
            const dateElement = document.getElementById('date');
            const timeElement = document.getElementById('time');
            
            // 格式化日期
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            dateElement.textContent = now.toLocaleDateString('zh-TW', options);
            
            // 格式化時間 (24小時制)
            timeElement.textContent = now.toLocaleTimeString('zh-TW', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
        }

        // 每分鐘更新一次時間
        setInterval(updateDateTime, 1000);
        updateDateTime(); // 初始顯示
    </script>
</head>
<body>
    <div class="container">
        <div class="card-grid">
            <div class="info-box">
                <div class="info-item">
                    <div class="info-value" id="date"></div>
                </div>
                <div class="info-item">
                    <div class="info-value" id="time"></div>
                </div>
                <div class="info-item">
                    <div class="temperature-row">
                        <div class="info-value">☀️ 25°C</div>
                        <div class="info-value">🌡️ 27°C</div>
                    </div>
                </div>
            </div>
            <div class="service-card" onclick="openInNewWindow('Transport.html')">
                <div class="service-icon">🚚</div>
                <div class="service-title">運輸計算機</div>
            </div>
            <div class="service-card" onclick="openInNewWindow('Computer.html')">
                <div class="service-icon">💰</div>
                <div class="service-title">損益計算機</div>
            </div>
            <div class="service-card" onclick="openInNewWindow('CNY.html')">
                <div class="service-icon">🌾</div>
                <div class="service-title">大草原計算機</div>
            </div>
            <div class="service-card" onclick="openInNewWindow('Delivery_PC.html')">
                <div class="service-icon">💻</div>
                <div class="service-title">外送資產(電腦版)</div>
            </div>
            <div class="service-card" onclick="openInNewWindow('Delivery_Mobile.html')">
                <div class="service-icon">📱</div>
                <div class="service-title">外送資產(手機版)</div>
            </div>
            <div class="service-card" onclick="openInNewWindow('9Starx_Quotation.html')">
                <div class="service-icon">📄</div>
                <div class="service-title">9Starx報價單</div>
            </div>
            <div class="service-card" onclick="openInNewWindow('Blank_Quotation.html')">
                <div class="service-icon">📝</div>
                <div class="service-title">空白報價單</div>
            </div>
        </div>
    </div>
</body>
</html>
