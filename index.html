<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>78Lion - 78Lion.com 首頁｜損益計算、報價單、運輸與匯率工具</title>

    <!-- Open Graph / 社群分享 -->

    <meta property="og:title" content="78Lion - 78Lion.com 首頁">
    <meta property="og:description" content="78Lion.com 提供損益計算機、報價單、運輸計算與匯率等實用工具。">
    <meta property="og:locale" content="zh_TW">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=block" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=block" rel="stylesheet" crossorigin>
    <style>
        :root{--primary:#00a8ff;--secondary:#9c88ff;--bg-card:rgba(15,15,15,.8);--text:#fff;--ease:.3s ease;--blur:blur(5px);--shadow:0 0 20px rgba(0,168,255,.3);--shadow-hover:0 0 30px rgba(156,136,255,.5);--shadow-text:0 0 10px var(--primary);--bg-gradient:linear-gradient(90deg,rgba(10,10,10,.95) 0%,rgba(15,15,15,.85) 50%,rgba(10,10,10,.95) 100%)}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        @keyframes neonGlow{0%,100%{text-shadow:0 0 5px var(--primary)}50%{text-shadow:0 0 10px var(--secondary)}}
        @keyframes caretBlink{50%{opacity:0}}
        body{font-family:'Orbitron',sans-serif;background:var(--bg-gradient);color:var(--text);line-height:1.6;min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:2rem 0;position:relative;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
        body::before{content:'';position:fixed;inset:0;z-index:-1;opacity:.3;background:url('https://images.unsplash.com/photo-1605893417405-c4eac36ac32b?q=75&w=1280&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') center/cover}
        .container{max-width:1200px;width:100%;padding:2rem;position:relative;z-index:2;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .card-grid{display:grid;grid-template-columns:repeat(2,300px);gap:2rem;justify-content:center;width:100%}
        .service-card,.info-box{background:var(--bg-card);border-radius:8px;padding:2rem;box-shadow:var(--shadow);border:2px solid var(--primary);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);width:300px;height:200px;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:transform var(--ease),box-shadow var(--ease),border-color var(--ease);position:relative}
        .service-card{cursor:pointer}
        .service-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-hover);border-color:var(--secondary)}
        .service-card.locked{background:linear-gradient(135deg,var(--bg-card) 0%,rgba(15,15,15,.6) 100%)}
        .service-card.locked::before{content:'🔒';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3rem;opacity:.3;filter:grayscale(100%);z-index:10;transition:all var(--ease);pointer-events:none}
        .service-card.locked:hover::before{content:'🔓';opacity:0;transform:translate(-50%,-50%) scale(1.2)}
        .service-card.locked .service-icon,.service-card.locked .service-title{position:relative;z-index:1;filter:blur(2px) brightness(.7);transition:filter .5s ease,transform .5s ease}
        .service-card.locked:hover .service-icon,.service-card.locked:hover .service-title{filter:none;transform:scale(1.05)}
        .service-icon{font-size:2.5rem;color:var(--primary);margin-bottom:1rem;text-shadow:var(--shadow-text);animation:neonGlow 2s infinite}
        .service-title{font-size:1.5rem;text-transform:uppercase;letter-spacing:2px;text-shadow:var(--shadow-text);text-align:center;width:100%}
        .info-box{gap:0;cursor:default;padding:1rem;justify-content:center}
        .info-row{text-align:center;width:100%;padding:.2rem 0;font-size:1rem;font-weight:500;text-shadow:var(--shadow-text);display:flex;align-items:center;justify-content:center;gap:.5rem;line-height:1.35}
        .info-box .info-row:first-child{font-size:1.1rem}
        .info-row.temp-row{gap:2rem}
        .password-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.8);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);justify-content:center;align-items:center}
        .password-modal.active{display:flex}
        .password-box{background:var(--bg-card);padding:1rem 1.2rem;border-radius:8px;border:2px solid var(--primary);box-shadow:0 0 30px rgba(0,168,255,.5);max-width:250px;width:80%}
        .password-input-wrap{position:relative;width:100%}
        .password-input{background:rgba(0,0,0,.3);border:2px solid var(--primary);border-radius:4px;padding:.6rem .8rem;color:transparent;font-size:1.1rem;width:100%;text-align:center;font-family:inherit;letter-spacing:.2em;caret-color:transparent}
        .password-input::placeholder{color:transparent}
        .password-input.is-error::placeholder{color:#ff6b6b}
        .password-input:focus{outline:none;box-shadow:var(--shadow-text)}
        .password-caret{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
        .password-caret::after{content:'';width:2px;height:1.1em;background:var(--text);animation:caretBlink 1s step-end infinite}
        .password-msg{text-align:center;font-size:.9rem;margin-top:.5rem;min-height:1.2em}
        .password-countdown{text-align:center;font-size:1rem;margin-top:.5rem;color:var(--primary)}
    </style>
    <noscript><link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=block" rel="stylesheet"></noscript>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lunar-javascript/1.7.4/lunar.min.js"></script>
    <script>
        (function(){
            // 僅儲存密碼的 SHA-256 雜湊，密碼本身不出現在原始碼中
            const PWD_HASH='f4c0cea75a69f325f85fa6c273d3fae5d0caafa7edd774881d64ed664f3cefeb';
            const Cfg={tick:1e3,weatherInterval:9e5,Taipei:[25.033,121.5654],API:'https://api.open-meteo.com/v1/forecast',POPUP:'width=1024,height=768,scrollbars=yes,resizable=yes,menubar=yes'};
            const CARDS=[{icon:'💰',title:'損益計算機',url:'Products.html',locked:true},{icon:'📋',title:'商品銷售報價單',url:'Blank_Quotation.html',locked:false},{icon:'🔍',title:'商品競價工具',url:'Price_tools.html',locked:false},{icon:'🖥️',title:'外送資產【電腦版】',url:'Delivery_PC.html',locked:true},{icon:'🚛',title:'運輸計算機',url:'Transport.html',locked:true},{icon:'📑',title:'9Starx報價單',url:'9Starx_Quotation.html',locked:true},{icon:'📈',title:'大草原計算機',url:'CNY.html',locked:true},{icon:'💳',title:'信用卡計算機',url:'Credit_Card.html',locked:true},{icon:'💱',title:'匯率計算機',url:'Exchange_Calculator.html',locked:true}];
            const $=id=>document.getElementById(id);
            const els={};
            let lastDateKey='';
            let pwdWrongCount=0, pwdLockUntil=0;

            function closeModal(modal,onEsc){
                if(onEsc) document.removeEventListener('keydown',onEsc);
                modal.classList.remove('active');
                setTimeout(()=>modal.remove(),300);
            }

            function sha256HexSync(str){
                const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
                const enc=new TextEncoder().encode(str);
                let len=enc.length*8;const w=new Array(64);
                const buf=new ArrayBuffer(enc.length+9+((64-((enc.length+9)%64))%64));
                new Uint8Array(buf).set(enc);new DataView(buf).setUint8(enc.length,128);
                new DataView(buf).setUint32(buf.byteLength-4,len>>>0,false);new DataView(buf).setUint32(buf.byteLength-8,Math.floor(len/4294967296),false);
                const h=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
                const dv=new DataView(buf);
                for(let i=0;i<dv.byteLength;i+=64){
                    for(let t=0;t<16;t++)w[t]=dv.getUint32(i+t*4,false);
                    for(let t=16;t<64;t++){const s0=((w[t-15]>>>7)^(w[t-15]>>>18)^(w[t-15]>>>3))>>>0;const s1=((w[t-2]>>>17)^(w[t-2]>>>19)^(w[t-2]>>>10))>>>0;w[t]=(w[t-16]+s0+w[t-7]+s1)>>>0;}
                    let [a,b,c,d,e,f,g,h0]=h;
                    for(let t=0;t<64;t++){
                        const S1=((e>>>6)^(e>>>11)^(e>>>25))>>>0;const ch=((e&f)^((~e)&g))>>>0;const t1=(h0+S1+ch+K[t]+w[t])>>>0;
                        const S0=((a>>>2)^(a>>>13)^(a>>>22))>>>0;const maj=((a&b)^(a&c)^(b&c))>>>0;const t2=(S0+maj)>>>0;
                        h0=g;g=f;f=e;e=(d+t1)>>>0;d=c;c=b;b=a;a=(t1+t2)>>>0;
                    }
                    h[0]=(h[0]+a)>>>0;h[1]=(h[1]+b)>>>0;h[2]=(h[2]+c)>>>0;h[3]=(h[3]+d)>>>0;h[4]=(h[4]+e)>>>0;h[5]=(h[5]+f)>>>0;h[6]=(h[6]+g)>>>0;h[7]=(h[7]+h0)>>>0;
                }
                return h.map(x=>x.toString(16).padStart(8,'0')).join('');
            }
            async function sha256Hex(str){
                if(typeof crypto!=='undefined'&&crypto.subtle){
                    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
                    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
                }
                return sha256HexSync(str);
            }
            // 正規化輸入：將全形數字、阿拉伯-印度數字等統一為半形 0-9，避免不同裝置/輸入法導致密碼比對失敗
            function normalizePasswordInput(str){
                let out='';
                for(let i=0;i<str.length;i++){
                    const c=str.charCodeAt(i);
                    if(c>=0xFF10&&c<=0xFF19) out+=String.fromCharCode(c-0xFF10+0x30); // 全形 ０-９ -> 0-9
                    else if(c>=0x0660&&c<=0x0669) out+=String.fromCharCode(c-0x0660+0x30); // 阿拉伯-印度數字
                    else if(c>=0x06F0&&c<=0x06F9) out+=String.fromCharCode(c-0x06F0+0x30); // 擴展阿拉伯-印度
                    else out+=str[i];
                }
                return out;
            }
            function checkPassword(url){
                const modal=document.createElement('div');
                modal.className='password-modal active';
                const onEsc=e=>e.key==='Escape'&&(document.removeEventListener('keydown',onEsc),closeModal(modal,onEsc));
                const box=document.createElement('div');
                box.className='password-box';
                const cd=s=>'剩餘 '+Math.floor(s/60)+' 分 '+(s%60)+' 秒';
                const now=Date.now();
                if(now<pwdLockUntil){
                    const remain=Math.ceil((pwdLockUntil-now)/1e3);
                    box.innerHTML='<div class="password-msg">錯誤次數過多，麻煩稍後再試</div><div class="password-countdown">'+cd(remain)+'</div>';
                    const countEl=box.querySelector('.password-countdown');
                    const tick=setInterval(()=>{
                        const r=Math.ceil((pwdLockUntil-Date.now())/1e3);
                        if(r<=0){ clearInterval(tick); closeModal(modal,onEsc); return; }
                        if(countEl) countEl.textContent=cd(r);
                    },1e3);
                    modal.append(box); document.body.append(modal); document.addEventListener('keydown',onEsc);
                    return;
                }
                box.innerHTML='<div class="password-input-wrap"><input type="password" class="password-input" placeholder="密碼" maxlength="20" autocomplete="off"><div class="password-caret"></div></div>';
                const inp=box.querySelector('input');
                inp.oninput=async function(){
                    if(inp.classList.contains('is-error')){ inp.classList.remove('is-error'); inp.placeholder='密碼'; }
                    const raw=normalizePasswordInput((inp.value.trim()).normalize('NFC'));
                    if(raw.length<4||raw.length%4!==0) return;
                    if((await sha256Hex(raw))!==PWD_HASH){
                        pwdWrongCount++;
                        inp.value=''; inp.placeholder=pwdWrongCount>=3?'密碼錯誤，已鎖定 5 分鐘':'密碼錯誤'; inp.classList.add('is-error');
                        if(pwdWrongCount>=3){ pwdLockUntil=Date.now()+3e5; inp.disabled=true; document.removeEventListener('keydown',onEsc); setTimeout(()=>closeModal(modal,onEsc),400); }
                        return;
                    }
                    pwdWrongCount=0; document.removeEventListener('keydown',onEsc); window.location.href=url;
                };
                modal.append(box); document.body.append(modal); document.addEventListener('keydown',onEsc); inp.focus();
            }

            function getLunarString(y,m,d){
                if(typeof Solar==='undefined') return '';
                try{
                    const L=Solar.fromYmd(y,m,d).getLunar();
                    const gz=L.getYearInGanZhi?.()||'', mon=L.getMonthInChinese?.()||(L.getMonth()+'月'), day=L.getDayInChinese?.()||(L.getDay()+'日');
                    return gz ? gz+'年 '+mon+day : (L.toString()||'');
                }catch{ return ''; }
            }

            function updateDateTime(){
                if(!els.time) els.time=$('time'); if(!els.date) els.date=$('date'); if(!els.roc) els.roc=$('roc-date'); if(!els.lunar) els.lunar=$('lunar-date');
                if(!els.date||!els.time) return;
                const now=new Date(), y=now.getFullYear(), m=now.getMonth()+1, d=now.getDate();
                els.date.textContent=now.toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric'});
                els.time.textContent=now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
                const key=`${y}-${m}-${d}`;
                if(key!==lastDateKey){ lastDateKey=key; if(els.roc) els.roc.textContent=(y-1911)+' 年 '+m+' 月 '+d+' 日'; if(els.lunar) els.lunar.textContent=getLunarString(y,m,d); }
            }

            let we={};
            function fetchWeather(){
                const go=(lat,lon)=>fetch(`${Cfg.API}?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature&timezone=auto`).then(r=>r.json()).then(d=>{
                    const c=d?.current; if(!c) return;
                    if(!we.t) we={t:$('temp-current'),f:$('temp-feels')};
                    if(we.t) we.t.textContent='☀️ '+Math.round(c.temperature_2m)+'°C'; if(we.f) we.f.textContent='🌡️ '+Math.round(c.apparent_temperature)+'°C';
                }).catch(()=>{});
                navigator.geolocation ? navigator.geolocation.getCurrentPosition(p=>go(p.coords.latitude,p.coords.longitude),()=>go(...Cfg.Taipei)) : go(...Cfg.Taipei);
            }

            function init(){
                updateDateTime(); setInterval(updateDateTime,Cfg.tick);
                fetchWeather(); setInterval(fetchWeather,Cfg.weatherInterval);
                const grid=document.querySelector('.card-grid'), frag=document.createDocumentFragment();
                CARDS.forEach(({icon,title,url,locked})=>{ const c=document.createElement('div'); c.className='service-card'+(locked?' locked':''); c.dataset.url=url; c.innerHTML=`<div class="service-icon">${icon}</div><h3 class="service-title">${title}</h3>`; frag.appendChild(c); });
                grid.appendChild(frag);
                grid.onclick=e=>{ const c=e.target.closest('.service-card'); if(!c?.dataset.url) return; c.classList.contains('locked') ? checkPassword(c.dataset.url) : window.open(c.dataset.url,'_blank',Cfg.POPUP); };
            }
            if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
            else init();
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="card-grid">
            <div class="info-box">
                <div class="info-row" id="time"></div>
                <div class="info-row" id="lunar-date"></div>
                <div class="info-row" id="roc-date"></div>
                <div class="info-row" id="date"></div>
                <div class="info-row temp-row">
                    <span id="temp-current">☀️ --°C</span>
                    <span id="temp-feels">🌡️ --°C</span>
                </div>
            </div>
        </div>
    </div>
</body>
