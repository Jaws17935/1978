<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>78Lion</title>
    <style>
        :root {
            --primary-color: #00a8ff;
            --secondary-color: #9c88ff;
            --card-bg: rgba(15, 15, 15, 0.8);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes neonGlow {
            0%, 100% {
                text-shadow: 0 0 5px var(--primary-color);
            }
            50% {
                text-shadow: 0 0 10px var(--secondary-color);
            }
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: 
                linear-gradient(90deg, 
                    rgba(10, 10, 10, 0.9) 0%,
                    rgba(15, 15, 15, 0.7) 50%,
                    rgba(10, 10, 10, 0.9) 100%
                ),
                url('https://images.unsplash.com/photo-1605893417405-c4eac36ac32b?q=80&w=2574&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: 200% 100%, cover;
            background-position: 0% 0%, center;
            background-attachment: fixed;
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow: auto;
            padding: 2rem 0;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 2rem;
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 300px);
            gap: 2rem;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            width: 100%;
        }

        .service-card, .info-box {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 0 20px rgba(0, 168, 255, 0.3);
            border: 2px solid var(--primary-color);
            backdrop-filter: blur(5px);
            width: 300px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .service-card.locked {
            background: linear-gradient(135deg, 
                var(--card-bg) 0%,
                rgba(15, 15, 15, 0.6) 100%
            );
            transition: all 0.3s ease;
        }

        .service-card.locked:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(156, 136, 255, 0.5);
            border-color: var(--secondary-color);
        }

        .service-card.locked::before {
            content: '🔒';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            opacity: 0.3;
            filter: grayscale(100%);
            z-index: 10;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .service-card.locked:hover::before {
            content: '🔓';
            opacity: 0;
            transform: translate(-50%, -50%) scale(1.2);
        }

        .service-card.locked .service-icon,
        .service-card.locked .service-title {
            position: relative;
            z-index: 1;
            filter: blur(2px) brightness(0.7);
            transition: all 0.5s ease;
        }

        .service-card.locked:hover .service-icon,
        .service-card.locked:hover .service-title {
            filter: none;
            transform: scale(1.05);
        }

        .service-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--primary-color);
            animation: neonGlow 2s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .service-title {
            color: var(--text-color);
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary-color);
            text-align: center;
            width: 100%;
        }

        .info-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 0;
            justify-content: center;
            align-items: center;
            cursor: default;
        }

        .info-item {
            text-align: center;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 40px;
            width: 100%;
        }

        .temperature-row {
            display: flex;
            justify-content: center;
            width: 100%;
            gap: 2rem;
        }

        .info-value {
            font-size: 1.2rem;
            color: var(--text-color);
            font-weight: 500;
            text-shadow: 0 0 10px var(--primary-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            justify-content: center;
        }

        /* 改進的密碼彈窗樣式 */
        .password-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .password-modal.active {
            display: flex;
        }

        .password-box {
            background: var(--card-bg);
            padding: 1.2rem;
            border-radius: 8px;
            border: 2px solid var(--primary-color);
            box-shadow: 0 0 30px rgba(0, 168, 255, 0.5);
            text-align: center;
            max-width: 250px;
            width: 80%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
        }

        .password-input {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--primary-color);
            border-radius: 4px;
            padding: 0.6rem 0.8rem;
            color: var(--text-color);
            font-size: 1.1rem;
            width: 100%;
            margin: 0;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
        }

        .password-input::placeholder {
            color: transparent;
        }

        .password-input:focus {
            outline: none;
            box-shadow: 0 0 10px var(--primary-color);
        }

        @media (max-width: 1024px) {
            .card-grid {
                grid-template-columns: repeat(2, minmax(250px, 300px));
                gap: 1.5rem;
            }
        }

        @media (max-width: 680px) {
            .container {
                padding: 1rem;
            }

            .card-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.8rem;
                padding: 0 0.5rem;
                max-width: 100%;
            }
            
            .service-card, .info-box {
                width: 100%;
                height: 140px;
                min-height: 140px;
                padding: 0.8rem;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            
            .service-title {
                font-size: 1.1rem;
                margin-top: 0.5rem;
            }
            
            .service-icon {
                font-size: 1.8rem;
                margin-bottom: 0.5rem;
            }

            .info-value {
                font-size: 0.9rem;
            }

            .info-item {
                padding: 0.3rem;
                min-height: 30px;
                width: 100%;
            }

            .temperature-row {
                gap: 0.5rem;
                width: 100%;
            }

            .service-card.locked::before {
                font-size: 2rem;
            }

            .password-box {
                max-width: 350px;
                padding: 1.5rem;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        // 應用程式命名空間
        const App = {
            PASSWORD: '0878',

            // 密碼驗證系統
            checkPassword(url) {
                const modal = document.createElement('div');
                modal.className = 'password-modal';
                const passwordBox = document.createElement('div');
                passwordBox.className = 'password-box';
                const passwordInput = document.createElement('input');
                passwordInput.type = 'password';
                passwordInput.className = 'password-input';
                passwordInput.maxLength = this.PASSWORD.length;
                passwordInput.dataset.url = url;
                
                passwordInput.addEventListener('input', () => {
                    if (passwordInput.value.length === this.PASSWORD.length) {
                        this.submitPassword(passwordInput);
                    }
                });
                
                passwordBox.appendChild(passwordInput);
                modal.appendChild(passwordBox);
                
                // ESC 鍵關閉彈窗
                const handleEscape = (e) => {
                    if (e.key === 'Escape') {
                        this.closeModal(modal, handleEscape);
                    }
                };
                document.addEventListener('keydown', handleEscape);
                
                // 點擊背景遮罩關閉彈窗
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        this.closeModal(modal, handleEscape);
                    }
                });
                
                // 儲存事件處理器引用以便清理
                modal.escapeHandler = handleEscape;
                
                document.body.appendChild(modal);
                modal.classList.add('active');
                passwordInput.focus();
            },

            submitPassword(input) {
                const modal = input.closest('.password-modal');
                const url = input.dataset.url;
                if (input.value === this.PASSWORD) {
                    // 密碼正確，跳轉前清理事件監聽器
                    if (modal && modal.escapeHandler) {
                        document.removeEventListener('keydown', modal.escapeHandler);
                    }
                    window.location.href = url;
                } else {
                    // 密碼錯誤，關閉彈窗
                    this.closeModal(modal, modal ? modal.escapeHandler : null);
                }
            },

            closeModal(modal, escapeHandler) {
                if (!modal) return;
                
                // 移除 ESC 鍵事件監聽器
                if (escapeHandler) {
                    document.removeEventListener('keydown', escapeHandler);
                }
                
                // 關閉彈窗動畫
                modal.classList.remove('active');
                setTimeout(() => modal.remove(), 300);
            },

            // 時間顯示系統
            updateDateTime() {
                const now = new Date();
                const dateElement = document.getElementById('date');
                const timeElement = document.getElementById('time');
                
                if (dateElement && timeElement) {
                    // 格式化日期
                    const options = { year: 'numeric', month: 'long', day: 'numeric' };
                    dateElement.textContent = now.toLocaleDateString('zh-TW', options);
                    
                    // 格式化時間 (24小時制)
                    timeElement.textContent = now.toLocaleTimeString('zh-TW', { 
                        hour: '2-digit', 
                        minute: '2-digit',
                        second: '2-digit',
                        hour12: false
                    });
                }
            },

            // 初始化函數
            init() {
                // 啟動時間更新
                this.updateDateTime();
                setInterval(() => this.updateDateTime(), 1000);
            }
        };

        // 向後兼容的全局函數
        const checkPassword = (url) => App.checkPassword(url);

        // 頁面載入完成後初始化
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</head>
<body>
    <div class="container">
        <div class="card-grid">
            <div class="info-box">
                <div class="info-item">
                    <div class="info-value" id="date"></div>
                </div>
                <div class="info-item">
                    <div class="info-value" id="time"></div>
                </div>
                <div class="info-item">
                    <div class="temperature-row">
                        <div class="info-value">☀️ 25°C</div>
                        <div class="info-value">🌡️ 27°C</div>
                    </div>
                </div>
            </div>
            <div class="service-card locked" onclick="checkPassword('https://jaws17935.github.io/1978Calculator/')">
                <div class="service-icon">💰</div>
                <h3 class="service-title">損益計算機</h3>
            </div>
            <div class="service-card locked" onclick="checkPassword('Delivery_PC.html')">
                <div class="service-icon">🖥️</div>
                <h3 class="service-title">外送資產【電腦版】</h3>
            </div>
            <div class="service-card locked" onclick="checkPassword('Delivery_Mobile.html')">
                <div class="service-icon">📝</div>
                <h3 class="service-title">外送資產【手機版】</h3>
            </div>
            <div class="service-card locked" onclick="checkPassword('9Starx_Quotation.html')">
                <div class="service-icon">📑</div>
                <h3 class="service-title">9Starx報價單</h3>
            </div>
            <div class="service-card locked" onclick="checkPassword('Blank_Quotation.html')">
                <div class="service-icon">📋</div>
                <h3 class="service-title">商品銷售報價單</h3>
            </div>
            <div class="service-card locked" onclick="checkPassword('Transport.html')">
                <div class="service-icon">🚛</div>
                <h3 class="service-title">運輸計算機</h3>
            </div>
            <div class="service-card locked" onclick="checkPassword('CNY.html')">
                <div class="service-icon">📈</div>
                <h3 class="service-title">大草原計算機</h3>
            </div>
        </div>
    </div>
</body>
</html>
