<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大草原計算機</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --stardust: rgba(255, 255, 255, 0.15);
      --wormhole: #6b5bff;
      --wormhole-light: #8b7eff;
      --wormhole-dark: #4a3dcc;
      --bg-dark: #0a0a1f;
      --text-light: #f0f0f5;
      --card-bg: rgba(30, 30, 60, 0.6);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow-glow: 0 0 20px rgba(107, 91, 255, 0.4);
      --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-light);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    .starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: 
        radial-gradient(var(--stardust) 10%, transparent 11%) 0 0/25px 25px,
        linear-gradient(to bottom, #000 0%, #1a1a3a 100%);
      background-size: 200% 200%;
      animation: warp 120s linear infinite;
      transform-origin: center center;
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 1;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeInDown 0.6s ease-out;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--wormhole) 0%, var(--wormhole-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 0 30px rgba(107, 91, 255, 0.5));
      letter-spacing: 2px;
    }

    .main-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(107, 91, 255, 0.3);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: var(--shadow-card);
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .action-button {
      background: linear-gradient(135deg, var(--wormhole) 0%, var(--wormhole-dark) 100%);
      border: none;
      padding: 0.9rem 1.5rem;
      color: var(--text-light);
      cursor: pointer;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(107, 91, 255, 0.3);
    }

    .action-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    .action-button:hover::before {
      left: 100%;
    }

    .action-button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glow);
    }

    .action-button:active {
      transform: translateY(0);
    }

    .input-section {
      margin-bottom: 1.5rem;
    }

    .input-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(107, 91, 255, 0.3);
      color: var(--text-light);
      padding: 0.9rem 1rem;
      font-size: 1rem;
      border-radius: 12px;
      text-align: center;
      transition: var(--transition);
      font-family: 'Space Mono', monospace;
    }

    .input-wrapper input:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(107, 91, 255, 0.5);
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: var(--wormhole);
      box-shadow: 0 0 0 3px rgba(107, 91, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
    }

    .mid-price-display {
      text-align: center;
      margin-top: 1rem;
      padding: 0.8rem;
      background: rgba(107, 91, 255, 0.1);
      border: 1px solid rgba(107, 91, 255, 0.3);
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--wormhole-light);
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-section {
      margin-top: 1.5rem;
    }

    #resultBox {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 2px dashed rgba(107, 91, 255, 0.4);
      color: var(--text-light);
      padding: 1.2rem;
      border-radius: 12px;
      font-size: 1rem;
      line-height: 1.8;
      text-align: center;
      font-family: 'Space Mono', monospace;
      resize: none;
      transition: var(--transition);
      overflow: hidden;
      white-space: pre;
      min-height: 140px;
      cursor: pointer;
    }

    #resultBox:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--wormhole);
      box-shadow: 0 0 20px rgba(107, 91, 255, 0.2);
    }

    #resultBox:focus {
      outline: none;
    }

    .notification {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(107, 91, 255, 0.4);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      color: var(--text-light);
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      box-shadow: var(--shadow-card);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      min-width: 200px;
      text-align: center;
    }

    .notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }

    .notification.success {
      border-color: rgba(107, 91, 255, 0.6);
      background: linear-gradient(135deg, rgba(107, 91, 255, 0.2) 0%, rgba(107, 91, 255, 0.1) 100%);
      box-shadow: 0 0 30px rgba(107, 91, 255, 0.3);
    }

    .notification.error {
      border-color: rgba(255, 91, 107, 0.6);
      background: linear-gradient(135deg, rgba(255, 91, 107, 0.2) 0%, rgba(255, 91, 107, 0.1) 100%);
      box-shadow: 0 0 30px rgba(255, 91, 107, 0.3);
    }

    .notification.warning {
      border-color: rgba(255, 193, 7, 0.6);
      background: linear-gradient(135deg, rgba(255, 193, 7, 0.2) 0%, rgba(255, 193, 7, 0.1) 100%);
      box-shadow: 0 0 30px rgba(255, 193, 7, 0.3);
    }

    @keyframes warp {
      0% { transform: rotate(0deg) scale(1.2); }
      50% { transform: rotate(180deg) scale(1.25); }
      100% { transform: rotate(360deg) scale(1.2); }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .main-card {
        padding: 1.5rem;
        border-radius: 16px;
      }

      .button-group {
        grid-template-columns: 1fr;
      }

      .input-group {
        grid-template-columns: 1fr;
      }

      .input-wrapper input {
        font-size: 0.9rem;
        padding: 0.8rem;
      }
    }
  </style>
</head>

<body>
  <div class="starfield"></div>
  
  <div class="container">
    <div class="header">
      <h1>〄 大草原計算機</h1>
    </div>

    <div class="main-card">
      <div class="button-group">
        <button class="action-button" onclick="openRatePopup()">
          台銀
        </button>
        <button class="action-button" onclick="window.open('https://manager.line.biz/account/@687spxpu/richmenu/edit/11648965', '_blank')">
          隼付
        </button>
      </div>

      <div class="input-section">
        <div class="input-group">
          <div class="input-wrapper">
            <input 
              type="text" 
              id="buyAmount" 
              placeholder="買入"
              oninput="handleFirstInput()" 
              onkeydown="handleKey(event, 'sellAmount')"
              onpaste="handlePaste(event)"
              onclick="clearInput(this)">
          </div>
          <div class="input-wrapper">
            <input 
              type="text" 
              id="sellAmount" 
              placeholder="賣出"
              oninput="calculateTrade()" 
              onkeydown="handleKey(event, 'buyAmount')"
              onpaste="handlePaste(event)"
              onclick="clearInput(this)">
          </div>
        </div>
        <div class="mid-price-display" id="midPrice"></div>
      </div>

      <div class="result-section">
        <textarea 
          id="resultBox" 
          readonly 
          onclick="copyResult()"></textarea>
      </div>
    </div>
  </div>

  <script>
    // 緩存 DOM 元素
    const elements = {
      buyAmount: document.getElementById("buyAmount"),
      sellAmount: document.getElementById("sellAmount"),
      midPrice: document.getElementById("midPrice"),
      resultBox: document.getElementById("resultBox")
    };

    // 顯示通知
    function showNotification(message, type = 'success') {
      // 移除現有的通知
      const existingNotification = document.querySelector('.notification');
      if (existingNotification) {
        existingNotification.remove();
      }

      // 創建新通知
      const notification = document.createElement('div');
      notification.className = `notification ${type}`;
      notification.textContent = message;
      document.body.appendChild(notification);

      // 觸發顯示動畫
      setTimeout(() => {
        notification.classList.add('show');
      }, 10);

      // 1秒後自動關閉
      setTimeout(() => {
        notification.classList.remove('show');
        setTimeout(() => {
          notification.remove();
        }, 300);
      }, 1000);
    }

    // 處理第一個輸入框的邏輯（偵測兩個小數點）
    function handleFirstInput() {
      const input = elements.buyAmount.value;
      
      // 計算小數點的數量
      const dotCount = (input.match(/\./g) || []).length;
      
      if (dotCount >= 2) {
        // 找到第二個小數點的位置
        const firstDotIndex = input.indexOf('.');
        const secondDotIndex = input.indexOf('.', firstDotIndex + 1);
        
        // 確保第二個小數點位置有效
        if (secondDotIndex !== -1) {
          // 分割字串
          // 第一個數字：從開頭到第二個小數點的前一位（不包含那一位數字）
          const firstNumber = input.substring(0, secondDotIndex - 1);
          // 第二個數字：從第二個小數點的前一位到結尾
          const secondNumber = input.substring(secondDotIndex - 1);
          
          // 設定兩個輸入框的值
          elements.buyAmount.value = firstNumber;
          elements.sellAmount.value = secondNumber;
          
          // 自動跳到第二個輸入框並選中文字
          elements.sellAmount.focus();
          elements.sellAmount.select();
          
          // 計算結果
          calculateTrade();
          return;
        }
      }
      
      // 沒有兩個小數點，正常計算
      calculateTrade();
    }

    // 計算交易並更新中價
    function calculateTrade() {
      const buy = parseFloat(elements.buyAmount.value) || 0;
      const sell = parseFloat(elements.sellAmount.value) || 0;

      // 計算並顯示中價
      const midPrice = (buy + sell) / 2;
      if (buy > 0 && sell > 0) {
        elements.midPrice.textContent = `中價：${midPrice.toFixed(2)}`;
      } else {
        elements.midPrice.textContent = "";
      }

      // 更新結果框
      if (buy <= 0 || sell <= 0) {
        elements.resultBox.value = "";
        return;
      }

      const basePrice = Math.ceil((midPrice + 0.05) * 1000) / 1000;
      const tenKPrice = Math.ceil((midPrice + 0.03) * 1000) / 1000;
      const fiftyKPrice = Math.ceil((midPrice + 0.015) * 1000) / 1000;

      const result = [
        `基礎成本：${basePrice.toFixed(3)}`,
        `滿萬優惠：${tenKPrice.toFixed(3)}`,
        `五萬優惠：${fiftyKPrice.toFixed(3)}`
      ].join("\n").trim();

      elements.resultBox.value = result;
    }

    // 複製結果
    function copyResult() {
      if (!elements.resultBox.value.trim()) {
        showNotification("請輸入數據", "warning");
        return;
      }
      navigator.clipboard.writeText(elements.resultBox.value)
        .then(() => showNotification("複製成功", "success"))
        .catch(() => showNotification("複製失敗；檢視權限", "error"));
    }

    // 打開匯率視窗
    function openRatePopup() {
      const width = 600, height = 400;
      const left = (screen.width - width) / 2;
      const top = (screen.height - height) / 2;
      window.open(
        "https://rate.bot.com.tw/xrt?Lang=zh-TW",
        "ratePopup",
        `width=${width},height=${height},top=${top},left=${left},scrollbars=yes`
      );
    }

    // 處理鍵盤事件，清空下一欄位
    function handleKey(event, nextId) {
      if (event.key === "Enter") {
        const nextElement = document.getElementById(nextId);
        if (nextElement) {
          nextElement.value = "";
          calculateTrade();
          nextElement.focus();
        }
      }
    }

    // 處理貼上事件，自動分割數值並複製結果
    function handlePaste(event) {
      event.preventDefault();
      const pastedText = (event.clipboardData || window.clipboardData).getData('text').trim();
      const isFirstField = event.target.id === "buyAmount";
      let values = [];

      // 先檢查是否有空格或tab分隔
      if (/\s+|\t/.test(pastedText)) {
        // 有空格或tab，直接分割
        values = pastedText.split(/\s+|\t/);
      } else {
        // 沒有空格，使用正則表達式智能分割
        // 匹配格式：單一數字.2-3位小數
        const regex = /\d\.\d{2,3}/g;
        values = pastedText.match(regex) || [];
      }

      if (values.length >= 2) {
        elements.buyAmount.value = values[0];
        elements.sellAmount.value = values[1];
        calculateTrade();
        
        // 如果是貼上在第一欄，且計算結果有效，自動複製結果
        if (isFirstField && elements.resultBox.value.trim()) {
          navigator.clipboard.writeText(elements.resultBox.value)
            .then(() => showNotification("複製成功", "success"))
            .catch(() => showNotification("複製失敗；檢視權限", "error"));
        }
      } else if (values.length === 1) {
        event.target.value = values[0];
        calculateTrade();
      }
    }

    // 點擊輸入欄位時清空該欄位
    function clearInput(input) {
      input.value = "";
      calculateTrade();
    }

    // 初始化
    calculateTrade();
  </script>
</body>
</html>
