<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>競價工具</title>
    <style>
:root{--primary:#667eea;--primary-dark:#764ba2;--success:#4caf50;--success-dark:#45a049;--danger:#ef5350;--danger-dark:#e53935;--info:#42a5f5;--info-dark:#1e88e5;--warning:#ffc107;--bg-main:#f8f9fa;--bg-hover:#f0f4ff;--bg-success:#f1f8e9;--bg-warning:#fff9e6;--border:#e0e0e0;--border-light:#e9ecef;--text-primary:#333;--text-secondary:#666;--text-muted:#999;--text-hint:#bbb;--radius-sm:8px;--radius-md:12px;--radius-lg:20px;--spacing-xs:8px;--spacing-sm:15px;--spacing-md:20px;--spacing-lg:30px;--transition:all .3s ease;--gradient-primary:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);--gradient-success:linear-gradient(135deg,#e8f5e9 0%,var(--bg-success) 100%)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft JhengHei','微軟正黑體',Arial,sans-serif;background:var(--gradient-primary);min-height:100vh;padding:var(--spacing-md);color:var(--text-primary)}
.container{min-width:1200px;max-width:1400px;margin:0 auto;background:white;border-radius:var(--radius-lg);box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden}

header{background:var(--gradient-primary);color:white;padding:40px var(--spacing-lg);text-align:center}
header h1{font-size:2.5em;margin-bottom:10px;font-weight:700}
.main-content{display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-lg);padding:var(--spacing-lg)}
.form-section,.results-section{background:var(--bg-main);border-radius:var(--radius-md);padding:var(--spacing-lg)}
.form-section h2,.results-section h2{color:var(--text-primary);font-size:1.8em;margin-bottom:25px;padding-bottom:var(--spacing-sm);border-bottom:2px solid var(--border)}
.price-form{display:flex;flex-direction:column;gap:var(--spacing-md)}
.form-group{display:flex;flex-direction:column;gap:var(--spacing-xs)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--spacing-sm)}
label{font-weight:600;color:#555;font-size:0.95em}
label input[type="checkbox"]{margin-right:var(--spacing-xs);width:auto;cursor:pointer}
input[type="checkbox"]{width:18px;height:18px;cursor:pointer;accent-color:var(--primary)}
input[type="text"],input[type="number"],input[type="url"],select{padding:12px var(--spacing-sm);font-size:1em;border:2px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:var(--transition);font-family:inherit;width:100%}
textarea{padding:12px var(--spacing-sm);font-size:1em;border:2px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:var(--transition);font-family:inherit;width:100%;resize:vertical;min-height:80px}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield;appearance:textfield}
select{cursor:pointer;background:white}
.form-actions{display:flex;gap:var(--spacing-sm);margin-top:10px}
.btn{padding:14px var(--spacing-lg);font-size:1em;font-weight:600;border:none;border-radius:var(--radius-sm);cursor:pointer;transition:var(--transition);font-family:inherit}
.btn-primary{background:var(--gradient-primary);color:white;flex:1}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(102,126,234,0.4)}
.btn-secondary{background:var(--border);color:var(--text-primary)}
.btn-secondary:hover{background:#d0d0d0}
.btn-danger,.btn-delete{background:var(--danger);color:white}
.btn-danger:hover,.btn-delete:hover{background:var(--danger-dark)}
.btn-danger{padding:10px var(--spacing-md);font-size:0.9em}
.btn-delete{padding:var(--spacing-xs) 16px;font-size:0.85em}
.btn-edit{background:var(--info);color:white;padding:var(--spacing-xs) 16px;font-size:0.85em}
.btn-edit:hover{background:var(--info-dark)}
.btn-circle{padding:6px;font-size:16px;border:none;border-radius:50%;cursor:pointer;transition:var(--transition);font-weight:600;width:28px;height:28px;display:flex;align-items:center;justify-content:center;line-height:1}
.btn-remove-product{background:var(--danger);color:white;box-shadow:0 2px 4px rgba(244,67,54,0.2)}
.btn-remove-product:hover{background:var(--danger-dark);transform:scale(1.1);box-shadow:0 4px 8px rgba(244,67,54,0.4)}
.btn-small{padding:6px 12px;font-size:0.85em;flex:1}
.results-header{display:flex;flex-direction:column;gap:var(--spacing-sm);margin-bottom:25px;padding-bottom:var(--spacing-sm)}
.results-header h2{margin:0;padding-bottom:var(--spacing-sm);border-bottom:2px solid var(--border);width:100%}
.search-container{width:100%;margin-top:var(--spacing-xs)}
.search-input{padding:10px var(--spacing-sm);font-size:0.95em;border:2px solid var(--border);border-radius:var(--radius-sm);outline:none;transition:var(--transition);font-family:inherit;width:100%;background:white}

.search-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.search-input::placeholder{color:var(--text-muted)}
.empty-state{text-align:center;padding:60px var(--spacing-md);color:var(--text-muted)}
.empty-state p{font-size:1.2em;margin-bottom:10px}

.hint{font-size:0.95em;color:var(--text-hint)}
.comparison-list{display:flex;flex-direction:column;gap:var(--spacing-md)}
.product-group,.store-group{background:white;border:2px solid var(--border);border-radius:var(--radius-md);padding:var(--spacing-md);transition:var(--transition)}
.product-group:hover{border-color:var(--primary);box-shadow:0 5px 15px rgba(102,126,234,0.15)}
.store-group{position:relative}
.store-group:hover{border-color:var(--primary);box-shadow:0 4px 12px rgba(102,126,234,0.1)}
.product-group-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--spacing-sm);padding-bottom:10px;border-bottom:2px solid var(--border);gap:var(--spacing-sm)}
.product-group-name{font-size:1.3em;font-weight:700;color:var(--text-primary);margin:0;flex:1;cursor:default}
.product-group-name.has-image,.product-group-name.no-image{cursor:pointer;transition:var(--transition)}
.product-group-name.has-image:hover,.product-group-name.no-image:hover{color:var(--primary);text-decoration:underline}
.btn-add-store-to-product{background:var(--success);color:white;box-shadow:0 2px 4px rgba(76,175,80,0.2)}
.btn-add-store-to-product:hover{background:var(--success-dark);transform:scale(1.1);box-shadow:0 4px 8px rgba(76,175,80,0.4)}
.modal{display:none;position:fixed;z-index:1000;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.modal.active{display:flex;justify-content:center;align-items:center}
.modal-content{background:white;border-radius:var(--radius-md);padding:var(--spacing-lg);max-width:600px;width:90%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalSlideIn .3s ease}
.image-view-modal-content{max-width:90vw;max-height:90vh;padding:var(--spacing-md)}
.image-view-container{position:relative;display:flex;justify-content:center;align-items:center;width:100%;min-height:200px;background:var(--bg-main);border-radius:var(--radius-sm);padding:var(--spacing-md)}
.image-view-image{max-width:100%;max-height:70vh;object-fit:contain;border-radius:var(--radius-sm);cursor:pointer;transition:opacity .3s ease}
.image-view-image:hover{opacity:.8}
.image-placeholder,.image-view-placeholder{display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:1.1em;padding:var(--spacing-md);text-align:center}
.image-view-placeholder{cursor:pointer;min-height:200px}
.image-view-actions{display:flex;flex-direction:column;gap:var(--spacing-sm);margin-top:var(--spacing-md);align-items:center}
@keyframes modalSlideIn{from{opacity:0;transform:translateY(-50px)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--spacing-md);padding-bottom:var(--spacing-sm);border-bottom:2px solid var(--border)}
.modal-title{font-size:1.5em;font-weight:700;color:var(--text-primary);margin:0}
.modal-close{background:none;border:none;padding:0;width:32px;height:32px;font-size:2em;color:var(--text-muted);cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:var(--transition)}
.modal-close:hover{background:var(--bg-main);color:var(--text-primary)}
.product-stores-list{display:none;flex-direction:column;gap:var(--spacing-xs);transition:opacity .3s ease,max-height .3s ease}
.product-group:hover .product-stores-list{display:flex}
.store-item{background:var(--bg-main);border:1px solid var(--border);border-radius:var(--radius-sm)}
.store-item:hover{border-color:var(--primary);background:var(--bg-hover)}
.store-item.best-price{border-color:var(--success);border-width:2px;background:var(--bg-success)}
.store-item-header{display:flex;align-items:center;justify-content:space-between;padding:12px var(--spacing-sm);cursor:pointer;gap:var(--spacing-sm)}
.store-item-name{flex:1;display:flex;align-items:center;gap:10px}
.store-item-price{font-size:1.1em;font-weight:700;color:var(--primary);min-width:80px;text-align:right}
.store-item-arrow{color:var(--text-muted);font-size:.9em;transition:transform .3s ease;min-width:20px}
.store-item-arrow.expanded{transform:rotate(90deg)}
.store-item-details{display:none;padding:var(--spacing-sm);background:white;border-top:1px solid var(--border);border-radius:0 0 var(--radius-sm) var(--radius-sm)}
.store-item-details.expanded{display:block}
.store-item-actions{display:flex;gap:10px;margin-top:var(--spacing-sm);padding-top:var(--spacing-sm);border-top:1px solid var(--border-light)}
.store-platform-icon{display:inline-flex;align-items:center;justify-content:center;padding:4px 12px;border-radius:12px;font-size:.85em;font-weight:600;color:white;min-width:60px;height:24px;text-align:center;margin-right:5px;box-sizing:border-box;line-height:1}
.store-platform-icon.platform-1688{background:linear-gradient(135deg,#ff6b00 0%,#ff8c00 100%)}
.store-platform-icon.platform-taobao{background:linear-gradient(135deg,#ff5000 0%,#ff6b35 100%)}
.store-platform-icon.platform-tmall{background:linear-gradient(135deg,#ff0036 0%,#ff3366 100%)}
.item-actions{display:flex;gap:var(--spacing-xs)}
.detail-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border-light)}
.detail-item:last-child{border-bottom:none}
.detail-label{font-size:.95em;color:var(--text-secondary);font-weight:500}
.detail-value{font-size:1.05em;color:var(--text-primary);font-weight:600}
.detail-value .text-success{color:var(--success)}
.detail-value .text-primary{color:var(--primary);font-weight:700}
.best-unit-price-badge,.best-total-price-badge{display:inline-block;color:white;padding:5px var(--spacing-sm);border-radius:var(--radius-lg);font-size:.85em;font-weight:600;margin-left:10px}
.best-unit-price-badge{background:var(--success)}.best-total-price-badge{background:var(--info)}
.stores-container{display:none}.stores-container.active{display:block}
.validation-message{color:var(--danger);font-size:.85em;margin-top:5px;display:none}.validation-message.show{display:block}
.price-calculation-box{background:var(--bg-hover);padding:var(--spacing-xs);border-radius:6px;margin-top:10px}
.price-calculation-row{display:flex;flex-direction:column;gap:var(--spacing-xs)}
.price-calculation-item{display:flex;justify-content:space-between;align-items:center}
.price-calculation-label{color:var(--text-secondary)}
.price-calculation-value{font-weight:700;color:var(--primary)}
.btn-group{display:flex;gap:var(--spacing-xs)}.btn-flex{flex:1}
.firebase-tip{padding:10px var(--spacing-lg);background:#fff3cd;color:#856404;font-size:.9em;text-align:center;border-bottom:1px solid #ffc107}
.firebase-tip.hidden,.hidden{display:none !important}
.no-backend-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;padding:var(--spacing-lg)}
.no-backend-overlay.hidden{display:none !important}
.no-backend-overlay .no-backend-card{background:white;border-radius:var(--radius-lg);padding:var(--spacing-lg);max-width:480px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.no-backend-overlay .no-backend-card h2{color:var(--danger);margin-bottom:var(--spacing-sm);font-size:1.5em}
.no-backend-overlay .no-backend-card p{color:var(--text-secondary);line-height:1.6;margin-bottom:var(--spacing-md)}
.no-backend-overlay .no-backend-card .btn{margin-top:10px}
.image-upload-container{display:flex;flex-direction:column;gap:var(--spacing-sm)}
.image-preview-container{position:relative;width:100%;min-height:200px;border:2px dashed var(--border);border-radius:var(--radius-sm);background:var(--bg-main);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);overflow:hidden}
.image-preview-container:hover{border-color:var(--primary);background:var(--bg-hover)}
.image-preview{max-width:100%;max-height:300px;object-fit:contain;border-radius:var(--radius-sm);cursor:pointer}
.image-preview:hover{opacity:.8}
.image-remove-btn{position:absolute;top:10px;right:10px;width:32px;height:32px;background:var(--danger);color:white;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.3);transition:var(--transition)}
.image-remove-btn:hover{background:var(--danger-dark);transform:scale(1.1)}
.upload-progress{display:flex;flex-direction:column;gap:8px}
.progress-bar{width:100%;height:8px;background:var(--border-light);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--gradient-primary);transition:width .3s ease;width:0}
.upload-progress span{font-size:.9em;color:var(--text-secondary)}
.product-image{max-width:100px;max-height:100px;object-fit:contain;border-radius:var(--radius-sm);border:2px solid var(--border);margin-right:var(--spacing-sm)}
.product-name-wrapper{position:relative;flex:1;display:flex;align-items:center}
.hover-thumbnail{display:none;position:absolute;top:100%;left:0;z-index:100;background:white;padding:6px;border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 5px 15px rgba(0,0,0,.2);width:200px;margin-top:10px;pointer-events:none}
.hover-thumbnail::before{content:'';position:absolute;top:-6px;left:20px;width:10px;height:10px;background:white;border-top:1px solid var(--border);border-left:1px solid var(--border);transform:rotate(45deg)}
.hover-thumbnail img{width:100%;height:auto;border-radius:4px;display:block}
.product-name-wrapper:hover .hover-thumbnail{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
    </style>
    
    <!-- Local config (API_KEY/config.js)，若載入失敗則使用本機儲存 -->
    <script src="API_KEY/config.js"></script>
    <!-- Firebase SDK（請用本機伺服器開啟，勿用 file:// 否則可能無法載入） -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
</head>
<body>
    <!-- 未連接後端資料庫時顯示，阻止使用以避免無效數據 -->
    <div id="noBackendOverlay" class="no-backend-overlay hidden" role="alert" aria-live="assertive">
        <div class="no-backend-card">
            <h2>⚠️ 無法連接 Firebase</h2>
            <button type="button" class="btn btn-primary" onclick="location.reload()">重新整理</button>
        </div>
    </div>
    <div class="container">
        <header>
            <h1>💰 競價工具</h1>
        </header>
        <div id="firebaseFileProtocolTip" class="firebase-tip hidden" role="alert" style="display:none !important;"></div>
        <div class="main-content">
            <!-- 新增表單 -->
            <div class="form-section">
                <h2>新增</h2>
                <form id="priceForm" class="price-form">
                    <div class="form-group">
                        <label for="productName">商品名稱</label>
                        <input 
                            type="text" 
                            id="productName" 
                            required
                        >
                        <span id="productNameValidation" class="validation-message"></span>
                    </div>

                    <div class="form-group">
                        <label for="productImage">商品圖片</label>
                        <div class="image-upload-container">
                            <input 
                                type="file" 
                                id="productImage" 
                                accept="image/*"
                                style="display: none;"
                            >
                            <div class="image-preview-container">
                                <img id="productImagePreview" src="" alt="預覽圖片" class="image-preview hidden">
                                <button type="button" id="removeImageBtn" class="image-remove-btn hidden" title="移除圖片">×</button>
                                <div id="productImagePlaceholder" class="image-placeholder">
                                    <span>新增圖片</span>
                                </div>
                            </div>
                            <div id="imageUploadProgress" class="upload-progress hidden">
                                <div class="progress-bar">
                                    <div class="progress-fill" id="progressFill"></div>
                                </div>
                                <span id="progressText">上傳中...</span>
                            </div>
                        </div>
                    </div>

                    <div id="storesContainer" class="stores-container">
                        <div id="storesList"></div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary btn-flex">新增</button>
                        <button type="button" id="resetBtn" class="btn btn-secondary btn-flex">重置</button>
                    </div>
                </form>
            </div>

            <!-- 比價結果列表 -->
            <div class="results-section">
                <div class="results-header">
                    <h2>結果</h2>
                    <div class="search-container">
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input"
                        >
                    </div>
                </div>

                <div id="emptyState" class="empty-state">
                    <p>📝 尚未新增任何比價記錄</p>
                    <p class="hint">請在上方表單中新增店家資訊</p>
                </div>

                <div id="comparisonList" class="comparison-list hidden"></div>
            </div>
        </div>
    </div>

    <!-- 編輯記錄彈出視窗 -->
    <div id="editRecordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="editModalTitle">編輯比價記錄</h3>
                <button class="modal-close" onclick="closeEditRecordModal()">&times;</button>
            </div>
            <form id="editRecordModalForm" class="price-form">
                <div class="form-group">
                    <label>商家連結</label>
                    <input 
                        type="url" 
                        id="editStoreUrl"
                        class="store-url-input"
                    >
                    <span id="editUrlValidation" class="url-validation-message validation-message"></span>
                </div>
                <div id="editStoreDetails" class="store-details-container">
                    <div class="form-row">
                        <div class="form-group">
                            <label>總金額</label>
                            <input 
                                type="number" 
                                id="editTotalPrice"
                                class="store-total-input"
                                min="0"
                                step="0.01"
                            >
                        </div>
                        <div class="form-group">
                            <label>數量</label>
                            <input 
                                type="number" 
                                id="editQuantity"
                                class="store-quantity-input"
                                min="1"
                                step="1"
                                value="1"
                            >
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>運費金額</label>
                            <input 
                                type="number" 
                                id="editShipping"
                                class="store-shipping-input"
                                min="0"
                                step="0.01"
                                value=""
                            >
                        </div>
                        <div class="form-group">
                            <label>優惠金額</label>
                            <input 
                                type="number" 
                                id="editCoupon"
                                class="store-coupon-input"
                                min="0"
                                step="0.01"
                                value=""
                            >
                        </div>
                    </div>
                    <div class="form-group price-calculation-box">
                        <div class="price-calculation-row">
                            <div class="price-calculation-item">
                                <span class="price-calculation-label">商品單價：</span>
                                <span id="editCalculatedPrice" class="price-calculation-value">-</span>
                            </div>
                            <div class="price-calculation-item">
                                <span class="price-calculation-label">商品總價：</span>
                                <span id="editCalculatedTotal" class="price-calculation-value">-</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-flex">更新</button>
                    <button type="button" class="btn btn-secondary btn-flex" onclick="closeEditRecordModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 圖片查看彈出視窗 -->
    <div id="imageViewModal" class="modal">
        <div class="modal-content image-view-modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="imageViewModalTitle">商品圖片</h3>
                <button class="modal-close" onclick="closeImageViewModal()">&times;</button>
            </div>
            <div class="image-view-container" id="imageViewContainer">
                <img id="imageViewImage" src="" alt="商品圖片" class="image-view-image">
                <div id="imageViewPlaceholder" class="image-view-placeholder hidden">
                    <span>新增圖片</span>
                </div>
                <button id="imageViewRemoveBtn" class="image-remove-btn" title="刪除圖片">×</button>
            </div>
            <div class="image-view-actions">
                <input type="file" id="imageViewFileInput" accept="image/*" style="display: none;">
                <div id="imageViewUploadProgress" class="upload-progress hidden">
                    <div class="progress-bar">
                        <div class="progress-fill" id="imageViewProgressFill"></div>

    <script>
// Firebase 配置（金鑰來自 API_KEY/config.js，勿寫入此檔）
const firebaseConfig = {
    apiKey: (window.__FIREBASE_API_KEY_PRICETOOLS__ || "").trim() || undefined,
    authDomain: "pricetools.firebaseapp.com",
    projectId: "pricetools",
    storageBucket: "pricetools.firebasestorage.app",
    messagingSenderId: "261643182004",
    appId: "1:261643182004:web:fd7911056c00f3fe071ce1",
    measurementId: "G-EYQRB3V0FR"
};

function _isApiKeySet(k) {
    return typeof k === 'string' && k.trim().length >= 20 && /^AIza/i.test(k.trim());
}

// 初始化 Firebase（僅在金鑰已設定時；若 CDN 未載入則略過避免拋錯）
let db = null;
let storage = null;
let auth = null;
if (typeof firebase === 'undefined') {
    console.warn('競價工具：Firebase SDK 未載入（請檢查網路或 CDN），將使用本機儲存。');
} else if (_isApiKeySet(firebaseConfig.apiKey)) {
    try {
        firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
        storage = firebase.storage();
    } catch (error) {
        console.warn('Firebase 初始化失敗:', error);
    }
} else {
    console.warn('競價工具：請在 API_KEY/config.js 設定 __FIREBASE_API_KEY_PRICETOOLS__ 以使用雲端存檔。');
}

// 以 file:// 開啟時 CDN 常無法載入，導致 Firebase 不可用
const isFileProtocol = (typeof location !== 'undefined' && location.protocol === 'file:');
if (isFileProtocol && !db) {
    console.warn('競價工具：目前以「檔案」方式開啟頁面，Firebase 可能無法載入。請改用本機伺服器（例如 VS Code Live Server 或 npm run 的靜態伺服器）開啟此頁面。');
}

// 全局變量
let priceData = [];
let storeGroupCounter = 0;
let useFirebase = !!db;
let isAddingStoreGroup = false;

const LOCAL_STORAGE_KEY = 'priceComparisonData';
const getLocalPriceData = () => {
    try {
        const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
        return [];
    }
};
const setLocalPriceData = (arr) => {
    try {
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(arr));
    } catch (e) {}
};

// 等待 auth 狀態初始化完成（onAuthStateChanged 第一次觸發才代表 SDK 真正就緒）
function waitForAuthReady() {
    return new Promise((resolve) => {
        const unsubscribe = auth.onAuthStateChanged((user) => {
            unsubscribe();
            resolve(user);
        });
    });
}

// 自動匿名登入（確保有 auth token，規則才會通過）
async function ensureSignedIn() {
    if (!auth) return false;
    try {
        // 先等 SDK 初始化完成，再判斷是否需要登入
        const user = await waitForAuthReady();
        if (!user) {
            await auth.signInAnonymously();
            // 登入後再等一次 onAuthStateChanged 確認 token 已附加
            await waitForAuthReady();
        }
        return !!auth.currentUser;
    } catch (e) {
        const code = (e && e.code) || '';
        const msg = (e && e.message) || String(e);
        console.warn('匿名登入失敗:', code, msg);
        // 400 Bad Request 或 operation-not-allowed 通常代表專案未開啟「匿名」登入
        const needEnableAnonymous = code === 'auth/operation-not-allowed' ||
            (msg && (msg.indexOf('400') !== -1 || msg.toLowerCase().indexOf('bad request') !== -1));
        if (needEnableAnonymous && typeof alert === 'function') {
            const authUrl = 'https://console.firebase.google.com/project/pricetools/authentication/providers';
            alert('匿名登入失敗（' + (code || '400') + '）。\n\n請到 Firebase 控制台開啟「匿名」登入：\nAuthentication → 登入方式 → 匿名 → 啟用 → 儲存。');
            window.open(authUrl, '_blank');
        }
        return false;
    }
}

// Firestore 集合名稱（可為英文或繁體中文，與遠端 Firestore 集合 ID 一致；未設定時用 pricetools_data）
const FIRESTORE_COLLECTION = (typeof window.__FIRESTORE_COLLECTION_PRICETOOLS__ !== 'undefined' && window.__FIRESTORE_COLLECTION_PRICETOOLS__)
    ? String(window.__FIRESTORE_COLLECTION_PRICETOOLS__).trim()
    : 'pricetools_data';
// Firestore 文檔 ID 不可含 "/"，需轉換以利讀寫
const toFirestoreDocId = (productName) => (productName || '未分類商品').replace(/\//g, '__slash__');
// Storage 資料夾名稱（中文）；檔名會用商品名稱，此處僅資料夾
const STORAGE_FOLDER = (typeof window.__STORAGE_FOLDER_PRICETOOLS__ !== 'undefined' && window.__STORAGE_FOLDER_PRICETOOLS__)
    ? String(window.__STORAGE_FOLDER_PRICETOOLS__).trim()
    : '競價工具';
// Storage 路徑用：去掉會破壞路徑的字元，保留中文與常見符號，長度限制避免逾限
const toStorageSafeFileName = (productName) => {
    const name = (productName || '未分類商品').replace(/[/\\#?\[\]]/g, '_').replace(/\s+/g, ' ').trim();
    return name.length > 80 ? name.slice(0, 80) : name;
};

// 從可能為舊格式的物件取出欄位（支援 productName / product_name / 商品名稱 等）
const pick = (obj, ...keys) => {
    if (!obj || typeof obj !== 'object') return undefined;
    for (const k of keys) {
        if (obj[k] !== undefined && obj[k] !== null) return obj[k];
    }
    return undefined;
};
// Firestore 還原：Timestamp 等轉成 JS 基本型別，方便正規化
const toPlainValue = (v) => {
    if (v == null) return v;
    if (typeof v.toMillis === 'function') return v.toMillis();
    if (typeof v.toDate === 'function') return v.toDate().getTime();
    return v;
};
// 正規化單筆記錄，確保必要欄位存在（Firestore 還原後可能型別不同；支援舊資料欄位名）
const normalizeRecord = (r) => {
    if (!r || typeof r !== 'object') return null;
    const id = toPlainValue(r.id) ?? r.id;
    const finalId = (id !== undefined && id !== null && id !== '') ? id : (Date.now() + Math.random());
    const num = (v) => {
        const x = toPlainValue(v);
        if (typeof x === 'number' && !isNaN(x)) return x;
        const n = parseFloat(x);
        return isNaN(n) ? 0 : n;
    };
    const productName = pick(r, 'productName', 'product_name', '商品名稱') || '未分類商品';
    const storeUrl = pick(r, 'storeUrl', 'store_url', '店家連結') || '';
    return {
        id: finalId,
        productName: typeof productName === 'string' ? productName : String(productName || '未分類商品'),
        storeUrl: typeof storeUrl === 'string' ? storeUrl : '',
        productImageUrl: toPlainValue(pick(r, 'productImageUrl', 'product_image_url', '圖片')) || null,
        productPrice: num(pick(r, 'productPrice', 'product_price', '商品價格')),
        quantity: Math.max(1, parseInt(toPlainValue(pick(r, 'quantity', '數量')), 10) || 1),
        shippingCost: num(pick(r, 'shippingCost', 'shipping_cost', '運費')),
        couponAmount: num(pick(r, 'couponAmount', 'coupon_amount', '優惠券')),
        finalPrice: num(pick(r, 'finalPrice', 'final_price', '總價')),
        unitPrice: num(pick(r, 'unitPrice', 'unit_price', '單價'))
    };
};

// 從單一集合解析 snapshot 到 priceData（不清空 priceData，只 push）
function parseSnapshotIntoPriceData(snapshot, flags) {
    let hasOldFormat = false;
    snapshot.forEach((doc) => {
        if (doc.id === 'userData') hasOldFormat = true;
        const data = doc.data();
        if (!data || typeof data !== 'object') return;
        if (data.records && Array.isArray(data.records)) {
            data.records.forEach((r) => {
                const normalized = normalizeRecord(r);
                if (normalized) priceData.push(normalized);
            });
            return;
        }
        const list = data.list || data.data || data.items || data.比價列表 || data.比價記錄 || data.records;
        if (Array.isArray(list)) {
            list.forEach((r) => {
                const normalized = normalizeRecord(r);
                if (normalized) priceData.push(normalized);
            });
            return;
        }
        let pushed = false;
        try {
            Object.keys(data).forEach((key) => {
                if (key === 'lastUpdated' || key === 'createdAt' || key === 'updatedAt') return;
                const val = data[key];
                if (Array.isArray(val) && val.length > 0) {
                    val.forEach((r) => {
                        const normalized = normalizeRecord(r);
                        if (normalized) { priceData.push(normalized); pushed = true; }
                    });
                }
            });
        } catch (e) { /* ignore */ }
        if (pushed) return;
        if (data.productName !== undefined || data.product_name !== undefined || data.商品名稱 !== undefined || data.storeUrl !== undefined || data.store_url !== undefined) {
            const normalized = normalizeRecord(data);
            if (normalized) priceData.push(normalized);
        }
    });
    if (flags) flags.hasOldFormat = hasOldFormat;
}

const FIRESTORE_LOAD_TIMEOUT_MS = 15000;
const FIRESTORE_FALLBACK_COLLECTIONS = ['競價工具', 'pricetools_data'];

function showFirestoreLoadError(code, msg) {
    if (msg === 'FIRESTORE_LOAD_TIMEOUT' || (msg && msg.includes('timeout'))) {
        alert('雲端連線逾時。\n\n請確認網路連線正常，或稍後再試。已改為使用本機儲存。');
        return;
    }
    if (code === 'permission-denied' || (msg && msg.includes('permission'))) {
        alert('雲端讀取權限不足（' + code + '）。\n\n請依序檢查：\n1. Firestore 規則：確認已發佈允許讀寫的規則。\n2. 若專案有開啟 App Check 強制執行，請暫時關閉或為此網站註冊 App Check。\n\n已改為使用本機儲存。');
        window.open('https://console.firebase.google.com/project/pricetools/firestore/rules', '_blank');
        setTimeout(() => window.open('https://console.firebase.google.com/project/pricetools/appcheck', '_blank'), 500);
    }
}

const loadDataFromFirestore = async (options = {}) => {
    const { timeoutMs = FIRESTORE_LOAD_TIMEOUT_MS, retryCount = 0 } = options;
    if (!db) return false;
    const loadColl = (coll) => db.collection(coll || FIRESTORE_COLLECTION).get();
    const withTimeout = (ms) => {
        let tid;
        return Promise.race([
            loadColl(FIRESTORE_COLLECTION).then((snap) => { clearTimeout(tid); return snap; }),
            new Promise((_, rej) => { tid = setTimeout(() => rej(new Error('FIRESTORE_LOAD_TIMEOUT')), ms); })
        ]);
    };
    try {
        priceData = [];
        let snapshot;
        try {
            snapshot = await withTimeout(timeoutMs);
        } catch (err) {
            if (retryCount > 0) throw err;
            console.warn('競價工具：首次讀取 Firestore 逾時或失敗，正在重試一次…', err && err.message);
            snapshot = await withTimeout(timeoutMs);
        }
        const flags = {};
        parseSnapshotIntoPriceData(snapshot, flags);
        if (priceData.length === 0) {
            for (const coll of FIRESTORE_FALLBACK_COLLECTIONS) {
                if (coll === FIRESTORE_COLLECTION) continue;
                try {
                    const fallbackSnap = await db.collection(coll).get();
                    if (fallbackSnap.size > 0) {
                        parseSnapshotIntoPriceData(fallbackSnap, flags);
                        if (priceData.length > 0) {
                            console.log('競價工具：從備用集合「' + coll + '」載入到結果區。');
                            break;
                        }
                    }
                } catch (e) {
                    console.warn('競價工具：讀取備用集合「' + coll + '」失敗', e && e.message);
                }
            }
        }
        console.log('競價工具：Firestore 載入完成，結果區筆數 ' + priceData.length);
        if (snapshot.size > 0 && priceData.length === 0) {
            console.warn('競價工具：主集合有文件但解析出 0 筆，請確認遠端文件結構或集合名稱。');
        }
        if (flags.hasOldFormat && priceData.length > 0) {
            await saveDataToFirestore();
            try { await db.collection(FIRESTORE_COLLECTION).doc('userData').delete(); } catch (e) { console.warn('遷移後刪除舊 userData 失敗:', e); }
        }
        renderComparisonList();
        return true;
    } catch (error) {
        const code = (error && error.code) || '';
        const msg = (error && error.message) || String(error);
        console.error('從 Firestore 載入數據失敗:', code, msg, error);
        showFirestoreLoadError(code, msg);
    }
    return false;
};

// 保存數據到 Firestore（按商品名稱分組保存，文檔 ID 使用安全字串）
const saveDataToFirestore = async () => {
    if (!db) return false;
    
    try {
        const groupedByProduct = {};
        priceData.forEach(record => {
            const productName = record.productName || '未分類商品';
            if (!groupedByProduct[productName]) {
                groupedByProduct[productName] = [];
            }
            groupedByProduct[productName].push(record);
        });
        
        const batch = db.batch();
        const productNames = Object.keys(groupedByProduct);
        const idsWeAreKeeping = new Set(productNames.map(toFirestoreDocId));
        
        const existingSnapshot = await db.collection(FIRESTORE_COLLECTION).get();
        const existingDocIds = new Set();
        existingSnapshot.forEach(doc => {
            existingDocIds.add(doc.id);
        });
        
        productNames.forEach(productName => {
            const docId = toFirestoreDocId(productName);
            const productRef = db.collection(FIRESTORE_COLLECTION).doc(docId);
            batch.set(productRef, {
                records: groupedByProduct[productName],
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            });
        });
        
        existingDocIds.forEach(docId => {
            if (!idsWeAreKeeping.has(docId)) {
                batch.delete(db.collection(FIRESTORE_COLLECTION).doc(docId));
            }
        });
        
        await batch.commit();
        return true;
    } catch (error) {
        console.error('保存至 Firestore 失敗:', error);
        return false;
    }
};

const loadData = async () => {
    if (useFirebase) {
        const signedIn = await ensureSignedIn();
        if (!signedIn) console.warn('未能登入 Firebase，改用本機儲存。');
        const loaded = signedIn && await loadDataFromFirestore({ retryCount: 1 });
        if (loaded) {
            const localArr = getLocalPriceData();
            if (priceData.length === 0 && localArr.length > 0) {
                priceData = localArr.map(normalizeRecord).filter(Boolean);
                if (priceData.length > 0) {
                    await saveDataToFirestore();
                    localStorage.removeItem(LOCAL_STORAGE_KEY);
                }
            }
            renderComparisonList();
            return;
        }
    }
    priceData = getLocalPriceData().map(normalizeRecord).filter(Boolean);
    renderComparisonList();
};

const saveData = async () => {
    if (useFirebase) {
        await ensureSignedIn();
        if (await saveDataToFirestore()) {
            setLocalPriceData(priceData);
            return;
        }
    }
    setLocalPriceData(priceData);
};

const roundToTwoDecimals = (value) => Math.round((value || 0) * 100) / 100;

const formatNumber = (value) => {
    const rounded = roundToTwoDecimals(value);
    if (typeof rounded !== 'number' || isNaN(rounded)) return '0';
    return rounded % 1 === 0 ? rounded.toString() : rounded.toFixed(2);
};

// 通用的輸入框事件綁定函數
const bindNumberInputEvents = (inputs, calculateCallback, onBlurCallback = null) => {
    (inputs && Array.isArray(inputs) ? inputs.filter(Boolean) : []).forEach((input) => {
        input.addEventListener('blur', (e) => {
            const value = parseFloat(e.target.value);
            if (!isNaN(value)) {
                e.target.value = formatNumber(value);
            }
            calculateCallback();
            if (onBlurCallback) onBlurCallback(input, e);
        });
        input.addEventListener('input', calculateCallback);
    });
};

// 通用的輸入框克隆函數
const cloneInputElements = (inputIds) => {
    const cloned = {};
    inputIds.forEach(id => {
        const input = document.getElementById(id);
        if (input) {
            const clonedInput = input.cloneNode(true);
            input.parentNode.replaceChild(clonedInput, input);
            cloned[id] = document.getElementById(id);
        }
    });
    return cloned;
};

// 綁定店家表單（URL 驗證 + 價格計算），用於編輯/新增店家彈窗
const bindStoreModalForm = (cfg) => {
    const { formId, urlId, totalId, quantityId, shippingId, couponId, urlValidationId, detailsContainerId, calculatedTotalId, calculatedPriceId, excludeRecordId } = cfg;
    const form = document.getElementById(formId);
    if (form) setupInputDeleteBehavior(form);
    const cloned = cloneInputElements([urlId, totalId, quantityId, shippingId, couponId]);
    const urlInput = cloned[urlId];
    if (!urlInput) return;
    const urlValidationMessage = document.getElementById(urlValidationId);
    const detailsContainer = document.getElementById(detailsContainerId);
    const calculatedTotalEl = document.getElementById(calculatedTotalId);
    const calculatedPriceEl = document.getElementById(calculatedPriceId);
    const validateUrl = () => validateAndShowUrl(urlInput, urlValidationMessage, detailsContainer, excludeRecordId);
    urlInput.addEventListener('input', () => setTimeout(validateUrl, 300));
    urlInput.addEventListener('blur', validateUrl);
    const calculate = () => {
        const totalPrice = parseFloat(cloned[totalId]?.value) || 0;
        const quantity = parseInt(cloned[quantityId]?.value, 10) || 1;
        const shippingCost = roundToTwoDecimals(parseFloat(cloned[shippingId]?.value) || 0);
        const { productPrice, productUnitPrice } = calculatePrice(totalPrice, quantity, shippingCost);
        updatePriceDisplay(calculatedTotalEl, calculatedPriceEl, productPrice, productUnitPrice, quantity);
    };
    bindNumberInputEvents([cloned[totalId], cloned[shippingId], cloned[couponId]], calculate);
    if (cloned[quantityId]) cloned[quantityId].addEventListener('input', calculate);
};

// 從表單元素獲取價格數據
const getFormPriceData = (urlId, totalId, quantityId, shippingId, couponId) => {
    const storeUrl = document.getElementById(urlId)?.value.trim() || '';
    const totalPrice = roundToTwoDecimals(parseFloat(document.getElementById(totalId)?.value || 0));
    const quantity = parseInt(document.getElementById(quantityId)?.value || 1);
    const shippingCost = roundToTwoDecimals(parseFloat(document.getElementById(shippingId)?.value || 0));
    const couponAmount = roundToTwoDecimals(parseFloat(document.getElementById(couponId)?.value || 0));
    const { productPrice, productUnitPrice } = calculatePrice(totalPrice, quantity, shippingCost);
    
    return {
        storeUrl,
        totalPrice,
        quantity,
        shippingCost,
        couponAmount,
        productPrice,
        unitPrice: productUnitPrice,
        finalPrice: totalPrice
    };
};

// 驗證價格表單數據
const validatePriceFormData = (data) => {
    if (!data.storeUrl || isNaN(data.totalPrice) || data.totalPrice <= 0 || data.quantity < 1) {
        return { valid: false, message: '請填寫完整的店家資訊（商家連結、總金額、數量）' };
    }
    return { valid: true, message: '' };
};

// 通用的URL驗證和顯示函數
const validateAndShowUrl = (urlInput, urlValidationMessage, detailsContainer, excludeRecordId = null, currentIndex = null) => {
    const url = urlInput.value.trim();
    if (!url) {
        urlValidationMessage.style.display = 'none';
        urlInput.style.borderColor = '';
        if (detailsContainer) detailsContainer.classList.add('hidden');
        return false;
    }
    
    const urlValidation = validateUrl(url);
    if (!urlValidation.valid) {
        urlValidationMessage.textContent = urlValidation.message;
        urlValidationMessage.style.display = 'block';
        urlInput.style.borderColor = '#ef5350';
        if (detailsContainer) detailsContainer.classList.add('hidden');
        return false;
    }
    
    const duplicateCheck = checkDuplicateUrl(url, excludeRecordId, currentIndex);
    if (duplicateCheck.isDuplicate) {
        urlValidationMessage.textContent = duplicateCheck.message;
        urlValidationMessage.style.display = 'block';
        urlInput.style.borderColor = '#ef5350';
        if (detailsContainer) detailsContainer.classList.add('hidden');
        return false;
    }
    
    urlValidationMessage.style.display = 'none';
    urlInput.style.borderColor = '';
    if (detailsContainer) detailsContainer.classList.remove('hidden');
    return true;
};

// 從剪貼簿取得第一個圖片檔，無則回傳 null
const getImageFileFromClipboard = (e) => {
    const items = e.clipboardData?.items;
    if (!items?.length) return null;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
            const blob = items[i].getAsFile();
            if (!blob) return null;
            return new File([blob], `pasted-image-${Date.now()}.png`, { type: blob.type || 'image/png' });
        }
    }
    return null;
};

const escapeForJs = (str) => String(str).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
const escapeForHtmlAttr = (str) => String(str).replace(/"/g, '&quot;');

const tryParseUrl = (url) => {
    try {
        // 支援 http:// 和 https:// 開頭的 URL
        return { url: new URL(url), valid: true };
    } catch (e) {
        if (!url.includes('://')) {
            try {
                // 如果沒有協議，預設添加 http://
                return { url: new URL('http://' + url), valid: true };
            } catch (e2) {
                return { valid: false };
            }
        }
        return { valid: false };
    }
};

const validateUrl = (url) => {
    if (!url || !url.trim()) return { valid: false, message: '' };
    
    const trimmedUrl = url.trim();
    // 檢查是否以 http:// 或 https:// 開頭
    const lowerUrl = trimmedUrl.toLowerCase();
    if (!lowerUrl.startsWith('http://') && !lowerUrl.startsWith('https://')) {
        return { valid: false, message: '請貼上連結（需以 http:// 或 https:// 開頭）' };
    }
    
    const result = tryParseUrl(url);
    return result.valid 
        ? { valid: true, message: '' }
        : { valid: false, message: '請輸入有效的網址連結（例如：https://example.com）' };
};

const normalizeUrl = (url) => {
    if (!url || !url.trim()) return '';
    const result = tryParseUrl(url);
    return result.valid ? result.url.href.toLowerCase() : url.trim().toLowerCase();
};

const extractDomainFromUrl = (url) => {
    const result = tryParseUrl(url);
    if (!result.valid) return url;
    let domain = result.url.hostname;
    return domain.startsWith('www.') ? domain.substring(4) : domain;
};

const getStorePlatformIcon = (url) => {

};

const isUrlForProductName = (str) => {
    const trimmed = str.trim();
    // 只檢查明顯的 URL 格式：以 http:// 或 https:// 開頭
    if (trimmed.toLowerCase().startsWith('http://') || trimmed.toLowerCase().startsWith('https://')) {
        return true;
    }
    // 檢查是否為有效的域名格式（包含常見的頂級域名，且不包含空格）
    if (!trimmed.includes(' ')) {
        const domainWithTldPattern = /^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.(com|net|org|edu|gov|tw|cn|jp|kr|uk|de|fr|it|es|ru|au|ca|mx|br|in|id|ph|sg|my|vn|th|hk|mo|io|co|me|info|biz)(\.[a-z]{2})?(\/.*)?$/i;
        return domainWithTldPattern.test(trimmed);
    }
    return false;
};

// 通用價格計算函數
const calculatePrice = (totalPrice, quantity, shippingCost = 0) => {
    const productPrice = roundToTwoDecimals(totalPrice - shippingCost);
    const productUnitPrice = quantity > 0 ? roundToTwoDecimals(productPrice / quantity) : 0;
    return { productPrice, productUnitPrice };
};

// 更新價格顯示
const updatePriceDisplay = (calculatedTotalEl, calculatedPriceEl, productPrice, productUnitPrice, quantity) => {
    if (calculatedTotalEl) {
        calculatedTotalEl.textContent = productPrice > 0 ? formatPriceDisplay(productPrice) : '-';
    }
    if (calculatedPriceEl) {
        calculatedPriceEl.textContent = (productPrice > 0 && quantity > 0) ? formatPriceDisplay(productUnitPrice) : '-';
    }
};

const calculateProductPrice = (group) => {
    const totalPrice = parseFloat(group.querySelector('.store-total-input')?.value) || 0;
    const quantity = parseInt(group.querySelector('.store-quantity-input')?.value) || 1;
    const shippingInput = group.querySelector('.store-shipping-input');
    const couponInput = group.querySelector('.store-coupon-input');
    
    const shippingCost = roundToTwoDecimals(parseFloat(shippingInput?.value) || 0);
    const couponAmount = roundToTwoDecimals(parseFloat(couponInput?.value) || 0);
    const { productPrice, productUnitPrice } = calculatePrice(totalPrice, quantity, shippingCost);
    
    const calculatedTotalEl = group.querySelector('.store-calculated-total');
    const calculatedPriceEl = group.querySelector('.store-calculated-price');
    updatePriceDisplay(calculatedTotalEl, calculatedPriceEl, productPrice, productUnitPrice, quantity);
    
    return { productPrice, shippingCost, couponAmount, quantity };
};

// 檢查URL是否重複（全域檢測）
const checkDuplicateUrl = (url, excludeRecordId = null, currentIndex = null) => {
    if (!url || !url.trim()) return { isDuplicate: false, message: '' };
    
    const normalizedUrl = normalizeUrl(url);
    
    // 如果提供了currentIndex，檢查表單中的重複（新增表單內的檢測）
    if (currentIndex !== null) {
        const allGroups = document.querySelectorAll('.store-group');
        for (const otherGroup of allGroups) {
            const otherIndex = parseInt(otherGroup.getAttribute('data-store-index'));
            if (otherIndex !== currentIndex) {
                const otherUrlInput = otherGroup.querySelector('.store-url-input');
                if (otherUrlInput?.value.trim() && normalizeUrl(otherUrlInput.value.trim()) === normalizedUrl) {
                    return { isDuplicate: true, message: '連結重複請貼上新連結' };
                }
            }
        }
    }
    
    // 全域檢測：檢查priceData中所有商品的連結
    if (priceData && priceData.length > 0) {
        const existingRecord = priceData.find(record => {
            // 排除當前正在編輯的記錄
            if (excludeRecordId && record.id === excludeRecordId) return false;
            return record.storeUrl && normalizeUrl(record.storeUrl) === normalizedUrl;
        });
        if (existingRecord) {
            return { isDuplicate: true, message: '連結重複請貼上新連結' };
        }
    }
    
    return { isDuplicate: false, message: '' };
};

const addStoreGroup = () => {
    const storesList = document.getElementById('storesList');
    const index = storeGroupCounter++;
    storesList.insertAdjacentHTML('beforeend', createStoreGroup(index));
    
    const group = storesList.querySelector(`[data-store-index="${index}"]`);
    
    // 為新添加的輸入框設置 Delete 鍵行為
    setupInputDeleteBehavior(group);
    const totalInput = group.querySelector('.store-total-input');
    const quantityInput = group.querySelector('.store-quantity-input');
    const shippingInput = group.querySelector('.store-shipping-input');
    const couponInput = group.querySelector('.store-coupon-input');
    const urlInput = group.querySelector('.store-url-input');
    const urlValidationMessage = group.querySelector('.url-validation-message');
    const detailsContainer = group.querySelector('.store-details-container');
    
    // 防抖計時器，用於優化輸入驗證性能
    let inputDebounceTimer = null;
    
    const validateStoreUrlInput = () => {
        validateAndShowUrl(urlInput, urlValidationMessage, detailsContainer, null, index);
    };
    
    const checkAndAddNextStoreGroup = () => {
        if (isAddingStoreGroup) {
            return;
        }
        const url = urlInput.value.trim();
        if (!url) return;
        
        const urlValidation = validateUrl(url);
        if (!urlValidation.valid) return;
        
        const duplicateCheck = checkDuplicateUrl(url, null, index);
        if (duplicateCheck.isDuplicate) return;
        
        const allGroups = storesList.querySelectorAll('.store-group');
        const isLastGroup = Array.from(allGroups).indexOf(group) === allGroups.length - 1;
        if (isLastGroup) {
            // 檢查是否要添加第二組或更多組
            // 如果當前組索引 >= 0（即至少是第一組），檢查當前組的總金額和數量
            const currentGroupIndex = Array.from(allGroups).indexOf(group);
            if (currentGroupIndex >= 0) {
                // 獲取當前組的總金額和數量輸入框
                const currentTotalInput = group.querySelector('.store-total-input');
                const currentQuantityInput = group.querySelector('.store-quantity-input');
                
                const totalPrice = parseFloat(currentTotalInput?.value) || 0;
                const quantity = parseInt(currentQuantityInput?.value) || 0;
                
                // 如果總金額 <= 0 或數量 <= 0，則不允許添加下一組
                if (totalPrice <= 0 || quantity <= 0) {
                    return;
                }
            }
            
            isAddingStoreGroup = true;
            setTimeout(() => {
                addStoreGroup();
                isAddingStoreGroup = false;
            }, 0);
        }
    };
    
    // 當總金額或數量輸入時，也檢查是否應該添加下一組
    const checkAndAddNextStoreGroupOnPriceInput = () => {
        // 延遲檢查，避免在輸入過程中頻繁觸發
        if (checkAndAddNextStoreGroupOnPriceInput.timer) {
            clearTimeout(checkAndAddNextStoreGroupOnPriceInput.timer);
        }
        checkAndAddNextStoreGroupOnPriceInput.timer = setTimeout(() => {
            checkAndAddNextStoreGroup();
        }, 300);
    };
    
    urlInput.addEventListener('blur', () => {
        // 清除防抖計時器，立即驗證
        if (inputDebounceTimer) {
            clearTimeout(inputDebounceTimer);
            inputDebounceTimer = null;
        }
        validateStoreUrlInput();
        checkAndAddNextStoreGroup();
    });
    
    urlInput.addEventListener('input', () => {
        // 使用防抖機制，避免頻繁驗證導致記憶體問題
        if (inputDebounceTimer) {
            clearTimeout(inputDebounceTimer);
        }
        // 對於 URL 輸入，使用較短的延遲（300ms）
        inputDebounceTimer = setTimeout(() => {
            validateStoreUrlInput();
            // 貼上連結後自動跳出下一組
            checkAndAddNextStoreGroup();
            inputDebounceTimer = null;
        }, 300);
    });
    
    // 添加 paste 事件監聽器，貼上時立即處理
    // 注意：此事件監聽器對於貼上功能至關重要，請勿移除或修改
    urlInput.addEventListener('paste', (e) => {
        // 清除防抖計時器，避免與 input 事件衝突
        if (inputDebounceTimer) {
            clearTimeout(inputDebounceTimer);
            inputDebounceTimer = null;
        }
        // 使用較長的延遲確保貼上的內容已經完全寫入輸入框
        // 50ms 是經過測試的最佳值，太短可能無法獲取到貼上的內容
        setTimeout(() => {
            if (urlInput.value.trim()) {
                validateStoreUrlInput();
                checkAndAddNextStoreGroup();
            }
        }, 50);
    });
    
    // 當商品名稱或其他店家組的URL改變時，重新驗證當前URL（用於檢測重複）
    // 優化：使用事件委派，只在失去焦點時觸發其他輸入框的驗證，避免連鎖反應和記憶體問題
    // 移除原來的連鎖驗證邏輯，改用更高效的方式
    
    // 綁定輸入框的四捨五入事件
    [totalInput, shippingInput, couponInput].forEach(input => {
        input.addEventListener('blur', (e) => {
            const value = parseFloat(e.target.value);
            if (!isNaN(value)) {
                e.target.value = formatNumber(value);
            }
            calculateProductPrice(group);
            // 當總金額輸入完成後，檢查是否應該添加下一組
            if (input === totalInput) {
                checkAndAddNextStoreGroupOnPriceInput();
            }
        });
        input.addEventListener('input', () => {
            calculateProductPrice(group);
        });
    });
    
    quantityInput.addEventListener('input', () => {
        calculateProductPrice(group);
    });
    
    quantityInput.addEventListener('blur', () => {
        // 當數量輸入完成後，檢查是否應該添加下一組
        checkAndAddNextStoreGroupOnPriceInput();
    });
    
    // 初始計算
    calculateProductPrice(group);
}

        return;
    }
    
    const validateProductNameField = () => {

            productNameInput.style.borderColor = '';

    };

// 圖片上傳相關變量
let currentProductImageUrl = null;
let currentProductImageFile = null;

const MAX_IMAGE_SIZE = 5 * 1024 * 1024;
function validateImageFile(file) {
    if (!file) return { valid: false, message: '' };
    if (!file.type.startsWith('image/')) return { valid: false, message: '請選擇圖片文件' };
    if (file.size > MAX_IMAGE_SIZE) return { valid: false, message: '圖片大小不能超過 5MB' };
    return { valid: true, message: '' };
}

// 處理圖片文件的通用函數
function handleImageFile(file) {
    if (!file) return;
    const check = validateImageFile(file);
    if (!check.valid) { alert(check.message); return; }
    currentProductImageFile = file;
    
    // 顯示預覽
    const imagePreview = document.getElementById('productImagePreview');
    const imagePlaceholder = document.getElementById('productImagePlaceholder');
    const removeImageBtn = document.getElementById('removeImageBtn');
    
    const reader = new FileReader();
    reader.onload = (e) => {
        if (!imagePreview || !imagePlaceholder || !removeImageBtn) return;
        imagePreview.src = e.target.result;
        imagePreview.classList.remove('hidden');
        imagePlaceholder.classList.add('hidden');
        removeImageBtn.classList.remove('hidden');
    };
    reader.readAsDataURL(file);
}

// 初始化圖片上傳功能
function initImageUpload() {
    const imageInput = document.getElementById('productImage');
    const removeImageBtn = document.getElementById('removeImageBtn');
    const imagePreview = document.getElementById('productImagePreview');
    const imagePlaceholder = document.getElementById('productImagePlaceholder');
    if (!imageInput || !imagePreview || !imagePlaceholder || !removeImageBtn || !imagePreview.parentElement) return;
    const previewContainer = imagePreview.parentElement;
    const imageUploadContainer = previewContainer.parentElement;
    
    // 預覽容器點擊選擇圖片（無論是否有圖片都可以點擊上傳或更換）
    // 但排除移除按鈕的點擊
    previewContainer.addEventListener('click', (e) => {
        // 如果點擊的是移除按鈕，不觸發文件選擇
        if (e.target === removeImageBtn || e.target.closest('.image-remove-btn')) {
            return;
        }
        imageInput.click();
    });
    
    // 文件選擇
    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        handleImageFile(file);
    });
    
    // 移除圖片（阻止事件冒泡，避免觸發文件選擇）
    removeImageBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // 阻止事件冒泡
        resetImageUpload();
    });
    
    // 複製貼上圖片功能
    // 使用全局監聽，但只在焦點不在輸入框時處理圖片貼上
    let pasteHandler = (e) => {
        // 如果圖片查看彈出視窗打開，不處理貼上（讓圖片查看彈出視窗的處理器處理）
        const imageViewModal = document.getElementById('imageViewModal');
        if (imageViewModal && imageViewModal.classList.contains('active')) {
            return;
        }
        
        // 如果焦點在輸入框或文字區域，不處理圖片貼上（讓用戶正常輸入）
        const activeElement = document.activeElement;
        if (activeElement && (
            activeElement.tagName === 'INPUT' || 
            activeElement.tagName === 'TEXTAREA' ||
            activeElement.isContentEditable
        )) {
            // 但如果輸入框是圖片選擇器，則可以處理
            if (activeElement.type !== 'file') {
                return;
            }
        }
        
        const file = getImageFileFromClipboard(e);
        if (!file) return;
        e.preventDefault();
        handleImageFile(file);
        if (!imagePreview.src || imagePreview.classList.contains('hidden')) {
            const placeholderText = imagePlaceholder.querySelector('span');
            if (placeholderText) {
                const originalText = placeholderText.innerHTML;
                placeholderText.style.color = 'var(--success)';
                placeholderText.innerHTML = '✓ 圖片已貼上！<br><small style="font-size: 0.85em; opacity: 0.7;">點擊可更換圖片</small>';
                setTimeout(() => {
                    placeholderText.innerHTML = originalText;
                    placeholderText.style.color = '';
                }, 2000);
            }
        }
    };
    
    // 在文檔上監聽貼上事件（全局）
    document.addEventListener('paste', pasteHandler);
    
    // 添加提示文字說明支援貼上功能
    const placeholderText = imagePlaceholder.querySelector('span');
    if (placeholderText) {
        placeholderText.innerHTML = '新增圖片';
    }
}

// 重置圖片上傳
function resetImageUpload() {
    const imageInput = document.getElementById('productImage');
    const imagePreview = document.getElementById('productImagePreview');

// 顯示 Storage 上傳錯誤並引導至規則頁（權限不足時）
function showStorageUploadError(error) {
    const code = (error && error.code) || '';
    const msg = (error && error.message) || String(error);
    console.error('圖片上傳失敗:', code, msg, error);
    const isPermission = (code === 'storage/unauthorized' || code === 'storage/canceled' || (msg && (msg.includes('permission') || msg.includes('Unauthorized'))));
    if (isPermission && typeof alert === 'function') {
        const rulesUrl = 'https://console.firebase.google.com/project/pricetools/storage/pricetools.firebasestorage.app/rules';
        alert('圖片上傳失敗（' + (code || 'error') + '）。\n\n請在 Firebase 控制台 → Storage → 規則 中，確認已允許讀寫，並按「發佈」。若已開啟 App Check 強制執行，請暫時關閉或為此網站註冊。');
        window.open(rulesUrl, '_blank');
    } else {
        alert('圖片上傳失敗：' + (msg || '請稍後再試'));
    }
}

// 依下載 URL 刪除 Storage 檔案（Firestore 刪除時一併刪除圖片，避免孤兒檔）
async function deleteStorageFileByUrl(url) {
    if (!storage || !url || typeof url !== 'string') return;
    const u = url.trim();
    if (!u) return;
    try {
        const ref = storage.refFromURL(u);
        await ref.delete();
    } catch (e) {
        if (e && e.code !== 'storage/object-not-found') console.warn('刪除 Storage 圖片失敗:', e && e.message);
    }
}

// 通用：上傳圖片到 Firebase Storage，可選進度條；productName 為選填，用於檔名（中文商品名稱）
async function uploadImageToStorage(file, progressIds = null, productName = null) {
    if (!storage || !file) return null;
    const signedIn = await ensureSignedIn();
    if (!signedIn) {
        console.warn('競價工具：未登入 Firebase，無法上傳圖片至 Storage。');
        if (typeof alert === 'function') {
            alert('無法上傳圖片：請確認網路連線正常，並允許匿名登入。若問題持續，請至 Firebase Console → Authentication 開啟「匿名」登入。');
        }
        return null;
    }
    const container = progressIds ? document.getElementById(progressIds.containerId) : null;
    const progressFill = progressIds ? document.getElementById(progressIds.fillId) : null;
    const progressText = progressIds ? document.getElementById(progressIds.textId) : null;
    const showProgress = (pct, text) => {
        if (progressFill) progressFill.style.width = (pct || 0) + '%';
        if (progressText) progressText.textContent = text || '上傳中...';
    };
    const hideProgress = () => { if (container) container.classList.add('hidden'); };
    try {
        if (container) {
            container.classList.remove('hidden');
            showProgress(0, '上傳中...');
        }
        const now = new Date();
        const yymmdd = String(now.getFullYear()).slice(-2) + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
        const fileExt = (file.name && file.name.split('.').length > 1) ? file.name.split('.').pop() : 'png';
        const safeName = toStorageSafeFileName(productName || '');
        const prefixBase = safeName ? `${safeName}_${yymmdd}` : `未分類_${yymmdd}`;
        let fileBase = prefixBase;
        try {
            const folderRef = storage.ref().child(STORAGE_FOLDER);
            const listResult = await folderRef.listAll();
            const samePrefixCount = listResult.items.filter((item) => item.name.startsWith(prefixBase)).length;
            fileBase = samePrefixCount > 0 ? `${prefixBase}_${samePrefixCount + 1}` : `${prefixBase}_1`;
        } catch (e) {
            fileBase = prefixBase + '_1';
        }
        const fileName = `${STORAGE_FOLDER}/${fileBase}.${fileExt}`;
        const storageRef = storage.ref().child(fileName);
        const uploadTask = storageRef.put(file);
        await new Promise((resolve, reject) => {
            uploadTask.on('state_changed',
                (snapshot) => {
                    const pct = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                    showProgress(pct, `上傳中... ${Math.round(pct)}%`);
                },
                (err) => {
                    hideProgress();
                    showStorageUploadError(err);
                    reject(err);
                },
                () => resolve()
            );
        });
        const downloadURL = await storageRef.getDownloadURL();
        hideProgress();
        return downloadURL;
    } catch (error) {
        hideProgress();
        showStorageUploadError(error);
        throw error;
    }
}

// 新增所有比價記錄
async function addAllPriceRecords() {
    const productName = document.getElementById('productName').value.trim();
    
    if (!productName) {
        alert('請填寫商品名稱');
        return;
    }
    
    // 檢查商品名稱是否為連結
    if (isUrlForProductName(productName)) {
        alert('請輸入正確的商品名稱');
        document.getElementById('productName').focus();
        return;
    }

    // 上傳圖片（如果有），檔名使用中文商品名稱
    let productImageUrl = null;
    if (currentProductImageFile) {
        try {
            productImageUrl = await uploadProductImage(currentProductImageFile, productName);
        } catch (error) {
            return;
        }
    }

    const storeGroups = document.querySelectorAll('.store-group');
    const newRecords = [];
    const invalidGroups = []; // 記錄有商家連結但總金額或數量未填的店家組
    
    // 處理所有店家組
    storeGroups.forEach((group, index) => {
        const storeUrl = group.querySelector('.store-url-input').value.trim();
        const totalPriceInput = group.querySelector('.store-total-input');
        const totalPrice = roundToTwoDecimals(parseFloat(totalPriceInput?.value || 0));
        const quantityInput = group.querySelector('.store-quantity-input');
        const quantity = parseInt(quantityInput?.value || 0);
        const { productPrice, shippingCost, couponAmount } = calculateProductPrice(group);

        // 如果商家連結為空，完全忽略（不新增，不提示）
        if (!storeUrl || storeUrl.length === 0) {
            return; // 視為未新增，忽略此店家組
        }
        
        // 如果商家連結有填寫，但總金額或數量未填，記錄錯誤並阻止提交
        const hasValidPrice = !isNaN(totalPrice) && totalPrice > 0;
        const hasValidQuantity = !isNaN(quantity) && quantity >= 1;
        
        if (!hasValidPrice || !hasValidQuantity) {
            // 記錄未填寫的項目
            const missingFields = [];
            if (!hasValidPrice) missingFields.push('總金額');
            if (!hasValidQuantity) missingFields.push('數量');
            invalidGroups.push({
                index: index + 1,
                missingFields: missingFields.join('、')
            });
            return; // 不新增此記錄
        }

        const { productUnitPrice } = calculatePrice(totalPrice, quantity, shippingCost);
        const formData = { storeUrl, productPrice, quantity, shippingCost, couponAmount, finalPrice: totalPrice, unitPrice: productUnitPrice };
        newRecords.push(createPriceRecord(productName, formData, null, productImageUrl || null));
    });

    // 如果有商家連結但總金額或數量未填，阻止提交並提示
    if (invalidGroups.length > 0) {
        const invalidDetails = invalidGroups.map(g => `第 ${g.index} 個店家（缺少：${g.missingFields}）`).join('\n');
        alert(`無法送出比價！\n\n以下店家已填寫連結，但資料不完整：\n${invalidDetails}\n\n請補齊所有必填項目後再提交。`);
        return; // 阻止提交
    }

    // 如果沒有可新增的記錄
    if (newRecords.length === 0) {
        alert('無新數據可新增。請至少填寫一個完整的店家資訊（總金額、數量需在已填寫商家連結的情況下填寫）。');
        return;
    }

    // 新增模式，添加所有記錄
    newRecords.forEach(record => {
        priceData.push(record);
    });

    saveData();
    renderComparisonList();
    
    // 重置表單
    document.getElementById('priceForm').reset();
    document.getElementById('storesList').innerHTML = '';
    document.getElementById('storesContainer').classList.remove('active');
    storeGroupCounter = 0;
    resetImageUpload();
}

        };

        window.imageViewPasteHandler = (e) => {
            const modal = document.getElementById('imageViewModal');
            if (!modal || !modal.classList.contains('active')) return;
            const activeElement = document.activeElement;
            if (activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA' || activeElement.isContentEditable) && activeElement.type !== 'file') return;
            const file = getImageFileFromClipboard(e);
            if (!file) return;
            e.preventDefault();
            handleImageViewFile(file);
        };
        
        document.addEventListener('paste', window.imageViewPasteHandler);
    }
}
