// 依單價排序並計算最優單價/總價的 record id 集合
const groupByProduct = (data) => {
    const g = {};
    data.forEach((r) => {
        const n = r.productName || '未分類商品';
        if (!g[n]) g[n] = [];
        g[n].push(r);
    });
    return g;
};
const getRecordsWithBestFlags = (records) => {
    const withUnit = records.map(r => ({
        ...r,
        calculatedUnitPrice: r.unitPrice !== undefined ? r.unitPrice : (r.productPrice / (r.quantity || 1))
    })).sort((a, b) => a.calculatedUnitPrice - b.calculatedUnitPrice);
    const minUnit = withUnit[0]?.calculatedUnitPrice;
    const bestUnitIds = new Set(withUnit.filter(r => r.calculatedUnitPrice === minUnit).map(r => r.id));
    const byTotal = [...records].sort((a, b) => a.finalPrice - b.finalPrice);
    const minTotal = byTotal[0]?.finalPrice;
    const bestTotalIds = new Set(byTotal.filter(r => r.finalPrice === minTotal).map(r => r.id));
    return { recordsByUnitPrice: withUnit, bestUnitPriceRecordIds: bestUnitIds, bestTotalPriceRecordIds: bestTotalIds };
};

// 渲染比價列表
function renderComparisonList() {
    const comparisonList = document.getElementById('comparisonList');
    const emptyState = document.getElementById('emptyState');
    const searchInput = document.getElementById('searchInput');
    const searchKeyword = searchInput ? searchInput.value.trim().toLowerCase() : '';

    if (priceData.length === 0) {
        comparisonList.classList.add('hidden');
        emptyState.style.display = 'block';
        return;
    }

    emptyState.style.display = 'none';
    comparisonList.classList.remove('hidden');

    const groupedData = groupByProduct(priceData);
    let filteredProductNames = Object.keys(groupedData);
    if (searchKeyword) {
        filteredProductNames = filteredProductNames.filter((name) => name.toLowerCase().includes(searchKeyword));
    }
    if (filteredProductNames.length === 0) {
        comparisonList.classList.add('hidden');
        const safeKw = String(searchKeyword).replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        emptyState.innerHTML = `
            <p>🔍 未找到符合「${safeKw}」的商品</p>
            <p class="hint">請嘗試其他關鍵字</p>
        `;
        emptyState.style.display = 'block';
        return;
    }

    // 生成HTML
    comparisonList.innerHTML = filteredProductNames.map(productName => {
        const allRecords = [...groupedData[productName]];
        const { recordsByUnitPrice: records, bestUnitPriceRecordIds, bestTotalPriceRecordIds } = getRecordsWithBestFlags(allRecords);
        const productImageUrl = allRecords.find(r => r.productImageUrl)?.productImageUrl || null;
        const hasImage = productImageUrl !== null;
        const safeImageUrl = hasImage ? escapeForHtmlAttr(escapeForJs(productImageUrl)) : '';
        const safeProductName = escapeForHtmlAttr(escapeForJs(productName));
        
        const imageClickHandler = hasImage ? `onclick="viewProductImage('${safeImageUrl}', '${safeProductName}')"` : `onclick="addProductImage('${safeProductName}')"`;
        const nameClass = hasImage ? 'product-group-name has-image' : 'product-group-name no-image';
        const titleAttr = hasImage ? `title="點擊查看圖片"` : `title="點擊新增圖片"`;
        
        return `
            <div class="product-group">
                <div class="product-group-header">
                    <div class="product-name-wrapper">
                        <h3 class="${nameClass}" ${imageClickHandler} ${titleAttr}>${productName}</h3>
                        ${hasImage ? `
                        <div class="hover-thumbnail">
                            <img src="${safeImageUrl}" alt="${safeProductName}">
                        </div>
                        ` : ''}
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-circle btn-add-store-to-product" onclick="openAddStoreModal('${safeProductName}')">+</button>
                        <button class="btn btn-circle btn-remove-product" onclick="removeProductGroup('${safeProductName}')">-</button>
                    </div>
                </div>
                <div class="product-stores-list">
                    ${records.map((record, index) => {
                        const recordId = record.id;
                        const couponAmount = record.couponAmount !== undefined ? record.couponAmount : 0;
                        const isBestUnitPrice = bestUnitPriceRecordIds.has(recordId);
                        const isBestTotalPrice = bestTotalPriceRecordIds.has(recordId);
                        const badges = [];
                        if (isBestUnitPrice) badges.push('<span class="best-unit-price-badge">單價最優惠</span>');
                        if (isBestTotalPrice) badges.push('<span class="best-total-price-badge">總價最優惠</span>');
                        // 檢測是否為1688或淘寶，並顯示對應圖示
                        const platformIcon = getStorePlatformIcon(record.storeUrl);
                        const storeDisplayName = platformIcon || `店家${String.fromCharCode(65 + index)}`; // 如果是1688或淘寶顯示平台圖示，否則顯示店家A/B/C
                        return `
                            <div class="store-item ${isBestUnitPrice || isBestTotalPrice ? 'best-price' : ''}">
                                <div class="store-item-header" onclick="toggleStoreDetails(${recordId})">
                                    <div class="store-item-name">
                                        <a href="${record.storeUrl}" target="_blank" class="store-link" onclick="event.stopPropagation();" title="${extractDomainFromUrl(record.storeUrl)}">${storeDisplayName}</a>
                                        ${badges.join('')}
                                    </div>
                                    <div class="store-item-price">
                                        ${formatPriceDisplay(record.finalPrice)}
                                    </div>
                                    <span class="store-item-arrow" id="arrow-${recordId}">▶</span>
                                </div>
                                <div class="store-item-details" id="details-${recordId}">
                                    <div class="detail-item">
                                        <span class="detail-label">商品價格</span>
                                        <span class="detail-value">${record.productPrice.toLocaleString('zh-TW', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">數量</span>
                                        <span class="detail-value">${record.quantity || 1}</span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">運費</span>
                                        <span class="detail-value">
                                            ${record.shippingCost > 0 
                                                ? record.shippingCost.toLocaleString('zh-TW', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
                                                : '<span class="text-success">免運</span>'
                                            }
                                        </span>
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">優惠金額</span>
                                        <span class="detail-value">
                                            ${couponAmount > 0 
                                                ? `<span class="text-success">-${couponAmount.toLocaleString('zh-TW', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>`
                                                : '無'
                                            }
                                        </span>
                                    </div>
                                    ${record.quantity && record.quantity > 0 ? `
                                    <div class="detail-item">
                                        <span class="detail-label">單價</span>
                                        <span class="detail-value text-primary">
                                            ${formatPriceDisplay(record.unitPrice !== undefined ? record.unitPrice : (record.productPrice / (record.quantity || 1)))}
                                        </span>
                                    </div>
                                    ` : ''}
                                    <div class="store-item-actions">
                                        <button class="btn btn-edit btn-small" onclick="event.stopPropagation(); editRecord(${recordId})">編輯</button>
                                        <button class="btn btn-delete btn-small" onclick="event.stopPropagation(); deleteRecord(${recordId})">刪除</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            </div>
        `;
    }).join('');
}

// 新增店家彈出視窗相關函數
let currentModalProductName = '';

function openAddStoreModal(productName) {
    currentModalProductName = productName;
    const modal = document.getElementById('addStoreModal');
    const modalTitle = document.getElementById('modalProductName');
    const form = document.getElementById('addStoreModalForm');
    const detailsContainer = document.getElementById('modalStoreDetails');
    const urlValidation = document.getElementById('modalUrlValidation');
    const calculatedPrice = document.getElementById('modalCalculatedPrice');
    const calculatedTotal = document.getElementById('modalCalculatedTotal');
    
    modalTitle.textContent = `新增【${productName}】比價商家`;
    modal.classList.add('active');
    
    // 重置表單
    form.reset();
    detailsContainer.classList.add('hidden');
    urlValidation.style.display = 'none';
    calculatedPrice.textContent = '-';
    calculatedTotal.textContent = '-';
    
    initModalForm();
}

function closeAddStoreModal() {
    document.getElementById('addStoreModal')?.classList.remove('active');
    currentModalProductName = '';
}

function initModalForm() {
    bindStoreModalForm({
        formId: 'addStoreModalForm',
        urlId: 'modalStoreUrl', totalId: 'modalTotalPrice', quantityId: 'modalQuantity',
        shippingId: 'modalShipping', couponId: 'modalCoupon',
        urlValidationId: 'modalUrlValidation', detailsContainerId: 'modalStoreDetails',
        calculatedTotalId: 'modalCalculatedTotal', calculatedPriceId: 'modalCalculatedPrice'
    });
}

// 為所有輸入框添加 Delete 鍵清空功能
function setupInputDeleteBehavior(element = document) {
    // 選擇所有輸入框（text, number, url, textarea）
    const inputs = element.querySelectorAll ? element.querySelectorAll('input[type="text"], input[type="number"], input[type="url"], textarea') : [];
    
    inputs.forEach(input => {
        // 檢查是否已經添加過事件監聽器（避免重複添加）
        if (input.dataset.deleteHandlerAdded) return;
        input.dataset.deleteHandlerAdded = 'true';
        
        input.addEventListener('keydown', (e) => {
            // 當按下 Delete 鍵時（不是 Backspace）
            if (e.key === 'Delete' || e.keyCode === 46) {
                // 阻止默認行為
                e.preventDefault();
                // 清空輸入框
                input.value = '';
                // 觸發 input 事件以觸發相關驗證或計算
                input.dispatchEvent(new Event('input', { bubbles: true }));
                // 觸發 change 事件
                input.dispatchEvent(new Event('change', { bubbles: true }));
            }
        });
    });
}

function initPageEvents() {
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', () => renderComparisonList());
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                searchInput.value = '';
                renderComparisonList();
                searchInput.blur();
            }
        });
    }
    const addStoreForm = document.getElementById('addStoreModalForm');
    if (addStoreForm) {
        addStoreForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = getFormPriceData('modalStoreUrl', 'modalTotalPrice', 'modalQuantity', 'modalShipping', 'modalCoupon');
            const validation = validatePriceFormData(formData);
            if (!validation.valid) { alert(validation.message); return; }
            priceData.push(createPriceRecord(currentModalProductName, formData, null, findProductImageUrl(currentModalProductName)));
            saveData();
            renderComparisonList();
            closeAddStoreModal();
        });
    }
    const editForm = document.getElementById('editRecordModalForm');
    if (editForm) {
        editForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!currentEditRecordId) return;
            const idx = priceData.findIndex((r) => r.id === currentEditRecordId);
            if (idx === -1) return;
            const { productName } = priceData[idx];
            const original = priceData[idx];
            const formData = getFormPriceData('editStoreUrl', 'editTotalPrice', 'editQuantity', 'editShipping', 'editCoupon');
            const validation = validatePriceFormData(formData);
            if (!validation.valid) { alert(validation.message); return; }
            priceData[idx] = createPriceRecord(productName, formData, currentEditRecordId, findProductImageUrl(productName, original));
            saveData();
            renderComparisonList();
            closeEditRecordModal();
        });
    }
    setupModalOutsideClick('addStoreModal', closeAddStoreModal);
    setupModalOutsideClick('editRecordModal', closeEditRecordModal);
    setupModalOutsideClick('imageViewModal', closeImageViewModal);
    setupModalOutsideClick('deleteImageConfirmModal', closeDeleteImageConfirmModal);
    const confirmDelBtn = document.getElementById('confirmDeleteImageBtn');
    if (confirmDelBtn) confirmDelBtn.addEventListener('click', confirmDeleteImage);
}

// 規則：未連接後端資料庫則不載入，避免無效數據
function requireBackendAndRun(fn) {
    const overlay = document.getElementById('noBackendOverlay');
    if (!db) {
        alert('⚠️ 無法連接 Firebase\n\n請確認：\n1. 網域已加入 Firebase 授權\n2. Repo Secrets 已設定 FIREBASE_API_KEY_PRICETOOLS');
        if (overlay) overlay.classList.remove('hidden');
        return;
    }
    if (overlay) overlay.classList.add('hidden');
    fn();
}

document.addEventListener('DOMContentLoaded', async () => {
    requireBackendAndRun(async () => {
        if (isFileProtocol && !db) alert('⚠️ 無法連接 Firebase\n\n請用本機伺服器或正式網址開啟，並確認網域已加入 Firebase 授權。');
        try {
            initForm();
            await loadData();
        } catch (err) {
            console.error('競價工具初始化失敗:', err);
        }
        setupInputDeleteBehavior();
        initPageEvents();
    });
});
