<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>商品銷售總表</title>
    <style>
        :root{--primary-color:#00ffcc;--danger-color:#ff3366;--background-gradient:linear-gradient(135deg,#0f0c29,#302b63,#24243e);--input-bg:rgba(0,255,204,.1);--input-focus-bg:rgba(0,255,204,.15);--input-focus-shadow:0 0 8px rgba(0,255,204,.2);--btn-hover-bg:rgba(0,255,204,.2);--btn-hover-shadow:0 0 10px rgba(0,255,204,.3);--glow-box:0 0 20px rgba(0,255,204,.3);--thead-bg:rgb(15,12,41);--modal-bg:rgba(15,12,41,.98);--border-subtle:rgba(0,255,204,.3);--placeholder-color:rgba(0,255,204,.5);--glow-cyan:rgba(0,255,204,.3);--danger-bg:rgba(255,51,102,.1);--danger-hover:rgba(255,51,102,.2);--view-row-bg:rgba(0,255,204,.15);--view-cell-bg:rgba(0,255,204,.25)}
        body{margin:0;padding:20px;background:var(--background-gradient);color:var(--primary-color);font-family:'Arial',sans-serif}
        .container{max-width:1800px;margin:0 auto;background:rgba(255,255,255,.1);border-radius:12px;padding:12px;backdrop-filter:blur(10px);box-shadow:var(--glow-box)}
        .title-container{position:relative;text-align:center;margin-bottom:12px}
        h1{font-size:2rem;font-weight:bold;text-shadow:0 0 10px rgba(0,255,204,.7),0 0 20px rgba(0,255,204,.5),0 0 30px rgba(0,255,204,.3);cursor:pointer;display:inline-block;padding:.6rem 1.2rem;color:var(--primary-color);transition:all .3s ease;position:relative;letter-spacing:2px;text-transform:uppercase}
        h1:hover{text-shadow:0 0 15px rgba(0,255,204,.9),0 0 25px rgba(0,255,204,.7),0 0 35px rgba(0,255,204,.5);transform:scale(1.05)}
        h1::before,h1::after{content:'';position:absolute;width:0;height:3px;background:var(--primary-color);transition:width .3s ease}
        h1::before{top:0;left:0}
        h1::after{bottom:0;right:0}
        h1:hover::before,h1:hover::after{width:100%}
        .table-container{margin-top:12px;width:100%;max-height:calc(100vh - 180px);min-height:60vh;overflow-y:auto;position:relative}
        table{width:100%;min-width:900px;border-collapse:separate;border-spacing:0;table-layout:fixed;margin-bottom:0;background:rgba(0,0,0,.5);border-radius:8px}

        thead, thead tr, th { background: var(--thead-bg) !important; position: sticky; top: 0; z-index: 10; backdrop-filter: none; opacity: 1; }
        th { color: var(--primary-color); font-weight: bold; font-size: 0.8em; text-align: center; padding: 8px 4px; border: 1px solid var(--border-subtle); box-shadow: 0 2px 4px rgba(0,0,0,.2); }
        td { padding: 4px; text-align: center; border: 1px solid var(--border-subtle); color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.85em; }
        tr { height: 34px; transition: background-color 0.2s ease; }
        .pagination { display: flex; justify-content: center; gap: 6px; margin-top: 12px; padding: 6px 0; }
        .pagination button { min-width: 32px; height: 28px; }
        .pagination button.active { background: rgba(0,255,204,0.3); box-shadow: 0 0 10px rgba(0,255,204,0.5); }
        .table-container::-webkit-scrollbar { width: 5px; height: 5px; }
        .table-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 3px; }
        .table-container::-webkit-scrollbar-thumb { background: var(--glow-cyan); border-radius: 3px; transition: background 0.3s ease; }
        .table-container::-webkit-scrollbar-thumb:hover { background: rgba(0,255,204,0.4); }
        .action-buttons { margin-bottom: 10px; display: flex; gap: 8px; justify-content: space-between; align-items: center; padding: 0 4px; }
        .action-buttons .left-buttons { display: flex; gap: 10px; align-items: center; }

        .right-settings, .action-buttons .right-settings { display: flex; align-items: center; flex-wrap: nowrap; gap: 6px; }
        .setting-item { display: flex; align-items: center; gap: 8px; margin-bottom: 0; width: auto; min-width: 45px; }
        .setting-item input { padding: 6px 4px; background: var(--input-bg); border: 1px solid var(--primary-color); border-radius: 4px; color: #fff; width: auto; min-width: 45px; text-align: center; height: 32px; box-sizing: border-box; font-size: 0.9em; transition: all 0.3s ease; }
        .setting-item input:focus { background: var(--input-focus-bg); box-shadow: var(--input-focus-shadow); }
        .setting-item input::placeholder { color: var(--placeholder-color); font-size: 0.85em; width: auto; min-width: 30px; }
        .action-buttons .right-settings .setting-item { gap: 4px; min-width: 42px !important; }
        .action-buttons .right-settings .setting-item input { padding: 4px !important; min-width: 42px !important; max-width: 55px !important; height: 26px; font-size: 0.85em; }
        .action-buttons .right-settings input[type="number"] { min-width: 45px !important; max-width: 60px !important; }
        button { padding: 4px 8px; background: var(--input-bg); border: 1px solid var(--primary-color); color: var(--primary-color); border-radius: 4px; cursor: pointer; transition: all 0.3s ease; font-size: 0.85em; min-width: 75px; height: 28px; display: flex; align-items: center; justify-content: center; text-align: center; }
        button:hover { background: var(--btn-hover-bg); box-shadow: var(--btn-hover-shadow); }
        .search-box { margin-bottom: 12px; display: flex; gap: 8px; padding: 0 4px; }
        .search-box input { flex: 1; padding: 3px 10px; height: 24px; background: var(--input-bg); border: 1px solid var(--primary-color); border-radius: 4px; color: var(--primary-color); font-weight: bold; font-size: 0.8em; transition: all 0.3s ease; }
        .search-box input:focus { background: var(--input-focus-bg); box-shadow: var(--input-focus-shadow); }
        .search-box input::placeholder { color: var(--placeholder-color); font-size: 0.8em; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: var(--modal-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--primary-color); box-shadow: var(--glow-box); min-width: 280px; max-width: 320px; max-height: 90vh; display: flex; flex-direction: column; position: relative; }
        .modal-header { display: block; margin-bottom: 12px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 6px; position: relative; }
        .modal-header h2 { color: var(--primary-color); margin: 0; font-size: 1em; text-align: center; width: 100%; }
        .modal-content-info { border: 1px solid var(--primary-color); }
        .modal-content-info .modal-body { color: var(--primary-color); text-align: center; font-size: 1.1em; }
        .modal-footer .btn-info { border: 1px solid var(--primary-color); color: var(--primary-color); background: var(--input-bg); }
        .import-progress-wrap { display: flex; flex-direction: column; gap: 10px; align-items: stretch; }
        .import-progress-status { color: #fff; font-size: 0.9em; }
        .import-progress-track { width: 100%; height: 10px; border-radius: 999px; background: rgba(255,255,255,0.15); overflow: hidden; border: 1px solid var(--border-subtle); }
        .import-progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, rgba(0,255,204,0.55), rgba(0,255,204,0.95)); transition: width 0.2s ease; }
        .import-progress-text { color: var(--primary-color); font-size: 0.95em; font-weight: bold; }
        .modal-title-danger { color: var(--danger-color); text-align: center; margin: 0; }
        .modal-body { color: #fff; margin-bottom: 12px; text-align: center; flex: 1 1 auto; padding: 8px 0; }
        .modal-footer { display: flex; justify-content: center; gap: 8px; margin-top: 4px; }
        .modal-footer button { padding: 6px 12px; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; font-size: 0.9em; min-width: 70px; border: 1px solid var(--primary-color); color: var(--primary-color); background: var(--input-bg); }
        .modal-footer button:hover { background: var(--btn-hover-bg); box-shadow: var(--btn-hover-shadow); }
        .modal-footer button.cancel { background: var(--danger-bg); border-color: var(--danger-color); color: var(--danger-color); }
        .modal-footer button.cancel:hover { background: var(--danger-hover); }
        th:nth-child(1), td:nth-child(1) { width: 30%; text-align: center; min-width: 120px; }
        th:nth-child(n+2):nth-child(-n+15), td:nth-child(n+2):nth-child(-n+15) { width: 6.36%; text-align: center; }
        td.商品名稱-cell .商品名稱-cell-inner { display: flex; align-items: center; justify-content: center; gap: 4px; width: 100%; min-width: 0; }
        .product-商品名稱 { font-size: 0.9em; flex: 0 1 auto; max-width: 85%; min-width: 0; text-align: center; cursor: pointer; transition: all 0.3s ease; color: var(--primary-color) !important; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 4px; }
        .商品名稱-cell .商品名稱-action-btn { display: none; }
        .商品名稱-cell.show-actions .商品名稱-action-btn { display: inline-flex; }
        tr.viewing { background-color: var(--view-row-bg) !important; }
        tr.viewing td { border: none !important; }
        .editable-cell { cursor: pointer; position: relative; }
        .editable-cell:hover { background: var(--input-bg); }
        tr.viewing .editable-cell.viewing { background-color: var(--view-cell-bg) !important; }
        .cell-edit-input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 8px; background: var(--modal-bg); border: 1px solid var(--primary-color); color: #fff; font-size: 0.9em; box-sizing: border-box; z-index: 1000; text-align: center; }
        .cell-edit-input:focus { outline: none; box-shadow: var(--input-focus-shadow); }
        .cell-edit-input[type="number"]::-webkit-inner-spin-button, .cell-edit-input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; appearance: none; margin: 0; }
        .cell-edit-input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
        .batch-dropdown { position: relative; display: inline-block; width: auto; min-width: 70px; }
        .exchange-rate-btn, .batch-operation-btn { background: var(--input-bg); border: 1px solid var(--primary-color); color: var(--primary-color); padding: 2px 6px; border-radius: 4px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 4px; width: 100%; height: 26px; font-size: 0.85em; text-align: center; white-space: nowrap; box-sizing: border-box; }
        .exchange-rate-btn:hover, .batch-operation-btn:hover { background: var(--input-focus-bg); box-shadow: var(--input-focus-shadow); transform: translateY(-1px); }
        .batch-dropdown-content { display: none; position: absolute; top: 100%; left: 0; background: var(--modal-bg); min-width: 120px; box-shadow: var(--glow-box); border: 1px solid var(--border-subtle); border-radius: 5px; z-index: 1000; margin-top: 4px; }
        .batch-dropdown-content.show { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .danger-button { color: var(--danger-color) !important; }
        .danger-button:hover { background: var(--danger-bg) !important; }
        .batch-dropdown-content button { width: 100%; text-align: left; padding: 4px 10px; border: none; background: none; color: var(--primary-color); cursor: pointer; transition: all 0.3s ease; font-size: 0.8em; min-width: unset; height: auto; justify-content: flex-start; }
        .batch-dropdown-content button:hover { background: var(--input-bg); }
        .batch-dropdown-content button:not(:last-child) { border-bottom: 1px solid var(--border-subtle); }
        #fileInput { display: none; }
        .sortable { cursor: pointer; position: relative; }
        .sortable:hover { background: var(--input-focus-bg); }

        .商品名稱-action-btn { padding: 0; font-size: 1em; min-width: 22px; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; border-radius: 4px; border: 1px solid transparent; background: transparent; cursor: pointer; flex-shrink: 0; }
        .商品名稱-action-edit { color: var(--primary-color); }
        .商品名稱-action-edit:hover { background: var(--btn-hover-bg); }
        .商品名稱-action-delete { color: var(--danger-color); }
        .商品名稱-action-delete:hover { background: var(--danger-bg); }

        .simplified-view .full-view { display: none; }
        .simplified-view .right-settings .setting-item input { max-width: 60px; }
        .simplified-view .table-container { max-width: 100%; overflow-x: auto; }
        .simplified-view th, .simplified-view td { white-space: nowrap; }
        /* 強制使用電腦版版面：已移除 max-width:768px 的 media query */
    </style>
    <!-- Firebase 金鑰來自 API_KEY/config.js（空白版已提交，避免遠端 404） -->
    <script src="API_KEY/config.js"></script>

</head>
<body>
    <div class="container">
        <div id="noFirebaseBanner" class="no-firebase-banner" style="display:none;"></div>
        <div class="title-container">
            <h1 onclick="returnToIndex()">商品銷售總表</h1>
        </div>
        
        <div class="action-buttons">
            <div class="left-buttons">
                <button onclick="toggleViewMode()" id="viewModeToggle">完整模式</button>
            </div>
            <div class="right-settings full-view">
                <div class="setting-item"><input type="number" id="globalExchangeRate" step="0.001" min="0" value="" placeholder="採購匯率" title="全域設定：控制所有計算頁面的採購匯率"></div>
                <div class="setting-item"><input type="number" id="globalInternationalShipping" step="0.001" min="0" value="" placeholder="國際運費" title="全域設定：控制所有計算頁面的國際運費"></div>
                <div class="setting-item"><input type="number" id="globalPlatformCommission" step="0.001" min="0" value="" placeholder="平台抽成" title="全域設定：控制所有計算頁面的平台抽成"></div>
                <div class="setting-item">
                    <button type="button" class="exchange-rate-btn" onclick="window.open('https://rate.bot.com.tw/xrt', '台銀匯率', 'width=600,height=500,scrollbars=yes,resizable=yes')" title="開啟台銀匯率查詢">
                        台銀匯率
                    </button>
                </div>
                <div class="batch-dropdown">
                    <button type="button" class="batch-operation-btn" id="batchOperationBtn">
                        資料處理
                    </button>
                    <div class="batch-dropdown-content" id="batchDropdown">
                        <button type="button" onclick="exportBlankTemplate()">空白範本</button>
                        <button type="button" onclick="exportToExcel()">資料匯出</button>
                        <button type="button" onclick="openFileInput()">資料匯入</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜尋" oninput="searchTable()">
        </div>

        <div class="table-container">
            <table id="productTable">
                <thead>
                    <tr>
                        <th>商品名稱</th>
                        <th>採購價格</th>
                        <th>採購數量</th>
                        <th class="full-view">內地運費</th>
                        <th class="full-view">單重</th>
                        <th class="full-view">總重</th>
                        <th class="full-view">計材</th>
                        <th>單價成本</th>
                        <th>採購總成本</th>
                        <th>建議定價</th>
                        <th>實際定價</th>
                        <th>定價損益</th>
                        <th>定價總損益</th>
                        <th>定價毛利率</th>
                        <th>定價報酬率</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="pagination" id="pagination"></div>
    </div>

    <div class="modal" id="errorModal">
        <div class="modal-content">
            <div class="modal-header">
            </div>
            <div class="modal-body" id="errorModalBody"></div>
            <div class="modal-footer">
                <button class="confirm" onclick="closeModal('errorModal')">確定</button>
            </div>
        </div>
    </div>
    <div class="modal" id="infoModal">
        <div class="modal-content modal-content-info">
            <div class="modal-header"></div>
            <div class="modal-body" id="infoModalBody">資料匯入完成</div>
            <div class="modal-footer">
                <button class="confirm btn-info" onclick="closeModal('infoModal')">知道了</button>
            </div>
        </div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="importFromExcel(event)">

    <script>
        // Firebase 配置（金鑰來自 API_KEY/config.js，勿寫入此檔）
        const firebaseConfig = {
            apiKey: (window.__FIREBASE_API_KEY__ || "").trim() || undefined,
            authDomain: "computer-168.firebaseapp.com",
            projectId: "computer-168",
            storageBucket: "computer-168.firebasestorage.app",
            messagingSenderId: "1008079543770",
            appId: "1:1008079543770:web:c45802292e9684357ab4e3",
            measurementId: "G-Z0SYWETVV9"
        };
        function _isApiKeySet(k) {
            return typeof k === 'string' && k.trim().length >= 20 && /^AIza/i.test(k.trim());
        }
        if (!_isApiKeySet(firebaseConfig.apiKey)) {
            console.warn('商品銷售總表：請在 API_KEY/config.js 設定 __FIREBASE_API_KEY__ 以使用雲端功能。');
        }
        const FIRESTORE_DATABASE_ID = 'calculator';
        const SERVER_TIMESTAMP_MARKER = { __serverTimestampMarker: true };
        function serverTimestamp() { return SERVER_TIMESTAMP_MARKER; }
        function createFirestoreDbAdapter(cfg, databaseId) {
            const appModuleUrl = 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
            const firestoreModuleUrl = 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
            let firestoreCtxPromise = null;
            const isPlainObject = (val) => !!val && typeof val === 'object' && !Array.isArray(val);
            const transformWriteData = (value, ctx) => {
                if (value === SERVER_TIMESTAMP_MARKER) return ctx.serverTimestamp();
                if (Array.isArray(value)) return value.map(v => transformWriteData(v, ctx));
                if (isPlainObject(value)) {
                    const out = {};
                    Object.keys(value).forEach((k) => { out[k] = transformWriteData(value[k], ctx); });
                    return out;
                }
                return value;
            };
            const wrapDocSnapshot = (snap) => ({ id: snap.id, exists: snap.exists(), data: () => snap.data() });
            const wrapQuerySnapshot = (snap) => {
                const docs = snap.docs.map(wrapDocSnapshot);
                return { size: snap.size, docs, forEach: (cb) => docs.forEach(cb) };
            };
            const ensureFirestoreCtx = async () => {
                if (firestoreCtxPromise) return firestoreCtxPromise;
                firestoreCtxPromise = (async () => {
                    const appMod = await import(appModuleUrl);
                    const fsMod = await import(firestoreModuleUrl);
                    const app = appMod.getApps().length ? appMod.getApp() : appMod.initializeApp(cfg);
                    const fs = fsMod.getFirestore(app, databaseId);
                    return { ...fsMod, fs };
                })().catch((e) => {
                    firestoreCtxPromise = null;
                    throw e;
                });
                return firestoreCtxPromise;
            };
            const getModularDocRef = (ctx, collectionName, docId) => ctx.doc(ctx.fs, collectionName, docId);
            const createDocRef = (collectionName, docId) => ({
                __collectionName: collectionName,
                __docId: docId,
                async get() {
                    const ctx = await ensureFirestoreCtx();
                    const snap = await ctx.getDoc(getModularDocRef(ctx, collectionName, docId));
                    return wrapDocSnapshot(snap);
                },
                async set(data) {
                    const ctx = await ensureFirestoreCtx();
                    await ctx.setDoc(getModularDocRef(ctx, collectionName, docId), transformWriteData(data, ctx));
                },
                async update(data) {
                    const ctx = await ensureFirestoreCtx();
                    await ctx.updateDoc(getModularDocRef(ctx, collectionName, docId), transformWriteData(data, ctx));
                },
                async delete() {
                    const ctx = await ensureFirestoreCtx();
                    await ctx.deleteDoc(getModularDocRef(ctx, collectionName, docId));
                }
            });
            const createCollectionRef = (collectionName, constraints = []) => ({
                doc: (docId) => createDocRef(collectionName, docId),
                orderBy(field, direction) { return createCollectionRef(collectionName, [...constraints, { type: 'orderBy', field, direction: direction || 'asc' }]); },
                limit(count) { return createCollectionRef(collectionName, [...constraints, { type: 'limit', count }]); },
                async get() {
                    const ctx = await ensureFirestoreCtx();
                    const colRef = ctx.collection(ctx.fs, collectionName);
                    const modularConstraints = constraints.map((c) => c.type === 'orderBy' ? ctx.orderBy(c.field, c.direction) : ctx.limit(c.count));
                    const qRef = modularConstraints.length ? ctx.query(colRef, ...modularConstraints) : colRef;
                    const snap = await ctx.getDocs(qRef);
                    return wrapQuerySnapshot(snap);
                }
            });
            return {
                collection: (collectionName) => createCollectionRef(collectionName),
                batch: () => {
                    const operations = [];
                    return {
                        update(docRef, data) { operations.push({ type: 'update', docRef, data }); },
                        async commit() {
                            const ctx = await ensureFirestoreCtx();
                            const batch = ctx.writeBatch(ctx.fs);
                            operations.forEach((op) => {
                                const modularDocRef = getModularDocRef(ctx, op.docRef.__collectionName, op.docRef.__docId);
                                if (op.type === 'update') batch.update(modularDocRef, transformWriteData(op.data, ctx));
                            });
                            await batch.commit();
                        }
                    };
                }
            };
        }
        let db = null;
        if (_isApiKeySet(firebaseConfig.apiKey)) {
            try {
                db = createFirestoreDbAdapter(firebaseConfig, FIRESTORE_DATABASE_ID);
            } catch (e) {
                console.warn(`商品銷售總表：連線資料庫 ${FIRESTORE_DATABASE_ID} 失敗。`, e);
                db = null;
            }
        }
        const settingsDocRef = (docId) => db.collection('設定').doc(docId);
        const productDocRef = (docId) => db.collection('總表').doc(docId);
        let products = [];
        const itemsPerPage = 100;
        let currentPage = 1;
        const $ = (id) => document.getElementById(id);
        const $$ = (sel) => document.querySelector(sel);
        let isImportingInProgress = false;

        const SETTING_DOC_IDS = { 採購匯率: '採購匯率', 國際運費: '國際運費', 平台抽成: '平台抽成' };
        let settings = {
            採購匯率: undefined,
            國際運費: undefined,
            平台抽成: undefined
        };

        const formatNumber = (value, isInteger = false, defaultEmpty = '') => {
            if (value === '' || value === undefined || value === null) return defaultEmpty;
            const num = parseFloat(value);
            if (isNaN(num)) return defaultEmpty;
            if (isInteger) return Math.round(num).toString();
            if (num % 1 === 0) return num.toString();
            return num.toFixed(2).replace(/\.?0+$/, '');
        };
        const formatDecimal = (value) => formatNumber(value, false, '0');
        const formatWeight = (value) => {
            const num = parseFloat(value);
            if (isNaN(num) || num === 0) return '0';
            const formatted = num.toFixed(2);
            return formatted.endsWith('.00') ? Math.round(num).toString() : formatted.replace(/0+$/, '').replace(/\.$/, '');
        };
        const parseNum = (v, d = 0) => parseFloat(v) || d;
        const parseIntVal = (v, d = 0) => parseInt(v) || d;
        function handleError(err, msg) { alert(msg); }
        function normalizeProductFromExternal(p) {
            return {
                ...p,
                採購價格: parseNum(p.採購價格),
                採購數量: parseIntVal(p.採購數量),
                單重: parseNum(p.單重),
                總重: parseNum(p.總重),
                計材: parseIntVal(p.計材),
                內地運費: parseNum(p.內地運費),
                國際運費: parseNum(p.國際運費),
                採購匯率: parseNum(p.採購匯率, settings.採購匯率),
                平台抽成: parseNum(p.平台抽成, settings.平台抽成),
                單價成本: parseNum(p.單價成本),
                採購總成本: parseNum(p.採購總成本),
                建議定價: parseNum(p.建議定價),
                實際定價: parseNum(p.實際定價),
                定價損益: parseNum(p.定價損益)
            };
        }
        const DECIMAL_FIELDS = ['採購價格', '單重', '總重', '內地運費', '國際運費', '採購匯率', '平台抽成', '單價成本', '採購總成本', '建議定價', '實際定價', '定價損益'];
        const INTEGER_FIELDS = ['採購數量', '計材'];
        function calcRates(定價損益, revenue, 單價成本) {
            return {
                定價毛利率: (revenue > 0 ? (定價損益 / revenue) * 100 : 0).toFixed(2),
                定價報酬率: (單價成本 > 0 ? (定價損益 / 單價成本) * 100 : 0).toFixed(2)
            };
        }
        function getSafePlatformRate(commissionPercent) {
            const rate = 1 - (parseNum(commissionPercent) / 100);
            return rate > 0 ? rate : 0;
        }

        let isFullView = false;
        let currentSort = { column: null, direction: 'asc' };

        function updateTableHeaders() {

        function sortComparator(a, b, field, direction) {
            const isName = field === '商品名稱';
            const vA = isName ? a[field] : (parseFloat(a[field]) || 0);
            const vB = isName ? b[field] : (parseFloat(b[field]) || 0);
            return isName ? (direction === 'asc' ? vA.localeCompare(vB) : vB.localeCompare(vA)) : (direction === 'asc' ? vA - vB : vB - vA);
        }
        function sortTable(field) {
            currentSort.direction = (currentSort.column === field && currentSort.direction === 'asc') ? 'desc' : 'asc';
            currentSort.column = field;
            document.querySelectorAll('.sortable').forEach(th => { th.classList.remove('asc', 'desc'); if (th.dataset.field === field) th.classList.add(currentSort.direction); });
            initCachedElements();
            const searchText = cachedElements.searchInput ? cachedElements.searchInput.value.trim() : '';
            if (searchText) searchTable();
            else { products.sort((a, b) => sortComparator(a, b, field, currentSort.direction)); initTable(); }
        }

        let dataCache = {
            settings: null,
            products: null,
            lastFetch: 0
        };
        
        const CACHE_DURATION = 5 * 60 * 1000;
        function setNoFirebaseBannerVisible(visible) {
            const banner = $('noFirebaseBanner');
            if (banner) banner.style.display = visible ? 'block' : 'none';
        }
        function syncViewModeUiState() {
            initCachedElements();
            if (cachedElements.viewModeToggle && cachedElements.tableContainer) {
                cachedElements.viewModeToggle.textContent = isFullView ? '簡易模式' : '完整模式';
                cachedElements.tableContainer.classList.toggle('simplified-view', !isFullView);

        function isDataCacheValid(now) {
            return !!(dataCache.settings && dataCache.products && (now - dataCache.lastFetch) < CACHE_DURATION);
        }
        function applyCachedData() {
            settings = dataCache.settings;
            products = dataCache.products;
            applySettingsToUI(settings);
            initTable();
        }
        async function fetchSettingsAndProductsSnapshot() {
            const settingRefs = Object.keys(SETTING_DOC_IDS).map(key => settingsDocRef(SETTING_DOC_IDS[key]).get());
            const [exchangeRateDoc, internationalShippingDoc, platformCommissionDoc, productsSnapshot] = await Promise.all([
                ...settingRefs,
                db.collection('總表').orderBy('時間戳記', 'desc').limit(1000).get()
            ]);
            return {
                settingDocs: [exchangeRateDoc, internationalShippingDoc, platformCommissionDoc],
                productsSnapshot
            };
        }
        async function resolveSettingsFromDocs(settingDocs) {
            const allExist = settingDocs.every(d => d.exists);
            if (allExist) {
                settings.採購匯率 = settingDocs[0].data()?.value;
                settings.國際運費 = settingDocs[1].data()?.value;
                settings.平台抽成 = settingDocs[2].data()?.value;
                dataCache.settings = settings;
                applySettingsToUI(settings);
                try { await settingsDocRef('global').delete(); } catch (e) { /* 若已不存在或權限不足則忽略 */ }
                return;
            }
            const globalDoc = await settingsDocRef('global').get();
            if (globalDoc.exists) {
                const legacy = globalDoc.data();
                settings.採購匯率 = legacy.採購匯率;
                settings.國際運費 = legacy.國際運費;
                settings.平台抽成 = legacy.平台抽成;
                dataCache.settings = settings;
                applySettingsToUI(settings);
                await writeSettingsToDocs(settings);
                await settingsDocRef('global').delete();
            }
        }
        async function applyPendingUpdatedProductFromLocalStorage() {
            const updatedData = localStorage.getItem('updatedProductData');
            if (!updatedData) return;
            try {
                const updatedProduct = JSON.parse(updatedData);
                const index = products.findIndex(p => p.id === updatedProduct.id);
                if (index !== -1) {
                    products[index] = { ...products[index], ...updatedProduct };
                    await productDocRef(updatedProduct.id).update(updatedProduct);
                }
                localStorage.removeItem('updatedProductData');
            } catch (error) {}
        }
        function applySettingsToUI(s) {
            const el = (id) => $(id);
            if (s.採購匯率 !== undefined && el('globalExchangeRate')) el('globalExchangeRate').value = s.採購匯率;
            if (s.國際運費 !== undefined && el('globalInternationalShipping')) el('globalInternationalShipping').value = s.國際運費;
            if (s.平台抽成 !== undefined && el('globalPlatformCommission')) el('globalPlatformCommission').value = s.平台抽成;
        }

        async function loadData(forceRefresh = false) {
            try {
                setNoFirebaseBannerVisible(false);
                if (!db) {
                    alert('⚠️ 無法連接 Firebase\n\n請確認：\n1. 網域已加入 Firebase 授權\n2. Repo Secrets 已設定 FIREBASE_API_KEY');
                    initCachedElements();
                    applySettingsToUI(settings);
                    initTable();
                    return;
                }
                const now = Date.now();
                syncViewModeUiState();
                if (!forceRefresh && isDataCacheValid(now)) {
                    applyCachedData();
                    return;
                }
                const { settingDocs, productsSnapshot } = await fetchSettingsAndProductsSnapshot();
                await resolveSettingsFromDocs(settingDocs);

                products = productsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                products.forEach(p => recalculateProduct(p));
                dataCache.products = products;
                dataCache.lastFetch = now;
                await applyPendingUpdatedProductFromLocalStorage();
                
                initTable();
            } catch (e) { handleError(e, "載入數據時發生錯誤"); }
        }

        async function writeSettingsToDocs(newSettings) {
            const Timestamp = serverTimestamp();
            const keys = ['採購匯率', '國際運費', '平台抽成'];
            for (const key of keys) {
                const docId = SETTING_DOC_IDS[key];
                const ref = settingsDocRef(docId);
                const newVal = newSettings[key];
                await ref.set({ value: newVal ?? null, updatedAt: Timestamp });
            }
        }

        async function updateSettings() {
            try {
                const read = id => { const el = $(id); return !el ? undefined : (el.value === '' ? undefined : parseFloat(el.value)); };
                const newV = { 採購匯率: read('globalExchangeRate'), 國際運費: read('globalInternationalShipping'), 平台抽成: read('globalPlatformCommission') };
                if (settings.採購匯率 === newV.採購匯率 && settings.國際運費 === newV.國際運費 && settings.平台抽成 === newV.平台抽成) return;
                settings = { ...settings, ...newV };
                await writeSettingsToDocs(settings);
                if (window.opener && !window.opener.closed) window.opener.postMessage({ type: 'updateSettings', settings }, '*');
                products.forEach(p => recalculateProduct(p));
                refreshTableWithSearchState();
            } catch (e) { handleError(e, "更新設定時發生錯誤"); }
        }

        async function recalculateAllProducts() {
            try {
                const batch = db.batch();
                
                for (const product of products) {
                    let updatedData = {};
                    
                    if (product.幣別 === 'CNY') {
                        const totalProductCost = parseNum(product.採購價格) * parseNum(product.採購數量);
                        const costAfterExchange = (totalProductCost + parseNum(product.內地運費)) * settings.採購匯率;
                        const intlShip = parseNum(product.國際運費) || settings.國際運費 || 0;
                        const mat = parseIntVal(product.計材);
                        const internationalShippingTotal = (parseNum(product.總重) * intlShip) + (mat > 6 ? (mat - 6) * 25 : 0);
                        const 採購總成本 = costAfterExchange + internationalShippingTotal;
                        const 單價成本 = 採購總成本 / parseNum(product.採購數量);

                        const platformRate = getSafePlatformRate(settings.平台抽成);
                        const 建議定價 = platformRate > 0 ? (單價成本 / platformRate) : 0;
                        const 實際定價 = parseNum(product.實際定價);
                        const priceForCalc = 實際定價 > 0 ? 實際定價 : 建議定價;
                        const 定價損益 = (priceForCalc * platformRate) - 單價成本;
                        const revenue = priceForCalc * platformRate;
                        const rates = calcRates(定價損益, revenue, 單價成本);
                        updatedData = {
                            採購匯率: settings.採購匯率,
                            平台抽成: settings.平台抽成,
                            國際運費: intlShip,
                            單價成本: 單價成本.toFixed(2),
                            採購總成本: 採購總成本.toFixed(2),
                            建議定價: 建議定價.toFixed(2),
                            定價損益: Math.round(定價損益).toString(),
                            定價毛利率: rates.定價毛利率,
                            定價報酬率: rates.定價報酬率
                        };
                    } else {
                        const 單價成本 = parseNum(product.單價成本);
                        const platformRate = getSafePlatformRate(settings.平台抽成);
                        const 建議定價 = platformRate > 0 ? (單價成本 / platformRate) : 0;
                        const 實際定價 = parseNum(product.實際定價);
                        const priceForCalc = 實際定價 > 0 ? 實際定價 : 建議定價;
                        const 定價損益 = (priceForCalc * platformRate) - 單價成本;
                        const revenue = priceForCalc * platformRate;
                        const rates = calcRates(定價損益, revenue, 單價成本);
                        updatedData = {
                            平台抽成: settings.平台抽成,
                            建議定價: 建議定價.toFixed(2),
                            定價損益: Math.round(定價損益).toString(),
                            定價毛利率: rates.定價毛利率,
                            定價報酬率: rates.定價報酬率
                        };
                    }

                    Object.assign(product, updatedData);
                    batch.update(productDocRef(product.id), updatedData);
                }

                await batch.commit();
                refreshTableWithSearchState();
            } catch (e) { handleError(e, "重新計算商品數據時發生錯誤"); }
        }
        const MESSAGE_TYPES = {
            UPDATE_SETTINGS: 'updateSettings',
            NEW_PRODUCT: 'newProduct',
            UPDATE_PRODUCT: 'updateProduct',
            CALCULATION_COMPLETE: 'calculationComplete',
            UPDATE_PRODUCT_NAME: 'updateProductName',
            UPDATE_PRODUCT_ID: 'updateProductId',
            ADD_NEW_PRODUCT: 'addNewProduct'
        };
        async function handleUpdateSettingsMessage(eventData) {
            const newSettings = eventData.settings;
            if (!newSettings) return;
            settings = newSettings;
            applySettingsToUI(newSettings);
            await writeSettingsToDocs(newSettings);
            await recalculateAllProducts();
        }
        async function handleNewProductMessage(eventData) {
            if (!eventData.product.商品名稱 || !eventData.product.商品名稱.trim()) eventData.product.商品名稱 = `未命名商品_${Date.now()}`;
            const originalName = eventData.product.商品名稱;
            let safeId = createSafeId(originalName);
            if (products.find(p => p.id === safeId)) {
                eventData.product.商品名稱 = `${originalName}_${Date.now()}`;
                safeId = createSafeId(eventData.product.商品名稱);
            }
            const productWithId = { id: safeId, ...eventData.product, 時間戳記: serverTimestamp() };
            await productDocRef(safeId).set(productWithId);
            products.unshift({ id: safeId, ...eventData.product });
            currentPage = 1;
            refreshTableWithSearchState();
        }
        async function handleUpdateProductMessage(eventData) {
            const index = eventData.index;
            if (index < 0 || index >= products.length) return;
            const product = products[index];
            await productDocRef(product.id).update(eventData.product);
            products[index] = { ...product, ...eventData.product };
            refreshTableWithSearchState();
        }
        async function handleCalculationCompleteMessage(eventData) {
            const index = eventData.index;
            if (index < 0 || index >= products.length) return;
            const product = products[index];
            const formattedProduct = normalizeProductFromExternal(eventData.product);
            Object.assign(product, formattedProduct);
            recalculateProduct(product);
            await productDocRef(product.id).update(formattedProduct);
            refreshTableWithSearchState();
        }
        function handleUpdateProductNameMessage(eventData) {
            const product = products.find(p => p.id === eventData.productId);
            if (!product) return;
            product.商品名稱 = eventData.newName;
            refreshTableWithSearchState();
        }
        function handleUpdateProductIdMessage(eventData) {
            const oldId = eventData.oldId;
            const newId = eventData.newId;
            const updatedProduct = eventData.product;
            const productIndex = products.findIndex(p => p.id === oldId);
            if (productIndex === -1) return;
            const merged = { ...products[productIndex], ...updatedProduct, id: newId };
            // 改名搬移後視為最新資料，前端立即反映到第一列
            products.splice(productIndex, 1);
            products.unshift(merged);
            currentSort = { column: null, direction: 'asc' };
            refreshTableWithSearchState();
        }
        function handleAddNewProductMessage(eventData) {
            products.unshift(eventData.product);
            currentPage = 1;
            refreshTableWithSearchState();
        }
        const MESSAGE_HANDLERS = {
            [MESSAGE_TYPES.UPDATE_SETTINGS]: handleUpdateSettingsMessage,
            [MESSAGE_TYPES.NEW_PRODUCT]: handleNewProductMessage,
            [MESSAGE_TYPES.UPDATE_PRODUCT]: handleUpdateProductMessage,
            [MESSAGE_TYPES.CALCULATION_COMPLETE]: handleCalculationCompleteMessage,
            [MESSAGE_TYPES.UPDATE_PRODUCT_NAME]: handleUpdateProductNameMessage,
            [MESSAGE_TYPES.UPDATE_PRODUCT_ID]: handleUpdateProductIdMessage,
            [MESSAGE_TYPES.ADD_NEW_PRODUCT]: handleAddNewProductMessage
        };
        window.addEventListener('message', async function(event) {
            try {
                const handler = MESSAGE_HANDLERS[event?.data?.type];
                if (!handler) return;
                await handler(event.data);
            } catch (e) { handleError(e, "處理消息時發生錯誤"); }
        });

        function debounce(func, wait) {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), wait);
            };
        }

        window.addEventListener('load', async function() {
            try {
                await loadData();
                const params = new URLSearchParams(window.location.search);
                if (params.has('returnData')) {
                    const returnData = JSON.parse(decodeURIComponent(params.get('returnData')));
                    if (returnData && returnData.index >= 0) {
                        const product = products[returnData.index];
                        if (product && product.id) {
                            const updatedProduct = normalizeProductFromExternal(returnData.product);
                            await productDocRef(product.id).update(updatedProduct);
                            products[returnData.index] = { ...product, ...updatedProduct };
                            recalculateProduct(products[returnData.index]);
                            refreshTableWithSearchState();
                        }
                    }
                }
            } catch (e) { handleError(e, "處理返回數據時發生錯誤"); }
        });
        function recalculateProduct(product) {
            try {
                if (!product) {
                    return;
                }

                const 採購數量 = parseNum(product.採購數量);
                const 單重 = parseNum(product.單重);
                const 總重 = parseNum(product.總重);
                const 採購價格 = parseNum(product.採購價格);
                const 內地運費 = parseNum(product.內地運費);
                const 計材 = parseIntVal(product.計材);
                const 採購匯率 = settings.採購匯率 || 0;
                const 平台抽成 = settings.平台抽成 || 0;
                const 國際運費 = settings.國際運費 || 0;
                const 實際定價 = parseFloat(product.實際定價) || 0;

                if (採購匯率 === 0 && product.幣別 === 'CNY') {
                    return product;
                }

                if (採購數量 > 0 && 單重 > 0) {
                    product.總重 = (單重 * 採購數量).toFixed(6);
                } else {
                    product.總重 = '0';
                }

                let 單價成本 = 0;
                let 採購總成本 = 0;

                if (product.幣別 === 'CNY') {
                    const totalProductCost = 採購價格 * 採購數量;
                    const costAfterExchange = (totalProductCost + 內地運費) * 採購匯率;
                    const internationalShippingTotal = (parseFloat(product.總重) * 國際運費) + (計材 > 6 ? (計材 - 6) * 25 : 0);
                    採購總成本 = costAfterExchange + internationalShippingTotal;
                    單價成本 = 採購數量 > 0 ? 採購總成本 / 採購數量 : 0;
                    product.單價成本 = 單價成本.toFixed(2);
                    product.採購總成本 = 採購總成本.toFixed(2);
                } else {
                    單價成本 = parseNum(product.單價成本);
                    採購總成本 = parseNum(product.採購總成本);
                }

                // 計算建議定價和損益
                const platformRate = getSafePlatformRate(平台抽成);
                const 建議定價 = platformRate > 0 ? (單價成本 / platformRate) : 0;
                product.建議定價 = 建議定價.toFixed(2);

                // 如果實際定價為 0 或未輸入，使用建議定價進行計算
                const priceForCalculation = 實際定價 > 0 ? 實際定價 : 建議定價;

                // 計算定價損益
                const 定價損益 = (priceForCalculation * platformRate) - 單價成本;
                product.定價損益 = Math.round(定價損益).toString(); // 定價損益四捨五入到整數

                const 定價總損益 = 定價損益 * parseIntVal(product.採購數量);
                product.定價總損益 = Math.round(定價總損益).toString();

                const revenue = priceForCalculation * platformRate;
                const rates = calcRates(定價損益, revenue, 單價成本);
                product.定價毛利率 = rates.定價毛利率;
                product.定價報酬率 = rates.定價報酬率;

                return product;
            } catch (e) { handleError(e, "重新計算商品數據時發生錯誤"); return product; }
        }

        function createSafeId(productName) {
            if (!productName || !productName.trim()) return `product_${Date.now()}`;
            return productName.trim();
        }

        let tableScrollSnapTimer = null;

        function getAverageRowHeight() {
            initCachedElements();
            const tbody = cachedElements.tbody;
            if (!tbody) return 0;
            const rows = tbody.querySelectorAll('tr');
            if (!rows.length) return 0;

            const sampleCount = Math.min(rows.length, 5);
            let totalHeight = 0;
            let validCount = 0;
            for (let i = 0; i < sampleCount; i++) {
                const row = rows[i];
                const cells = row.querySelectorAll('td');
                if (cells.length > 0) {
                    let rowCellTotal = 0;
                    let rowCellCount = 0;
                    cells.forEach((cell) => {
                        const h = cell.getBoundingClientRect().height;
                        if (h > 0) {
                            rowCellTotal += h;
                            rowCellCount++;
                        }
                    });
                    if (rowCellCount > 0) {
                        totalHeight += rowCellTotal / rowCellCount;
                        validCount++;
                        continue;
                    }
                }
                const rowHeight = row.getBoundingClientRect().height;
                if (rowHeight > 0) {
                    totalHeight += rowHeight;
                    validCount++;
                }
            }
            return validCount > 0 ? totalHeight / validCount : 0;
        }

        function snapTableScrollToRow() {
            initCachedElements();
            const tableContainer = cachedElements.tableContainer;
            if (!tableContainer || tableScrollSnapLock) return;

            const active = document.activeElement;
            if (active && active.classList && active.classList.contains('cell-edit-input')) return;

            const rowHeight = getAverageRowHeight();
            if (!rowHeight || rowHeight < 1) return;

            const maxScrollTop = tableContainer.scrollHeight - tableContainer.clientHeight;
            if (maxScrollTop <= 0) return;

            const currentTop = tableContainer.scrollTop;
            const snappedTop = Math.max(0, Math.min(maxScrollTop, Math.round(currentTop / rowHeight) * rowHeight));
            if (Math.abs(snappedTop - currentTop) < 1) return;

            tableScrollSnapLock = true;
            tableContainer.scrollTo({ top: snappedTop, behavior: 'smooth' });
            setTimeout(() => { tableScrollSnapLock = false; }, 160);
        }

        function scheduleTableScrollSnap() {
            if (tableScrollSnapTimer) clearTimeout(tableScrollSnapTimer);
            tableScrollSnapTimer = setTimeout(snapTableScrollToRow, 90);
        }

        function updatePaginationBar(totalItems, onPageChange) {
            initCachedElements();
            if (!cachedElements.pagination) return;
            const total = totalItems !== undefined ? totalItems : products.length;
            const totalPages = Math.ceil(total / itemsPerPage);
            const refresh = onPageChange || initTable;
            cachedElements.pagination.innerHTML = '';
            if (currentPage > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.textContent = '<';
                prevBtn.onclick = () => {
                    currentPage--;
                    refresh();
                    scrollTableContainerToTop();
                };
                cachedElements.pagination.appendChild(prevBtn);
            }
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                if (i === currentPage) btn.classList.add('active');
                btn.onclick = () => {
                    currentPage = i;
                    refresh();
                    scrollTableContainerToTop();
                };
                cachedElements.pagination.appendChild(btn);
            }
            if (currentPage < totalPages) {
                const nextBtn = document.createElement('button');
                nextBtn.textContent = '>';
                nextBtn.onclick = () => {
                    currentPage++;
                    refresh();
                    scrollTableContainerToTop();
                };
                cachedElements.pagination.appendChild(nextBtn);

        let searchCache = new Map();
        function refreshTableWithSearchState() {
            initCachedElements();

        const searchTable = debounce(function() {
            initCachedElements();
            const searchText = cachedElements.searchInput ? cachedElements.searchInput.value.toLowerCase().trim() : '';
            
            if (!searchText) { currentPage = 1; initTable(); return; }
            if (searchCache.has(searchText)) {
                const cachedResult = searchCache.get(searchText);
                renderFilteredTable(cachedResult.filteredProducts, cachedResult.keywords);
                return;
            }

            const keywords = searchText.split(/\s+/).filter(k => k.length > 0);
            const filteredProducts = products.filter(product => {
                const searchableFields = [
                    product.商品名稱,
                    product.採購價格?.toString(),
                    product.採購數量?.toString(),
                    product.內地運費?.toString(),
                    product.單重?.toString(),
                    product.總重?.toString(),
                    product.計材?.toString(),
                    product.單價成本?.toString(),
                    product.採購總成本?.toString(),
                    product.建議定價?.toString(),
                    product.實際定價?.toString(),
                    product.定價損益?.toString(),
                    product.定價總損益?.toString(),
                    product.定價毛利率?.toString()
                ].filter(f => f !== undefined && f !== null);
                const searchableText = searchableFields.join(' ').toLowerCase();
                return keywords.every(kw => searchableText.includes(kw));
            });
            const result = { filteredProducts, keywords };
            searchCache.set(searchText, result);
            if (searchCache.size > 50) searchCache.delete(searchCache.keys().next().value);
            currentPage = 1;
            renderFilteredTable(filteredProducts, keywords);
        }, 150);

            const paginatedProducts = filteredProducts.slice(start, start + itemsPerPage);
            const fragment = document.createDocumentFragment();
            paginatedProducts.forEach((product, index) => {

                fragment.appendChild(row);

        async function handleActualPriceFieldBlur({ cell, originalContent, field, product, index, currentValue, newValue }) {
            if (newValue === '') {
                restoreCellContent(cell, originalContent);
                return;
            }
            if (newValue !== currentValue) {
                try {
                    product.最後修改欄位 = field;
                    product[field] = newValue;
                    recalculateProduct(product);
                    await persistProductAndRefresh(product);
                    notifyOpenerMessage({ type: 'updateProduct', index: products.indexOf(product), product });
                } catch (e) {
                    handleError(e, "更新商品數據時發生錯誤");
                    restoreCellContent(cell, originalContent);
                }
            } else {
                refreshTable();
            }
        }
        async function handleGeneralFieldBlur({ cell, originalContent, field, product, index, currentValue, newValue }) {
            if (newValue === '') {
                restoreCellContent(cell, originalContent);
                return;
            }
            if (newValue !== currentValue) {
                try {
                    product.最後修改欄位 = field;
                    product[field] = INTEGER_FIELDS.includes(field) ? parseIntVal(newValue) : parseNum(newValue);
                    recalculateProduct(product);
                    await persistProductAndRefresh(product);
                    notifyOpenerMessage({ type: 'updateField', index, field, value: newValue });
                } catch (e) {
                    handleError(e, "更新數據時發生錯誤");
                    restoreCellContent(cell, originalContent);

            } else {
                restoreCellContent(cell, originalContent);

        function attachCellEditInput(cell, field, index, product, currentValue) {
            const input = createCellEditInput(field);
            const originalContent = cell.innerHTML;
            cell.innerHTML = '';
            cell.appendChild(input);
            input.focus();
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Delete') { e.preventDefault(); this.value = ''; this.focus(); return; }
                if (!/[\d.]/.test(e.key) && !e.key.startsWith('Arrow') && e.key !== 'Enter' && e.key !== 'Tab' && e.key !== 'Backspace') e.preventDefault();
                if (e.key === '.' && this.value.includes('.')) e.preventDefault();
                if (e.key === 'Enter') { e.preventDefault(); this.blur(); }
            });
            input.addEventListener('input', function() {
                if (INTEGER_FIELDS.includes(field)) this.value = this.value.replace(/\D/g, '');
                else sanitizeDecimalInput(this, 2);
            });
            input.addEventListener('blur', async function() {
                const newValue = this.value.trim();
                if (field === '實際定價') {
                    await handleActualPriceFieldBlur({ cell, originalContent, field, product, index, currentValue, newValue });
                    return;
                }
                await handleGeneralFieldBlur({ cell, originalContent, field, product, index, currentValue, newValue });
            });
        }

                    cell.classList.add('viewing');

            delegatedEventsInitialized = true;

        function sanitizeDecimalInput(el, maxDecimals = 3) {
            const cursorPos = el.selectionStart != null ? el.selectionStart : el.value.length;
            const oldValue = el.value;
            let newValue = oldValue.replace(/[^\d.]/g, '');
            let removed = 0;
            for (let i = 0; i < Math.min(cursorPos, oldValue.length); i++) if (!/[\d.]/.test(oldValue[i])) removed++;
            let newCursorPos = Math.max(0, cursorPos - removed);
            const parts = newValue.split('.');
            if (parts.length > 2) {
                newValue = parts[0] + '.' + parts.slice(1).join('');
                const firstDot = newValue.indexOf('.');
                if (newCursorPos > firstDot) newCursorPos = Math.min(newCursorPos, newValue.length);
            }
            if (parts.length === 2 && parts[1].length > maxDecimals) {
                const num = parseFloat(newValue);
                newValue = isNaN(num) ? newValue : num.toFixed(maxDecimals);
                newCursorPos = Math.min(newCursorPos, newValue.length);
            }
            if (oldValue !== newValue) el.value = newValue;
            requestAnimationFrame(() => {
                try {
                    const pos = Math.max(0, Math.min(newCursorPos, el.value.length));
                    if (el.setSelectionRange) el.setSelectionRange(pos, pos);
                } catch (e) {}
            });
        }

        function attachDecimalSettingInput(input) {
            if (!input) return;
            let originalValue = input.value;
            input.addEventListener('click', function() { originalValue = this.value; this.value = ''; });
            input.addEventListener('keydown', async function(e) {
                if (e.ctrlKey || e.metaKey) return;
                if (e.key === 'Delete') { e.preventDefault(); this.value = ''; this.focus(); return; }
                if (!/[\d.]/.test(e.key) && !e.key.startsWith('Arrow') && e.key !== 'Tab' && e.key !== 'Escape' && e.key !== 'Backspace') e.preventDefault();
                if (e.key === '.' && this.value.includes('.')) e.preventDefault();
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (this.value === '') this.value = originalValue;
                    else await updateSettings();
                    this.blur();
                }
            });
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedText = (e.clipboardData || window.clipboardData).getData('text');
                if (/[\u4e00-\u9fff]/.test(pastedText)) return;
                let cleaned = pastedText.replace(/[^\d.]/g, '');
                const p = cleaned.split('.');
                if (p.length > 2) cleaned = p[0] + '.' + p.slice(1).join('');
                if (p.length === 2 && p[1].length > 3) cleaned = parseFloat(cleaned).toFixed(3);
                this.value = cleaned;
                this.dispatchEvent(new Event('input', { bubbles: true }));
            });
            input.addEventListener('blur', async function() {
                if (this.value === '') this.value = originalValue;
                else {
                    const p = this.value.split('.');
                    if (p.length === 2 && p[1].length > 3) { const n = parseFloat(this.value); if (!isNaN(n)) this.value = n.toFixed(3); }
                    await updateSettings();
                    originalValue = this.value;
                }
            });
            input.addEventListener('input', debounce(function() { sanitizeDecimalInput(this, 3); }, 100));
        }

        function initBatchDropdown() {
            const batchBtn = $('batchOperationBtn');
            const dropdown = $('batchDropdown');
            if (!batchBtn || !dropdown) return;
            batchBtn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); dropdown.classList.toggle('show'); });
            document.addEventListener('click', function(e) { if (!e.target.closest('.batch-dropdown')) dropdown.classList.remove('show'); });
            dropdown.addEventListener('click', function(e) { e.stopPropagation(); });
        }
        function initGlobalSettingInputs() {
            [$('globalExchangeRate'), $('globalInternationalShipping'), $('globalPlatformCommission')]
                .filter(Boolean)
                .forEach(attachDecimalSettingInput);
        }
        function initHeaderSortBinding() {
            const productTable = $('productTable');
            if (productTable) {
                productTable.addEventListener('click', function(e) {
                    const th = e.target.closest('.sortable');
                    if (th) sortTable(th.dataset.field);
                });
            }
        }
        function initSearchClearShortcut() {
            const searchInput = cachedElements.searchInput;
            if (searchInput) {
                searchInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Delete') {
                        e.preventDefault();
                        this.value = '';
                        searchTable();
                    }
                });
            }
        }
        function initOutsideClickCloseNameActions() {
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.商品名稱-cell')) clearNameActionStates();
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            initGlobalSettingInputs();
            initBatchDropdown();
            initOutsideClickCloseNameActions();
            initHeaderSortBinding();
            updateTableHeaders();
            initCachedElements();
            initSearchClearShortcut();
        });

        function productToExportRow(product) {
            const inl = parseFloat(product.內地運費) || 0;
            const mat = parseIntVal(product.計材);
            const act = parseFloat(product.實際定價) || 0;
            return {
                '商品名稱': product.商品名稱 || '',
                '採購價格': formatDecimal(product.採購價格),
                '採購數量': formatNumber(product.採購數量, true),
                '內地運費': inl === 0 ? '無' : formatDecimal(product.內地運費),
                '單重': formatWeight(product.單重),
                '總重': formatWeight(product.總重),
                '計材': mat <= 6 ? '無' : mat.toString(),
                '單價成本': formatNumber(product.單價成本),
                '採購總成本': formatNumber(product.採購總成本),
                '建議定價': formatNumber(product.建議定價),
                '實際定價': formatNumber(act),
                '定價損益': formatNumber(product.定價損益),
                '定價總損益': formatNumber(product.定價總損益 || 0),
                '定價毛利率': (parseFloat(product.定價毛利率) || 0).toFixed(2) + '%',
                '定價報酬率': (parseFloat(product.定價報酬率) || 0).toFixed(2) + '%'
            };
        }
        const IMPORT_HEADER_ALIASES = {
            商品名稱: ['商品名稱', '品名', '商品'],
            採購價格: ['採購價格', '採購單價', '採購價'],
            採購數量: ['採購數量', '數量'],
            內地運費: ['內地運費', '內地物流', '內陸運費'],
            單重: ['單重', '單件重量'],
            總重: ['總重', '總重量'],
            計材: ['計材', '材積'],
            實際定價: ['實際定價', '售價', '實售價格']
        };
        const IMPORT_REQUIRED_FIELDS = ['商品名稱', '採購價格', '採購數量'];
        function normalizeImportHeaderText(val) {
            return String(val === undefined || val === null ? '' : val)
                .replace(/\uFEFF/g, '')
                .replace(/\s+/g, '')
                .trim();
        }
        function resolveImportHeaderIndexes(headers) {
            const normalizedHeaders = headers.map(normalizeImportHeaderText);
            const indexes = {};
            Object.keys(IMPORT_HEADER_ALIASES).forEach((field) => {
                const normalizedAliases = IMPORT_HEADER_ALIASES[field].map(normalizeImportHeaderText);
                indexes[field] = normalizedHeaders.findIndex((header) => normalizedAliases.includes(header));
            });
            const missingRequiredHeaders = IMPORT_REQUIRED_FIELDS.filter((field) => indexes[field] === -1);
            return { indexes, missingRequiredHeaders };
        }
        function parseImportNumericCell(val, isInt = false) {
            if (val === undefined || val === null || val === '' || val === '無') return 0;
            const cleaned = String(val).trim().replace(/,/g, '').replace(/，/g, '');
            if (cleaned === '' || cleaned === '無') return 0;
            const num = isInt ? parseInt(cleaned, 10) : parseFloat(cleaned);
            return Number.isFinite(num) ? num : 0;
        }
        function yieldToUi() {
            return new Promise(resolve => setTimeout(resolve, 0));
        }

        async function exportToExcel() {
            try {
                const exportData = products.map(productToExportRow);
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet(exportData);
                ws['!cols'] = [{ wch: 20 }, { wch: 12 }, { wch: 10 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 8 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }];
                XLSX.utils.book_append_sheet(wb, ws, "商品資料");
                XLSX.writeFile(wb, `商品資料_${new Date().toISOString().split('T')[0]}.xlsx`);
            } catch (e) { handleError(e, "匯出 Excel 時發生錯誤"); }
        }
        async function importFromExcel(event) {
            try {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                updateImportProgress(2, '正在讀取檔案...');
                reader.onprogress = function(progressEvent) {
                    if (!progressEvent.lengthComputable) return;
                    const readProgress = Math.round((progressEvent.loaded / progressEvent.total) * 10);
                    updateImportProgress(Math.max(2, readProgress), '正在讀取檔案...');
                };
                reader.onload = async function(e) {
                    try {
                        updateImportProgress(12, '正在解析 Excel...');
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: '', blankrows: true });
                        if (!jsonData.length || jsonData.length < 2) {
                            throw new Error("Excel 文件中沒有數據");
                        }

                        updateImportProgress(15, '正在驗證資料...');
                        const headers = jsonData[0];
                        const { indexes, missingRequiredHeaders } = resolveImportHeaderIndexes(headers);
                        if (missingRequiredHeaders.length > 0) {
                            throw new Error(`缺少必要欄位：${missingRequiredHeaders.join('、')}`);
                        }
                        const errors = [];
                        const validRows = [];
                        const validateTotal = Math.max(jsonData.length - 1, 1);
                        for (let i = 1; i < jsonData.length; i++) {
                            const row = jsonData[i];
                            const rowNumber = i + 1;
                            const isEmptyRow = !row || row.every(cell => !cell || cell === '');
                            if (isEmptyRow) continue;
                            const readCell = (idx) => (idx >= 0 ? row[idx] : '');
                            const productData = {
                                商品名稱: readCell(indexes.商品名稱) || '',
                                採購價格: parseImportNumericCell(readCell(indexes.採購價格)),
                                採購數量: parseImportNumericCell(readCell(indexes.採購數量), true),
                                單重: parseImportNumericCell(readCell(indexes.單重)),
                                總重: parseImportNumericCell(readCell(indexes.總重)),
                                計材: parseImportNumericCell(readCell(indexes.計材), true),
                                內地運費: parseImportNumericCell(readCell(indexes.內地運費)),
                                實際定價: parseImportNumericCell(readCell(indexes.實際定價)),
                                國際運費: settings.國際運費 || 0,
                                採購匯率: settings.採購匯率 || 0,
                                平台抽成: settings.平台抽成 || 0,
                                時間戳記: serverTimestamp()
                            };
                            const rowErrors = [];
                            if (!String(productData.商品名稱).trim()) rowErrors.push('商品名稱空白');
                            if (productData.採購數量 <= 0) rowErrors.push('採購數量需大於 0');
                            if (productData.採購價格 <= 0) rowErrors.push('採購價格需大於 0');
                            if (productData.採購數量 > 0) {
                                if (productData.單重 < 0) rowErrors.push('單重不可小於 0');
                                if (productData.總重 < 0) rowErrors.push('總重不可小於 0');
                            }
                            if (productData.內地運費 < 0) rowErrors.push('內地運費不可小於 0');
                            if (productData.計材 < 0) rowErrors.push('計材不可小於 0');
                            if (productData.實際定價 < 0) rowErrors.push('實際定價不可小於 0');
                            if (rowErrors.length > 0) {
                                errors.push(`第 ${rowNumber} 列資料有誤：${rowErrors.join('、')}`);
                            } else {
                                validRows.push(productData);
                            }
                            if ((i % 25 === 0) || i === jsonData.length - 1) {
                                const percent = 15 + Math.round((i / validateTotal) * 30);
                                updateImportProgress(Math.min(percent, 45), `正在驗證資料...（${Math.min(i, validateTotal)}/${validateTotal}）`);
                                await yieldToUi();
                            }
                        }

                        if (errors.length > 0) {
                            isImportingInProgress = false;
                            closeInfoModal();
                            showErrorModal(errors.join('<br><br>'));
                            event.target.value = '';
                            return;
                        }
                        updateImportProgress(45, '正在寫入資料...');
                        const saveTotal = validRows.length;
                        for (let idx = 0; idx < validRows.length; idx++) {
                            const productData = validRows[idx];
                            productData.採購匯率 = settings.採購匯率;
                            productData.平台抽成 = settings.平台抽成;
                            productData.國際運費 = settings.國際運費;
                            productData.幣別 = 'CNY';
                            if (productData.採購數量 > 0) {
                                if (productData.總重 > 0)
                                    productData.單重 = (productData.總重 / productData.採購數量).toFixed(6);
                                else if (productData.單重 > 0)
                                    productData.總重 = (productData.單重 * productData.採購數量).toFixed(6);
                            }
                            recalculateProduct(productData);
                            if (!productData.商品名稱 || !productData.商品名稱.trim()) productData.商品名稱 = `未命名商品_${Date.now()}`;
                            let originalName = productData.商品名稱;
                            let safeId = createSafeId(originalName);
                            if (products.some(p => p.id === safeId)) {
                                productData.商品名稱 = `${originalName}_${Date.now()}`;
                                safeId = createSafeId(productData.商品名稱);
                            }
                            productData.id = safeId;
                            await productDocRef(safeId).set(productData);
                            products.unshift(productData);
                            const saved = idx + 1;
                            const percent = saveTotal > 0 ? 45 + Math.round((saved / saveTotal) * 55) : 100;
                            updateImportProgress(Math.min(percent, 100), `正在寫入資料...（${saved}/${saveTotal}）`);
                            if (saved % 10 === 0 || saved === saveTotal) {
                                await yieldToUi();
                            }
                        }
                        initTable();
                        event.target.value = '';
                        updateImportProgress(100, '資料匯入完成');
                        await new Promise(resolve => setTimeout(resolve, 250));
                        isImportingInProgress = false;
                        showInfoModal(`資料匯入完成，共 ${validRows.length} 筆`);
                    } catch (error) {
                        isImportingInProgress = false;
                        closeInfoModal();
                        showErrorModal(`<p>檔案匯入：發生錯誤</p><p>${error.message}</p>`);
                        event.target.value = '';
                    }
                };
                reader.onerror = function() {
                    isImportingInProgress = false;
                    closeInfoModal();
                    showErrorModal(`<p>檔案讀取：發生錯誤</p><p>${reader.error ? reader.error.message : '未知錯誤'}</p>`);
                    event.target.value = '';
                };
                reader.readAsArrayBuffer(file);
            } catch (error) {
                isImportingInProgress = false;
                closeInfoModal();
                showErrorModal(`
                    <p>檔案讀取：發生錯誤</p>
                    <p>${error.message}</p>
                `);
            }
        }

        function showErrorModal(message) {
            const modal = $('errorModal');
            const modalBody = $('errorModalBody');
            if (!modal || !modalBody) return;
            const modalHeader = modal.querySelector('.modal-header');
            if (modalHeader) modalHeader.style.display = 'block';
            modalBody.innerHTML = message;
            const footer = modal.querySelector('.modal-footer');
            if (footer) {
                footer.innerHTML = '<button class="confirm" onclick="closeModal(\'errorModal\')">確定</button>';
            }
            modal.classList.add('show');
        }

        async function exportBlankTemplate() {
            try {
                const templateData = [{
                    '商品名稱': '',
                    '採購價格': '',
                    '採購數量': '',
                    '內地運費': '',
                    '單重': '',
                    '總重': '',
                    '計材': '',
                    '實際定價': ''
                }];
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.json_to_sheet(templateData);
                ws['!cols'] = [{ wch: 20 }, { wch: 12 }, { wch: 10 }, { wch: 12 }, { wch: 10 }, { wch: 10 }, { wch: 8 }, { wch: 12 }];
                XLSX.utils.book_append_sheet(wb, ws, "商品資料範本");
                XLSX.writeFile(wb, "空白範本.xlsx");
            } catch (e) { handleError(e, "匯出空白範本時發生錯誤"); }
        }

        function showInfoModal(message, autoClose = false, autoCloseDelay = 3000) {
            const modal = $('infoModal');
            const modalBody = $('infoModalBody');
            if (!modal || !modalBody) return;
            const footer = modal.querySelector('.modal-footer');
            if (footer) {
                footer.innerHTML = '<button class="confirm btn-info" onclick="closeModal(\'infoModal\')">知道了</button>';
            }
            modalBody.innerHTML = message || '資料匯入完成';
            modal.classList.add('show');
            if (autoClose) {
                setTimeout(() => {
                    closeInfoModal();
                }, autoCloseDelay);
            }
        }
        function closeInfoModal() {
            closeModal('infoModal');
        }
        function updateImportProgress(percent, statusText) {
            const modal = $('infoModal');
            const modalBody = $('infoModalBody');
            if (!modal || !modalBody) return;
            const safePercent = Math.max(0, Math.min(100, Number(percent) || 0));
            const status = statusText || '正在匯入資料...';
            isImportingInProgress = safePercent < 100;
            modalBody.innerHTML = `
                <div class="import-progress-wrap">
                    <div class="import-progress-status">${status}</div>
                    <div class="import-progress-track">
                        <div class="import-progress-fill" style="width:${safePercent}%"></div>
                    </div>
                    <div class="import-progress-text">${safePercent}%</div>
                </div>
            `;
            const footer = modal.querySelector('.modal-footer');
            if (footer) {
                footer.innerHTML = isImportingInProgress
                    ? '<button class="confirm btn-info" disabled>匯入中...</button>'
                    : '<button class="confirm btn-info" onclick="closeModal(\'infoModal\')">知道了</button>';
            }
            modal.classList.add('show');
        }
        function closeModal(id) {
            if (id === 'infoModal' && isImportingInProgress) return;
            const modal = $(id);
            if (!modal) return;
            modal.classList.remove('show');
        }

    </script>
